<!DOCTYPE html>
<html lang="en" data-theme="edge">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasp — Hub</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { min-height: 100vh; background: var(--color-bg); }

    /* ── Top nav ─────────────────────────────────────────── */
    .topnav {
      background: var(--color-surface); border-bottom: 1px solid var(--color-border);
      padding: 0 var(--space-xl); height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-heading); font-weight: 800; font-size: 1.3rem;
      color: var(--color-text); text-decoration: none;
    }
    .nav-logo-icon {
      width: 32px; height: 32px; background: var(--color-primary);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .nav-right { display: flex; align-items: center; gap: var(--space-md); }
    .nav-user {
      font-family: var(--font-ui); font-size: 0.88rem;
      color: var(--color-text-muted);
    }
    .nav-user strong { color: var(--color-text); }

    /* ── Page layout ─────────────────────────────────────── */
    .page { max-width: 900px; margin: 0 auto; padding: var(--space-xl) var(--space-lg); }

    /* ── Welcome banner ──────────────────────────────────── */
    .welcome-banner {
      margin-bottom: var(--space-xl);
      animation: fadeIn 0.5s ease both;
    }
    .welcome-greeting {
      font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800;
      margin-bottom: var(--space-xs);
    }
    .welcome-greeting span { color: var(--color-primary); }
    .welcome-sub { color: var(--color-text-muted); font-size: 0.95rem; }

    /* ── Section header ──────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-md);
    }
    .section-title {
      font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700;
    }

    /* ── Subject cards ───────────────────────────────────── */
    .subjects-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-md); margin-bottom: var(--space-2xl);
    }
    .subject-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-card); padding: var(--space-lg);
      transition: all var(--transition-base);
      animation: fadeIn 0.4s ease both;
    }
    .subject-card:hover { border-color: var(--color-primary); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
    .subject-card-header {
      display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-md);
    }
    .subject-emoji {
      font-size: 2rem; width: 52px; height: 52px;
      background: var(--color-surface-2); border-radius: var(--radius-card);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .subject-name {
      font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700;
    }
    .subject-meta { font-size: 0.82rem; color: var(--color-text-muted); margin-top: 2px; }
    .subject-actions {
      display: flex; gap: var(--space-sm);
    }
    .subject-actions .btn {
      flex: 1; padding: 9px var(--space-sm); font-size: 0.82rem;
      border-radius: var(--radius-button);
    }

    /* ── Topics expandable ───────────────────────────────── */
    .topics-section { margin-top: var(--space-md); border-top: 1px solid var(--color-border); padding-top: var(--space-md); }
    .topics-toggle {
      background: none; border: none; color: var(--color-text-muted);
      font-family: var(--font-ui); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      padding: 0; transition: color var(--transition-fast);
    }
    .topics-toggle:hover { color: var(--color-primary); }
    .topics-toggle .chevron { transition: transform var(--transition-fast); display: inline-block; }
    .topics-toggle.open .chevron { transform: rotate(90deg); }
    .topics-list {
      display: none; flex-direction: column; gap: 6px; margin-top: var(--space-sm);
    }
    .topics-list.open { display: flex; }
    .topic-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--color-surface-2); border-radius: var(--radius-button);
      padding: 8px 12px;
    }
    .topic-row-name { font-size: 0.85rem; color: var(--color-text); font-family: var(--font-ui); }
    .topic-row-actions { display: flex; gap: 6px; }
    .topic-btn {
      padding: 4px 10px; border-radius: var(--radius-pill);
      font-family: var(--font-ui); font-size: 0.75rem; font-weight: 600;
      border: none; cursor: pointer; transition: all var(--transition-fast);
    }
    .topic-btn-quiz { background: var(--color-primary-glow); color: var(--color-primary); }
    .topic-btn-quiz:hover { background: var(--color-primary); color: #fff; }
    .topic-btn-map { background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text-muted); }
    .topic-btn-map:hover { border-color: var(--color-accent); color: var(--color-accent); }

    /* ── Empty / loading states ──────────────────────────── */
    .empty-state {
      text-align: center; padding: var(--space-2xl) var(--space-lg);
      color: var(--color-text-muted); grid-column: 1/-1;
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: var(--space-md); }
    .empty-state h3 { font-family: var(--font-heading); margin-bottom: var(--space-sm); }

    /* ── Gamification bar ────────────────────────────────── */
    .xp-bar-wrap {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-card); padding: var(--space-md) var(--space-lg);
      margin-bottom: var(--space-lg); display: flex; align-items: center; gap: var(--space-lg);
    }
    .xp-level-badge { font-size: 2rem; flex-shrink: 0; }
    .xp-level-info { flex: 1; min-width: 0; }
    .xp-level-name {
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
      margin-bottom: 4px; display: flex; align-items: center; gap: var(--space-sm);
    }
    .xp-level-num {
      font-size: 0.72rem; font-family: var(--font-ui); font-weight: 700;
      background: var(--color-primary-glow); color: var(--color-primary);
      border-radius: var(--radius-pill); padding: 2px 8px;
    }
    .xp-bar-track {
      background: var(--color-surface-2); border-radius: var(--radius-pill);
      height: 8px; overflow: hidden; margin-bottom: 4px;
    }
    .xp-bar-fill {
      height: 100%; background: var(--color-primary);
      border-radius: var(--radius-pill); transition: width 1s ease;
    }
    .xp-bar-label {
      font-family: var(--font-ui); font-size: 0.72rem; color: var(--color-text-muted);
      display: flex; justify-content: space-between;
    }
    .xp-stats { display: flex; gap: var(--space-lg); flex-shrink: 0; }
    .xp-stat { text-align: center; }
    .xp-stat-val {
      font-family: var(--font-heading); font-size: 1.1rem; font-weight: 800;
      color: var(--color-text);
    }
    .xp-stat-label {
      font-family: var(--font-ui); font-size: 0.68rem; color: var(--color-text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badges-row {
      display: flex; gap: var(--space-sm); flex-wrap: wrap;
      margin-bottom: var(--space-lg);
    }
    .badge-chip {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-pill); padding: 4px 12px;
      font-family: var(--font-ui); font-size: 0.78rem; font-weight: 600;
      color: var(--color-text); display: flex; align-items: center; gap: 5px;
    }

    /* ── No group assigned ───────────────────────────────── */
    .no-group-banner {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-card); padding: var(--space-xl);
      text-align: center; margin-bottom: var(--space-xl);
    }
    .no-group-banner h3 { font-family: var(--font-heading); margin-bottom: var(--space-sm); }
    .no-group-banner p { color: var(--color-text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<nav class="topnav">
  <a href="hub.html" class="nav-logo">
    <div class="nav-logo-icon">📎</div>Clasp
  </a>
  <div class="nav-right">
    <span class="nav-user">Hey, <strong id="nav-name">...</strong></span>
    <button class="btn btn-ghost" style="padding:8px 14px;font-size:0.85rem;" onclick="doSignOut()">Sign out</button>
  </div>
</nav>

<div class="page page-fade">
  <div class="welcome-banner">
    <div class="welcome-greeting">Hey, <span id="student-name">...</span>! 👋</div>
    <div class="welcome-sub" id="welcome-sub">Loading your subjects…</div>
  </div>

  <div id="gamification-wrap" style="display:none;">
    <div class="xp-bar-wrap" id="xp-bar-wrap">
      <div class="xp-level-badge" id="xp-level-badge">🌱</div>
      <div class="xp-level-info">
        <div class="xp-level-name">
          <span id="xp-level-name">Beginner</span>
          <span class="xp-level-num" id="xp-level-num">Level 1</span>
        </div>
        <div class="xp-bar-track"><div class="xp-bar-fill" id="xp-bar-fill" style="width:0%"></div></div>
        <div class="xp-bar-label">
          <span id="xp-bar-left"></span>
          <span id="xp-bar-right"></span>
        </div>
      </div>
      <div class="xp-stats">
        <div class="xp-stat">
          <div class="xp-stat-val" id="xp-streak-val">0🔥</div>
          <div class="xp-stat-label">Streak</div>
        </div>
        <div class="xp-stat">
          <div class="xp-stat-val" id="xp-total-val">0</div>
          <div class="xp-stat-label">Total XP</div>
        </div>
      </div>
    </div>
    <div class="badges-row" id="badges-row"></div>
  </div>
  <div id="hub-content">
    <div class="subjects-grid">
      <div class="empty-state">
        <div class="spinner" style="margin:0 auto var(--space-md);"></div>
      </div>
    </div>
  </div>
  </div>
</div>

<script>
  function doSignOut() { window._doSignOut && window._doSignOut(); }
  function dismissNotification() { const els = document.querySelectorAll('[style*="primary-glow"]'); els.forEach(e => e.remove()); }
  function goQuiz(params) { window._goQuiz && window._goQuiz(params); }
  function goMindmap(params) { window._goMindmap && window._goMindmap(params); }
  function toggleTopics(btn) { window._toggleTopics && window._toggleTopics(btn); }
</script>

<script type="module">
import { auth, db } from './firebase-config.js';
import { requireAuth, handleSignOut, showToast } from './auth.js';
import { getLevelInfo, BADGES } from './gamification.js';
import {
  collection, getDocs, doc, getDoc, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

window._doSignOut = () => handleSignOut();

window._goQuiz = (params) => {
  const url = new URL('quiz.html', location.href);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  location.href = url.toString();
};

window._goMindmap = (params) => {
  const url = new URL('mindmap.html', location.href);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  location.href = url.toString();
};

window._toggleTopics = (btn) => {
  btn.classList.toggle('open');
  const list = btn.nextElementSibling;
  list.classList.toggle('open');
};

requireAuth(async (user, profile) => {
  // Allow student, parent, admin — parents/admins can preview hub
  const firstName = (profile.name || 'there').split(' ')[0];
  document.getElementById('student-name').textContent = firstName;
  document.getElementById('nav-name').textContent = firstName;

  // Admin/parent: show admin link and load first available group for preview
  if (profile.role === 'admin' || profile.role === 'parent') {
    document.getElementById('welcome-sub').textContent = 'Previewing student hub';
    const adminBar = document.createElement('div');
    adminBar.style.cssText = 'background:var(--color-primary-glow);border:1px solid var(--color-primary);border-radius:var(--radius-card);padding:10px 16px;margin-bottom:var(--space-lg);display:flex;align-items:center;justify-content:space-between;font-family:var(--font-ui);font-size:0.85rem;';
    adminBar.innerHTML = `<span style="color:var(--color-primary);font-weight:600;">👁️ Preview mode — viewing as student</span><a href="admin.html" style="color:var(--color-primary);font-weight:700;">← Back to admin</a>`;
    document.getElementById('hub-content').before(adminBar);
    // Load first group for preview
    const groupsSnap = await getDocs(collection(db, 'content'));
    let firstGroupId = null;
    groupsSnap.forEach(d => { if (!firstGroupId) firstGroupId = d.id; });
    if (firstGroupId) await loadSubjects(user, firstGroupId);
    else document.getElementById('hub-content').innerHTML = `<div class="no-group-banner"><h3>No groups yet</h3><p>Create a group in the admin panel first.</p></div>`;
    return;
  }

  // Student: get groupId from profile
  // Support both groupIds array and legacy single groupId
  const groupIds = profile.groupIds || (profile.groupId ? [profile.groupId] : []);
  const groupId = groupIds[0] || null;

  if (!groupId) {
    document.getElementById('welcome-sub').textContent = 'Your revision content will appear here once your parent assigns you to a group.';
    document.getElementById('hub-content').innerHTML = `
      <div class="no-group-banner">
        <div style="font-size:2.5rem;margin-bottom:var(--space-md);">📚</div>
        <h3>No group assigned yet</h3>
        <p>Ask your parent to assign you to a revision group so your subjects appear here.</p>
      </div>`;
    return;
  }

  await loadSubjects(user, groupId);
  renderGamification(profile);
  // Show parent notification if any
  if (profile.notification && !profile.notification.read) {
    const n = profile.notification;
    const banner = document.createElement('div');
    banner.style.cssText = 'background:var(--color-primary-glow);border:1px solid var(--color-primary);border-radius:var(--radius-card);padding:var(--space-md) var(--space-lg);margin-bottom:var(--space-lg);display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-md);';
    banner.innerHTML = `<div><div style="font-family:var(--font-ui);font-size:0.78rem;font-weight:700;color:var(--color-primary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">📨 Message from your parent</div><div style="font-size:0.92rem;color:var(--color-text);">${esc(n.message)}</div></div><button onclick="dismissNotification()" style="flex-shrink:0;background:none;border:none;color:var(--color-text-muted);cursor:pointer;font-size:1.1rem;padding:4px;">✕</button>`;
    document.getElementById('hub-content').before(banner);
    // Mark as read
    const { updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    await updateDoc(doc(db, 'users', user.uid), { 'notification.read': true }).catch(()=>{});
  }
});

async function loadSubjects(user, groupId) {
  const grid = document.getElementById('hub-content');

  // Get group info
  const groupSnap = await getDoc(doc(db, 'content', groupId));
  if (!groupSnap.exists()) {
    grid.innerHTML = `<div class="no-group-banner"><h3>Group not found</h3><p>Ask your parent to reassign you.</p></div>`;
    return;
  }

  document.getElementById('welcome-sub').textContent = `Revising: ${groupSnap.data().name}`;

  // Get subjects
  const subjectsSnap = await getDocs(query(collection(db, `content/${groupId}/subjects`), orderBy('order','asc')))
    .catch(() => getDocs(collection(db, `content/${groupId}/subjects`)));

  const subjects = [];
  subjectsSnap.forEach(d => subjects.push({ id: d.id, ...d.data() }));

  if (subjects.length === 0) {
    grid.innerHTML = `<div class="subjects-grid"><div class="empty-state"><div class="empty-state-icon">📭</div><h3>No subjects yet</h3><p>Your admin is still adding content.</p></div></div>`;
    return;
  }

  // For each subject, load topics
  const subjectTopics = {};
  await Promise.all(subjects.map(async s => {
    const tSnap = await getDocs(collection(db, `content/${groupId}/subjects/${s.id}/topics`)).catch(() => null);
    subjectTopics[s.id] = [];
    if (tSnap) tSnap.forEach(d => subjectTopics[s.id].push({ id: d.id, ...d.data() }));
  }));

  grid.innerHTML = `
    <div class="section-header">
      <div class="section-title">Your subjects</div>
    </div>
    <div class="subjects-grid" id="subjects-grid"></div>`;

  const sgrid = document.getElementById('subjects-grid');

  subjects.forEach((s, i) => {
    const topics = subjectTopics[s.id] || [];
    const topicCount = topics.length;

    const topicRowsHtml = topics.map(t => `
      <div class="topic-row">
        <span class="topic-row-name">📝 ${esc(t.name)}</span>
        <div class="topic-row-actions">
          <button class="topic-btn topic-btn-quiz"
            onclick="goQuiz({groupId:'${groupId}',subjectId:'${s.id}',topicId:'${t.id}',topicName:'${esc(t.name)}',subjectName:'${esc(s.name)}'})">
            ⚡ Quiz
          </button>
          <button class="topic-btn topic-btn-map"
            onclick="goMindmap({groupId:'${groupId}',subjectId:'${s.id}',topicId:'${t.id}',topicName:'${esc(t.name)}',subjectName:'${esc(s.name)}'})">
            🗺️ Map
          </button>
        </div>
      </div>`).join('');

    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.animationDelay = `${i * 0.07}s`;
    card.innerHTML = `
      <div class="subject-card-header">
        <div class="subject-emoji">${s.emoji || '📚'}</div>
        <div>
          <div class="subject-name">${esc(s.name)}</div>
          <div class="subject-meta">${topicCount} topic${topicCount !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="subject-actions">
        <button class="btn btn-primary"
          onclick="goQuiz({groupId:'${groupId}',subjectId:'${s.id}',subjectName:'${esc(s.name)}'})">
          ⚡ Quiz whole subject
        </button>
        <button class="btn btn-secondary"
          onclick="goMindmap({groupId:'${groupId}',subjectId:'${s.id}',subjectName:'${esc(s.name)}'})">
          🗺️ Subject map
        </button>
      </div>
      ${topicCount > 0 ? `
      <div class="topics-section">
        <button class="topics-toggle" onclick="toggleTopics(this)">
          <span class="chevron">›</span> Topics
        </button>
        <div class="topics-list">${topicRowsHtml}</div>
      </div>` : ''}`;
    sgrid.appendChild(card);
  });
}

function renderGamification(profile) {
  if (profile.role !== 'student') return;
  const wrap = document.getElementById('gamification-wrap');
  wrap.style.display = 'block';

  const xp = profile.xp || 0;
  const { current, next, progress, xpIntoLevel, xpNeeded } = getLevelInfo(xp);

  document.getElementById('xp-level-badge').textContent = current.icon;
  document.getElementById('xp-level-name').textContent  = current.name;
  document.getElementById('xp-level-num').textContent   = 'Level ' + current.level;
  document.getElementById('xp-streak-val').textContent  = (profile.streak || 0) + '🔥';
  document.getElementById('xp-total-val').textContent   = xp + ' XP';

  setTimeout(() => {
    document.getElementById('xp-bar-fill').style.width = progress + '%';
  }, 200);

  if (next) {
    document.getElementById('xp-bar-left').textContent  = xpIntoLevel + ' / ' + xpNeeded + ' XP to ' + next.name;
    document.getElementById('xp-bar-right').textContent = next.icon + ' ' + next.name;
  } else {
    document.getElementById('xp-bar-left').textContent  = 'Max level reached! 🏆';
    document.getElementById('xp-bar-right').textContent = '';
  }

  // Badges
  const earnedIds = profile.badges || [];
  const row = document.getElementById('badges-row');
  if (earnedIds.length) {
    row.innerHTML = earnedIds.map(id => {
      const b = BADGES.find(x => x.id === id);
      if (!b) return '';
      return `<div class="badge-chip" title="${esc(b.desc)}">${b.icon} ${esc(b.name)}</div>`;
    }).join('');
  } else {
    row.innerHTML = '<div style="font-size:0.82rem;color:var(--color-text-muted);font-family:var(--font-ui);">Complete quizzes to earn badges 🏅</div>';
  }
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
<script>
window.showToast = function(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3500);
};
</script>
</body>
</html>

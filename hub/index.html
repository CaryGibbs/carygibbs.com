<!DOCTYPE html>
<html lang="en" data-theme="edge">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasp — Revision that sticks.</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { min-height:100vh; display:flex; flex-direction:column; background:var(--color-bg); overflow-x:hidden; }
    .bg-orbs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .bg-orbs::before { content:''; position:absolute; width:600px; height:600px; background:radial-gradient(circle,rgba(108,99,255,0.12) 0%,transparent 70%); top:-200px; left:-200px; animation:drift 12s ease-in-out infinite alternate; }
    .bg-orbs::after  { content:''; position:absolute; width:400px; height:400px; background:radial-gradient(circle,rgba(255,107,107,0.08) 0%,transparent 70%); bottom:-100px; right:-100px; animation:drift 16s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from{transform:translate(0,0)} to{transform:translate(40px,30px)} }
    .container { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:var(--space-xl) var(--space-lg); }
    .logo-wrap { text-align:center; margin-bottom:var(--space-xl); animation:fadeIn 0.6s ease both; }
    .logo-mark { display:inline-flex; align-items:center; gap:12px; margin-bottom:var(--space-sm); }
    .logo-icon { width:48px; height:48px; background:var(--color-primary); border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-glow); font-size:24px; }
    .logo-text { font-family:var(--font-heading); font-size:2.4rem; font-weight:800; color:var(--color-text); letter-spacing:-0.02em; }
    .logo-text span { color:var(--color-primary); }
    .tagline { font-family:var(--font-ui); color:var(--color-text-muted); font-size:1rem; letter-spacing:0.02em; }
    .auth-card { width:100%; max-width:420px; animation:fadeIn 0.6s 0.15s ease both; }
    .tab-row { display:flex; background:var(--color-surface-2); border-radius:var(--radius-button); padding:4px; margin-bottom:var(--space-lg); gap:4px; }
    .tab-btn { flex:1; padding:10px; border-radius:calc(var(--radius-button) - 2px); background:transparent; color:var(--color-text-muted); font-family:var(--font-ui); font-weight:600; font-size:0.9rem; transition:all var(--transition-base); }
    .tab-btn.active { background:var(--color-surface); color:var(--color-text); box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    .form-panel { display:none; }
    .form-panel.active { display:block; }
    .form-group { margin-bottom:var(--space-md); }
    .form-group label { display:block; font-family:var(--font-ui); font-size:0.85rem; font-weight:600; color:var(--color-text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em; }
    .form-group input { padding:14px var(--space-md); border-radius:var(--radius-button); font-size:1rem; }
    .form-hint { font-size:0.8rem; color:var(--color-text-muted); margin-top:4px; }
    .optional-label { font-size:0.75rem; color:var(--color-text-faint); font-style:italic; margin-left:4px; }
    .btn-submit { width:100%; padding:14px; margin-top:var(--space-sm); font-size:1rem; border-radius:var(--radius-button); }
    .divider { text-align:center; position:relative; margin:var(--space-lg) 0; color:var(--color-text-faint); font-size:0.8rem; font-family:var(--font-ui); }
    .divider::before,.divider::after { content:''; position:absolute; top:50%; width:calc(50% - 20px); height:1px; background:var(--color-border); }
    .divider::before{left:0} .divider::after{right:0}
    .signup-type-row { display:flex; gap:var(--space-sm); margin-bottom:var(--space-lg); }
    .signup-type-btn { flex:1; padding:12px var(--space-sm); border-radius:var(--radius-card); background:var(--color-surface-2); border:2px solid var(--color-border); color:var(--color-text-muted); font-family:var(--font-ui); font-size:0.82rem; font-weight:600; text-align:center; cursor:pointer; transition:all var(--transition-base); }
    .signup-type-btn .icon { display:block; font-size:1.4rem; margin-bottom:4px; }
    .signup-type-btn.selected { border-color:var(--color-primary); background:var(--color-primary-glow); color:var(--color-primary); }
    .error-msg { background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.3); border-radius:var(--radius-sm); color:var(--color-danger); padding:var(--space-sm) var(--space-md); font-size:0.875rem; margin-bottom:var(--space-md); display:none; }
    .error-msg.visible { display:block; }
    .btn-submit.loading { opacity:0.7; pointer-events:none; }
    .btn-submit.loading::after { content:''; display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; margin-left:8px; vertical-align:middle; }
    .auth-footer { text-align:center; margin-top:var(--space-lg); font-size:0.8rem; color:var(--color-text-faint); font-family:var(--font-ui); animation:fadeIn 0.6s 0.3s ease both; }
    .teacher-link { text-align:center; margin-top:var(--space-md); font-size:0.82rem; color:var(--color-text-muted); font-family:var(--font-ui); }
    .code-input { text-transform:uppercase; letter-spacing:0.15em; font-weight:700; font-family:var(--font-ui); }
  </style>
</head>
<body>
<div class="bg-orbs"></div>
<div id="toast-container"></div>
<div class="container page-fade">
  <div class="logo-wrap">
    <div class="logo-mark">
      <div class="logo-icon">📎</div>
      <div class="logo-text">Cl<span>a</span>sp</div>
    </div>
    <p class="tagline">Revision that sticks.</p>
  </div>

  <div class="auth-card card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign in</button>
      <button class="tab-btn" onclick="switchTab('signup')">Create account</button>
    </div>
    <div class="error-msg" id="error-msg"></div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-submit" id="btn-login" onclick="handleLogin()">Sign in</button>
      <div class="divider">or</div>
      <p style="text-align:center; font-size:0.85rem; color:var(--color-text-muted);">
        <a href="#" onclick="showForgotPassword()" style="color:var(--color-primary);">Forgot your password?</a>
      </p>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="panel-signup">
      <p style="font-size:0.85rem; color:var(--color-text-muted); margin-bottom:var(--space-md);">I am a...</p>
      <div class="signup-type-row">
        <div class="signup-type-btn selected" id="type-parent" onclick="selectType('parent')">
          <span class="icon">👨‍👩‍👧</span>Parent
        </div>
        <div class="signup-type-btn" id="type-student" onclick="selectType('student')">
          <span class="icon">🎓</span>Student
        </div>
      </div>
      <div class="form-group">
        <label>Your name</label>
        <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters" autocomplete="new-password">
        <p class="form-hint">Minimum 8 characters</p>
      </div>
      <div class="form-group" id="class-code-group" style="display:none;">
        <label>Class code <span class="optional-label">(optional)</span></label>
        <input type="text" id="signup-class-code" placeholder="e.g. XK7P2M" maxlength="6" class="code-input">
        <p class="form-hint">Enter the code your teacher gave you, or leave blank.</p>
      </div>
      <button class="btn btn-primary btn-submit" id="btn-signup" onclick="handleSignup()">Create account</button>
    </div>
  </div>

  <div class="teacher-link">
    Are you a teacher? <a href="teacher.html" style="color:var(--color-primary);">Teacher portal →</a>
  </div>
  <div class="auth-footer">
    By signing in you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
  </div>
</div>

<script>
  function switchTab(t) { window._switchTab && window._switchTab(t); }
  function selectType(t) { window._selectType && window._selectType(t); }
  function handleLogin() { window._handleLogin && window._handleLogin(); }
  function handleSignup() { window._handleSignup && window._handleSignup(); }
  function showForgotPassword() { window._showForgotPassword && window._showForgotPassword(); }
</script>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { redirectByRole } from './auth.js';
  import {
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    sendPasswordResetEmail, onAuthStateChanged, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    doc, setDoc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let signupType = 'parent';

  window._switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1));
    });
    document.getElementById('panel-login').classList.toggle('active', tab==='login');
    document.getElementById('panel-signup').classList.toggle('active', tab==='signup');
    hideError();
  };

  window._selectType = function(type) {
    signupType = type;
    document.getElementById('type-parent').classList.toggle('selected', type==='parent');
    document.getElementById('type-student').classList.toggle('selected', type==='student');
    document.getElementById('class-code-group').style.display = type==='student' ? 'block' : 'none';
  };

  window._handleLogin = async function() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    setLoading('btn-login', true);
    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      await redirectByRole(cred.user.uid);
    } catch(e) {
      console.error('Signup error:', e.code, e.message); showError(friendlyError(e.code) || e.message || 'Error: ' + e.code);
      setLoading('btn-login', false);
    }
  };

  window._handleSignup = async function() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const code     = document.getElementById('signup-class-code').value.trim().toUpperCase();

    if (!name)               { showError('Please enter your name.'); return; }
    if (!email)              { showError('Please enter your email.'); return; }
    if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }

    // Validate class code if provided
    let classInfo = null;
    if (signupType === 'student' && code) {
      const codeSnap = await getDoc(doc(db, 'classCodes', code));
      if (!codeSnap.exists()) { showError('Class code not found. Please check and try again.'); return; }
      classInfo = codeSnap.data();
    }

    setLoading('btn-signup', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid  = cred.user.uid;
      await updateProfile(cred.user, { displayName: name });

      if (signupType === 'parent') {
        await setDoc(doc(db, 'users', uid), {
          name, email, role: 'parent', theme: 'parent',
          createdAt: Date.now(), children: {}
        });
      } else {
        const profile = {
          name, email, role: 'student', theme: 'edge',
          createdAt: Date.now(), xp: 0, level: 1, streak: 0, sessions: [],
          classes: classInfo ? { [classInfo.classId]: true } : {}
        };
        await setDoc(doc(db, 'users', uid), profile);
        if (classInfo) {
          await setDoc(doc(db, `users/${classInfo.teacherUid}/classes/${classInfo.classId}/students`, uid), { name, email });
        }
      }
      await redirectByRole(uid);
    } catch(e) {
      console.error('Signup error:', e.code, e.message); showError(friendlyError(e.code) || e.message || 'Error: ' + e.code);
      setLoading('btn-signup', false);
    }
  };

  window._showForgotPassword = async function() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showError('Enter your email above first.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showToast('Password reset email sent!', 'success');
    } catch(e) { console.error('Signup error:', e.code, e.message); showError(friendlyError(e.code) || e.message || 'Error: ' + e.code); }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) await redirectByRole(user.uid);
  });

  function showError(msg) { const el=document.getElementById('error-msg'); el.textContent=msg; el.classList.add('visible'); }
  function hideError() { document.getElementById('error-msg').classList.remove('visible'); }
  function setLoading(id,v) { document.getElementById(id).classList.toggle('loading',v); }
  function friendlyError(code) {
    const map = {
      'auth/user-not-found':'No account found with that email.',
      'auth/wrong-password':'Incorrect password. Please try again.',
      'auth/email-already-in-use':'An account with that email already exists.',
      'auth/invalid-email':'Please enter a valid email address.',
      'auth/weak-password':'Password must be at least 8 characters.',
      'auth/too-many-requests':'Too many attempts. Please try again later.',
      'auth/invalid-credential':'Incorrect email or password.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('panel-login').classList.contains('active')) window._handleLogin();
    else window._handleSignup();
  });
</script>
<script>
  window.showToast = function(msg,type='info') {
    const c=document.getElementById('toast-container');
    const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg;
    c.appendChild(t); setTimeout(()=>t.remove(),3500);
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="edge">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasp — Mindmap</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { height: 100vh; background: var(--color-bg); overflow: hidden; display: flex; flex-direction: column; }

    /* ── Top nav ─────────────────────────────────────────── */
    .topnav {
      background: var(--color-surface); border-bottom: 1px solid var(--color-border);
      padding: 0 var(--space-xl); height: 64px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 100; gap: var(--space-md);
    }
    .nav-back {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-ui); font-size: 0.9rem; font-weight: 600;
      color: var(--color-text-muted); text-decoration: none; flex-shrink: 0;
      transition: color var(--transition-fast);
    }
    .nav-back:hover { color: var(--color-primary); }
    .nav-title {
      font-family: var(--font-heading); font-size: 1rem; font-weight: 700;
      color: var(--color-text); flex: 1; text-align: center;
    }
    .view-toggle {
      display: flex; gap: 4px; background: var(--color-surface-2);
      border-radius: var(--radius-button); padding: 3px; flex-shrink: 0;
    }
    .view-btn {
      padding: 6px 12px; border-radius: calc(var(--radius-button) - 2px);
      background: transparent; color: var(--color-text-muted);
      font-family: var(--font-ui); font-size: 0.8rem; font-weight: 600;
      border: none; cursor: pointer; transition: all var(--transition-fast);
      white-space: nowrap;
    }
    .view-btn.active {
      background: var(--color-surface); color: var(--color-text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }

    /* ── Loading ─────────────────────────────────────────── */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 64px); flex-direction: column; gap: var(--space-md);
    }
    .loading-wrap p { color: var(--color-text-muted); font-family: var(--font-ui); }

    /* ── View panels ─────────────────────────────────────── */
    .view-panel { display: none !important; height: calc(100vh - 64px); overflow-y: auto; }
    .view-panel.active { display: block !important; }
    .view-panel.active#view-flashcards { display: flex !important; }
    #view-spider { display: block !important; visibility: hidden; position: absolute; pointer-events: none; overflow: hidden; }
    #view-spider.active { visibility: visible !important; position: relative; pointer-events: all; }

    /* ══════════════════════════════════════════════════════
       VIEW 1: SPIDER DIAGRAM (SVG canvas)
    ══════════════════════════════════════════════════════ */
    #view-spider {
      width: 100%; height: calc(100vh - 64px);
      overflow: hidden; position: relative; cursor: grab;
    }
    #view-spider:active { cursor: grabbing; }
    #spider-canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .spider-hint {
      position: absolute; bottom: var(--space-lg); left: 50%; transform: translateX(-50%);
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-pill); padding: 6px 16px;
      font-family: var(--font-ui); font-size: 0.78rem; color: var(--color-text-muted);
      pointer-events: none;
    }

    /* ══════════════════════════════════════════════════════
       VIEW 2: OUTLINE / ACCORDION
    ══════════════════════════════════════════════════════ */
    #view-outline { padding: var(--space-md) var(--space-lg) var(--space-xl); max-width: 760px; margin: 0 auto; box-sizing: border-box; }
    .outline-subject {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-card); margin-bottom: var(--space-md);
      overflow: hidden;
    }
    .outline-subject-header {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-md) var(--space-lg); cursor: pointer;
      transition: background var(--transition-fast);
    }
    .outline-subject-header:hover { background: var(--color-surface-2); }
    .outline-subject-emoji { font-size: 1.4rem; }
    .outline-subject-name { font-family: var(--font-heading); font-size: 1.05rem; font-weight: 700; flex: 1; }
    .outline-chevron { color: var(--color-text-faint); transition: transform var(--transition-fast); font-size: 1.1rem; }
    .outline-subject.open .outline-chevron { transform: rotate(90deg); }
    .outline-topics { display: none; border-top: 1px solid var(--color-border); }
    .outline-subject.open .outline-topics { display: block; }
    .outline-topic {
      border-bottom: 1px solid var(--color-border); overflow: hidden;
    }
    .outline-topic:last-child { border-bottom: none; }
    .outline-topic-header {
      display: flex; align-items: center; gap: var(--space-md);
      padding: var(--space-sm) var(--space-lg) var(--space-sm) calc(var(--space-lg) + 24px);
      cursor: pointer; transition: background var(--transition-fast);
    }
    .outline-topic-header:hover { background: var(--color-surface-2); }
    .outline-topic-name {
      font-family: var(--font-ui); font-size: 0.92rem; font-weight: 600; flex: 1;
      color: var(--color-text);
    }
    .outline-topic-count {
      font-size: 0.78rem; color: var(--color-text-muted); font-family: var(--font-ui);
    }
    .outline-topic-chevron { color: var(--color-text-faint); transition: transform var(--transition-fast); font-size: 0.9rem; }
    .outline-topic.open .outline-topic-chevron { transform: rotate(90deg); }
    .outline-keypoints { display: none; padding: var(--space-sm) var(--space-lg) var(--space-md) calc(var(--space-lg) + 24px); }
    .outline-topic.open .outline-keypoints { display: block; }
    .keypoint-item {
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--color-border);
    }
    .keypoint-item:last-child { border-bottom: none; }
    .keypoint-term {
      font-family: var(--font-ui); font-size: 0.82rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--color-primary); margin-bottom: 3px;
    }
    .keypoint-explanation {
      font-size: 0.9rem; color: var(--color-text); line-height: 1.6;
    }

    /* ── Spider detail panel ────────────────────────────── */
    .spider-detail {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--color-surface);
      border-top: 2px solid var(--color-primary);
      border-radius: var(--radius-card) var(--radius-card) 0 0;
      padding: var(--space-lg) var(--space-xl);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 10; max-height: 50%;
      overflow-y: auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
    .spider-detail.open { transform: translateY(0); }
    .spider-detail-close {
      position: absolute; top: var(--space-md); right: var(--space-md);
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-surface-2); border: none; cursor: pointer;
      color: var(--color-text-muted); font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition-fast);
    }
    .spider-detail-close:hover { background: var(--color-danger); color: #fff; }
    .spider-detail-term {
      font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700;
      color: var(--color-primary); margin-bottom: var(--space-sm);
      padding-right: 40px;
    }
    .spider-detail-explanation {
      font-size: 0.95rem; color: var(--color-text); line-height: 1.7;
    }
    .spider-hint {
      position: absolute; bottom: var(--space-lg); left: 50%;
      transform: translateX(-50%);
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-pill); padding: 6px 16px;
      font-family: var(--font-ui); font-size: 0.78rem; color: var(--color-text-muted);
      pointer-events: none; transition: opacity 0.3s ease;
    }

    /* ══════════════════════════════════════════════════════
       VIEW 3: FLASHCARDS
    ══════════════════════════════════════════════════════ */
    #view-flashcards {
      display: flex; flex-direction: column; align-items: center;
      padding: var(--space-lg) var(--space-lg); box-sizing: border-box;
      justify-content: center;
    }
    .flashcard-meta {
      font-family: var(--font-ui); font-size: 0.85rem; color: var(--color-text-muted);
      margin-bottom: var(--space-lg);
    }
    .flashcard-wrap {
      width: 100%; max-width: 560px; perspective: 1000px; margin-bottom: var(--space-xl);
    }
    .flashcard {
      width: 100%; min-height: 260px;
      position: relative; transform-style: preserve-3d;
      transition: transform 0.5s ease; cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .flashcard-face {
      position: absolute; inset: 0;
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-card); padding: var(--space-xl);
      backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      box-shadow: var(--shadow-card);
    }
    .flashcard-back {
      transform: rotateY(180deg);
      background: var(--color-primary-glow);
      border-color: var(--color-primary);
    }
    .flashcard-label {
      font-family: var(--font-ui); font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--color-text-faint); margin-bottom: var(--space-md);
    }
    .flashcard-back .flashcard-label { color: var(--color-primary); }
    .flashcard-content {
      font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700;
      color: var(--color-text); line-height: 1.4;
    }
    .flashcard-back .flashcard-content { color: var(--color-text); font-size: 1rem; font-weight: 400; font-family: var(--font-body); }
    .flashcard-hint {
      font-size: 0.78rem; color: var(--color-text-faint); margin-top: var(--space-md);
      font-family: var(--font-ui);
    }
    .flashcard-type {
      position: absolute; top: var(--space-md); right: var(--space-md);
      font-size: 0.7rem; font-family: var(--font-ui); font-weight: 700;
      text-transform: uppercase; color: var(--color-text-faint);
    }

    .flashcard-nav {
      display: flex; align-items: center; gap: var(--space-lg);
    }
    .fc-nav-btn {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--color-surface); border: 1px solid var(--color-border);
      font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition-fast); color: var(--color-text);
    }
    .fc-nav-btn:hover:not(:disabled) { border-color: var(--color-primary); color: var(--color-primary); }
    .fc-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .fc-counter {
      font-family: var(--font-ui); font-size: 0.9rem; color: var(--color-text-muted);
      min-width: 70px; text-align: center;
    }
    .fc-topic-label {
      font-family: var(--font-ui); font-size: 0.82rem; color: var(--color-text-muted);
      margin-top: var(--space-md); text-align: center;
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: var(--space-2xl); color: var(--color-text-muted);
    }
    .empty-state h3 { font-family: var(--font-heading); margin-bottom: var(--space-sm); }
  </style>
</head>
<body>
<div id="toast-container"></div>

<nav class="topnav">
  <a id="nav-back-link" href="hub.html" class="nav-back">← Back</a>
  <div class="nav-title" id="nav-title">Mindmap</div>
  <div class="view-toggle">
    <button class="view-btn active" data-view="spider" onclick="switchView('spider')">🕸️ Spider</button>
    <button class="view-btn" data-view="outline" onclick="switchView('outline')">📋 Outline</button>
    <button class="view-btn" data-view="flashcards" onclick="switchView('flashcards')">🃏 Cards</button>
  </div>
</nav>

<!-- Loading -->
<div id="loading-wrap" class="loading-wrap" style="height:calc(100vh - 64px);">
  <div class="spinner" style="width:48px;height:48px;"></div>
  <p>Loading content…</p>
</div>

<!-- Spider view -->
<div class="view-panel" id="view-spider" style="width:100%;height:calc(100vh - 64px);position:relative;overflow:hidden;">
  <canvas id="spider-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
  <div class="spider-hint" id="spider-hint">Tap a key point · Drag to pan · Pinch to zoom</div>
  <div style="position:absolute;top:var(--space-md);right:var(--space-md);display:flex;gap:6px;z-index:5;">
    <button id="btn-spider-back" onclick="spiderBack()" style="display:none;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-pill);padding:6px 14px;font-family:var(--font-ui);font-size:0.78rem;font-weight:600;color:var(--color-text-muted);cursor:pointer;">← Back</button>
    <button onclick="resetSpiderView()" style="background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-pill);padding:6px 14px;font-family:var(--font-ui);font-size:0.78rem;font-weight:600;color:var(--color-text-muted);cursor:pointer;">⊙ Centre</button>
  </div>
  <div class="spider-detail" id="spider-detail">
    <button class="spider-detail-close" onclick="closeSpiderDetail()">✕</button>
    <div class="spider-detail-term" id="spider-detail-term"></div>
    <div class="spider-detail-explanation" id="spider-detail-explanation"></div>
  </div>
</div>

<!-- Outline view -->
<div class="view-panel" id="view-outline"></div>

<!-- Flashcards view -->
<div class="view-panel" id="view-flashcards">
  <div class="flashcard-meta" id="fc-meta"></div>
  <div class="flashcard-wrap">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="flashcard-face flashcard-front">
        <div class="flashcard-label">Question / Term</div>
        <div class="flashcard-content" id="fc-front"></div>
        <div class="flashcard-hint" id="fc-hint" style="display:none;">Tap to reveal answer</div>
        <div class="flashcard-type" id="fc-type"></div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="flashcard-label">Answer</div>
        <div class="flashcard-content" id="fc-back"></div>
      </div>
    </div>
  </div>
  <div class="flashcard-nav">
    <button class="fc-nav-btn" id="fc-prev" onclick="prevCard()" disabled>‹</button>
    <div class="fc-counter" id="fc-counter">1 / 1</div>
    <button class="fc-nav-btn" id="fc-next" onclick="nextCard()">›</button>
  </div>
  <div class="fc-topic-label" id="fc-topic-label"></div>
</div>

<script>
  function switchView(v) { window._switchView && window._switchView(v); }
  function closeSpiderDetail() { window._closeSpiderDetail && window._closeSpiderDetail(); }
  function resetSpiderView() { window._resetSpiderView && window._resetSpiderView(); }
  function spiderBack() { window._spiderBack && window._spiderBack(); }
  function flipCard() { window._flipCard && window._flipCard(); }
  function prevCard() { window._prevCard && window._prevCard(); }
  function nextCard() { window._nextCard && window._nextCard(); }
</script>

<script type="module">
import { auth, db } from './firebase-config.js';
import { requireAuth, showToast } from './auth.js';
import { awardXp } from './gamification.js';
import {
  collection, getDocs, doc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const params    = new URLSearchParams(location.search);
const groupId   = params.get('groupId');
const subjectId = params.get('subjectId');
const topicId   = params.get('topicId');
const subjectName = params.get('subjectName') || 'Subject';
const topicName   = params.get('topicName') || '';

/* ── Data model ──────────────────────────────────────────── */
// subjects = [{ id, name, emoji, topics: [{ id, name, questions: [...] }] }]
let subjects = [];
let allFlashcards = []; // flat list for flashcard view
let currentView = 'spider';
let fcIdx = 0;
let fcFlipped = false;

/* ── Spider canvas state ─────────────────────────────────── */
let spiderNodes = [];
let selectedLeaf = null;
let focusedGroupIdx = null; // index into spiderNodes for focused group
let spiderEdges = [];
let panX = 0, panY = 0, zoom = 1;
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

let _currentUser = null;
let _currentProfile = null;

requireAuth(async (user, profile) => {
  if (!['student','admin','parent'].includes(profile.role)) { location.href = 'hub.html'; return; }
  _currentUser = user;
  _currentProfile = profile;
  // Set smart back link
  if (profile.role === 'admin' || profile.role === 'parent') {
    const bl = document.getElementById('nav-back-link');
    if (bl) { bl.href = 'admin.html'; bl.textContent = '← Admin'; }
  }
  if (!groupId || !subjectId) { location.href = 'hub.html'; return; }
  document.getElementById('nav-title').textContent = topicName || subjectName;
  await loadData();
});

async function loadData() {
  try {
    if (topicId) {
      // Single topic mode
      const subSnap = await getDoc(doc(db, `content/${groupId}/subjects/${subjectId}`));
      const topSnap = await getDoc(doc(db, `content/${groupId}/subjects/${subjectId}/topics/${topicId}`));
      const qSnap   = await getDocs(collection(db, `content/${groupId}/subjects/${subjectId}/topics/${topicId}/questions`));
      const qs = [];
      qSnap.forEach(d => qs.push({ id: d.id, ...d.data() }));
      const topData = topSnap.exists() ? topSnap.data() : {};
      subjects = [{
        id: subjectId,
        name: subSnap.exists() ? subSnap.data().name : subjectName,
        emoji: subSnap.exists() ? subSnap.data().emoji || '📚' : '📚',
        topics: [{ id: topicId, name: topData.name || topicName, keyPoints: topData.keyPoints || [], questions: qs }]
      }];
    } else {
      // Whole subject mode
      const subSnap  = await getDoc(doc(db, `content/${groupId}/subjects/${subjectId}`));
      const topSnap  = await getDocs(collection(db, `content/${groupId}/subjects/${subjectId}/topics`));
      const topicList = [];
      topSnap.forEach(d => topicList.push({ id: d.id, ...d.data() }));

      const topicsWithQ = await Promise.all(topicList.map(async t => {
        const qSnap = await getDocs(collection(db,
          `content/${groupId}/subjects/${subjectId}/topics/${t.id}/questions`)).catch(() => null);
        const qs = [];
        if (qSnap) qSnap.forEach(d => qs.push({ id: d.id, ...d.data() }));
        return { ...t, keyPoints: t.keyPoints || [], questions: qs };
      }));

      subjects = [{
        id: subjectId,
        name: subSnap.exists() ? subSnap.data().name : subjectName,
        emoji: subSnap.exists() ? subSnap.data().emoji || '📚' : '📚',
        topics: topicsWithQ
      }];
    }

    buildFlashcards();
    document.getElementById('loading-wrap').style.display = 'none';
    showView('spider');
    buildOutline();
    // Defer spider build until after layout
    requestAnimationFrame(() => { requestAnimationFrame(() => buildSpider()); });
    // Award mindmap XP (students only)
    if (_currentUser && _currentProfile?.role === 'student') {
      awardXp(_currentUser.uid, 'mindmap').catch(() => {});
    }
  } catch(e) {
    document.getElementById('loading-wrap').innerHTML =
      `<div class="empty-state"><h3>Failed to load</h3><p>${e.message}</p></div>`;
  }
}

/* ── Flashcard data ──────────────────────────────────────── */
function buildFlashcards() {
  allFlashcards = [];
  subjects.forEach(s => {
    s.topics.forEach(t => {
      const kps = t.keyPoints || [];
      if (kps.length) {
        // Key points → flashcards (primary)
        const flatItems = getFlatTopicItems(t);
        flatItems.forEach(item => {
          if (item.term || item.detail) {
            allFlashcards.push({ front: item.term || item.detail, back: item.detail || item.term, type: 'Key point', topic: t.name });
          }
        });
      } else {
        // Fallback to questions
        (t.questions || []).forEach(q => {
          const card = questionToFlashcard(q, t.name);
          if (card) allFlashcards.push(card);
        });
      }
    });
  });
  shuffle(allFlashcards);
}

function questionToFlashcard(q, topicName) {
  if (q.type === 'mcq') {
    const correct = (q.options||[]).find(o => o.correct);
    return { front: q.question, back: correct?.text || '?', type: 'MCQ', topic: topicName };
  }
  if (q.type === 'tf') {
    return { front: q.question, back: (q.answer ? '✅ True' : '❌ False') + (q.explanation ? '\n\n' + q.explanation : ''), type: 'T/F', topic: topicName };
  }
  if (q.type === 'fill') {
    const front = (q.sentence||'').replace('_____', '_____');
    return { front, back: q.answer, type: 'Fill', topic: topicName };
  }
  if (q.type === 'match') {
    // One card per pair
    return (q.pairs||[]).map(p => ({ front: p.left, back: p.right, type: 'Match', topic: topicName }));
  }
  if (q.type === 'short') {
    return { front: q.question, back: q.markScheme, type: 'Short', topic: topicName };
  }
  return null;
}

/* ── View switching ──────────────────────────────────────── */
window._spiderBack = async function() {
  document.getElementById('btn-spider-back').style.display = 'none';
  document.getElementById('spider-hint').textContent = 'Tap a topic to explore · Drag to pan · Pinch to zoom';
  await loadData();
  buildSpider();
};

window._resetSpiderView = function() {
  panX = 0; panY = 0; zoom = 1;
  // If drilled in, just re-centre without reloading
  const canvas = document.getElementById('spider-canvas');
  drawSpider(canvas.getContext('2d'), canvas);
};

window._closeSpiderDetail = function() {
  document.getElementById('spider-detail').classList.remove('open');
  document.getElementById('spider-hint').style.opacity = '1';
  // Deselect node
  selectedLeaf = null;
  const canvas = document.getElementById('spider-canvas');
  drawSpider(canvas.getContext('2d'), canvas);
};

// Outline accordion delegation
document.addEventListener('click', e => {
  const sh = e.target.closest('[data-action="toggle-subject"]');
  if (sh) { sh.parentElement.classList.toggle('open'); return; }
  const th = e.target.closest('[data-action="toggle-topic"]');
  if (th) { th.parentElement.classList.toggle('open'); return; }
});

window._switchView = function(v) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  showView(v);
  if (v === 'flashcards') { fcIdx = 0; fcFlipped = false; buildFlashcards(); renderFlashcard(); }
  if (v === 'spider') buildSpider();
};

function showView(v) {
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
}

/* ══════════════════════════════════════════════════════════
   SPIDER DIAGRAM
   Layout: centre = topic/subject, branches = key points
   Each key point is a rounded rectangle label on a branch
══════════════════════════════════════════════════════════ */

// Spider colours — read from CSS vars once
function spiderColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    primary:  s.getPropertyValue('--color-primary').trim()      || '#6c63ff',
    surface:  s.getPropertyValue('--color-surface').trim()      || '#16162a',
    surface2: s.getPropertyValue('--color-surface-2').trim()    || '#1e1e38',
    border:   s.getPropertyValue('--color-border').trim()       || '#2a2a4a',
    text:     s.getPropertyValue('--color-text').trim()         || '#f0f0ff',
    muted:    s.getPropertyValue('--color-text-muted').trim()   || '#8888aa',
    bg:       s.getPropertyValue('--color-bg').trim()           || '#0d0d1a',
  };
}

function buildSpider() {
  const canvas = document.getElementById('spider-canvas');
  const wrap   = document.getElementById('view-spider');
  const w = wrap.offsetWidth  || window.innerWidth;
  const h = wrap.offsetHeight || (window.innerHeight - 64);
  canvas.width  = w;
  canvas.height = h;

  // Gather content — single topic or first topic of subject
  const sub = subjects[0];
  const allTopics = sub.topics || [];

  // Build flat list of { topicName, items: [{term, explanation}] }
  // If single topic: show topic at centre, key points as branches
  // If multiple topics: show subject at centre, topics as mid-nodes, key points as leaves
  spiderNodes = [];
  spiderEdges = [];

  const cx = w / 2, cy = h / 2;
  const C = spiderColors();

  if (allTopics.length === 1) {
    // ── Single topic: centre = topic, branches = groups or key points ──
    const t = allTopics[0];
    const items = getTopicItems(t);
    spiderNodes.push({ x: cx, y: cy, label: t.name, type: 'root', r: 56 });

    if (items.length && items[0].isGroup) {
      // Three-level: topic → groups → key points
      // Each group fans its leaves outward. We need enough angular space per group
      // to spread its leaves without overlapping adjacent groups' leaves.
      const groupCount = items.length;
      const totalLeaves = items.reduce((a, g) => a + (g.points||[]).length, 0);
      const maxLeafsPerGroup = Math.max(...items.map(g => (g.points||[]).length));
      const sliceAngle = (Math.PI * 2) / groupCount;

      // Three-level layout needs:
      //   rootR (56) + gap + groupR + gap + leafR + pill(~28px) < min(w,h)/2
      // We work outward from centre.
      const canvasR = Math.min(w, h) / 2 - 80; // usable radius with margin
      const rootR   = 56;
      const groupNodeR = 38;

      // Group ring: just far enough from centre that group nodes don't overlap root
      // Minimum arc gap between adjacent group nodes = groupNodeR * 2.5
      const minGroupArc = groupNodeR * 2.5;
      const minGroupR = Math.max(rootR + groupNodeR + 60, (groupCount * minGroupArc) / (Math.PI * 2));
      const groupR = Math.min(canvasR * 0.38, minGroupR);

      // Leaf ring: fills the remaining space from groupR to canvas edge
      // Leaves radiate from the GROUP NODE position, not the canvas centre
      // So leafR is the distance FROM the group node to the leaf
      const remainingR = canvasR - groupR; // space left between group ring and canvas edge
      // Each leaf pill ~130px; fit maxLeafsPerGroup in the fan (80% of slice)
      const fanAngle = sliceAngle * 0.8;
      const pillW = 120;
      // Arc length needed = maxLeafsPerGroup * (pillW + 12)
      const neededArc = maxLeafsPerGroup * (pillW + 12);
      const minLeafR = neededArc / fanAngle;
      const leafR = Math.max(100, Math.min(remainingR * 0.85, minLeafR));

      // If leaves still won't fit, scale pills down
      const actualArc = leafR * fanAngle;
      const sf = actualArc < neededArc ? Math.max(0.6, actualArc / neededArc) : 1;

      items.forEach((grp, gi) => {
        const centreAngle = (gi / groupCount) * Math.PI * 2 - Math.PI / 2;
        const gx = cx + Math.cos(centreAngle) * groupR;
        const gy = cy + Math.sin(centreAngle) * groupR;
        const grpIdx = spiderNodes.length;
        spiderNodes.push({ x: gx, y: gy, label: grp.term, type: 'topic', r: groupNodeR });
        spiderEdges.push({ from: 0, to: grpIdx });

        const pts = (grp.points || []).map(p => ({ term: p.term, detail: p.explanation || '' }));
        if (!pts.length) return;

        pts.forEach((pt, pi) => {
          const t2 = pts.length === 1 ? 0.5 : pi / (pts.length - 1);
          const leafAngle = centreAngle - fanAngle / 2 + t2 * fanAngle;
          // Leaf position is from GROUP NODE, not canvas centre
          const lx = gx + Math.cos(leafAngle) * leafR;
          const ly = gy + Math.sin(leafAngle) * leafR;
          const margin = 50;
          spiderNodes.push({
            x: Math.max(margin, Math.min(w - margin, lx)),
            y: Math.max(margin, Math.min(h - margin, ly)),
            label: pt.term, detail: pt.detail, type: 'leaf', r: 0, scaleFactor: sf
          });
          spiderEdges.push({ from: grpIdx, to: spiderNodes.length - 1 });
        });
      });
    } else {
      layoutBranches(cx, cy, items, 0, C, w, h);
    }
  } else {
    // ── Subject view: centre = subject, ring = topics, leaves per topic ──
    spiderNodes.push({ x: cx, y: cy, label: (sub.emoji||'📚') + ' ' + sub.name, type: 'root', r: 56 });

    // How many leaves per topic — limit to keep it readable (max 6 per topic)
    const maxLeavesPerTopic = 6;
    // Topic ring radius — push out further if many topics
    const topicR = Math.min(w, h) * Math.max(0.22, Math.min(0.32, 0.18 + allTopics.length * 0.02));

    allTopics.forEach((t, i) => {
      const angle = (i / allTopics.length) * Math.PI * 2 - Math.PI / 2;
      const tx = cx + Math.cos(angle) * topicR;
      const ty = cy + Math.sin(angle) * topicR;
      const topicIdx = spiderNodes.length;
      // Store topic data for click navigation
      spiderNodes.push({ x: tx, y: ty, label: t.name, type: 'topic', r: 42, topicData: t });
      spiderEdges.push({ from: 0, to: topicIdx });

      // Show key point count as a small label on the topic node
      const kpCount = (t.keyPoints||[]).length || (t.questions||[]).length;
      if (kpCount) {
        spiderNodes[topicIdx].countLabel = kpCount + ' pts';
      }
    });
  }

  panX = 0; panY = 0; zoom = 1;
  focusedGroupIdx = null;
  const ctx = canvas.getContext('2d');
  drawSpider(ctx, canvas);
  setupSpiderInteraction(canvas, ctx);
  selectedLeaf = null;
}

function isGroupedKps(kps) {
  if (!kps.length || typeof kps[0] !== 'object' || !('group' in kps[0])) return false;
  // Must have more than 1 group, or 1 group with an actual name
  // (single unnamed group = flat data wrapped in a group by AI mistake)
  if (kps.length === 1 && !kps[0].group) return false;
  return kps.length > 1 || (kps.length === 1 && !!kps[0].group);
}

function normaliseKps(kps) {
  // Always returns a flat array of {term, explanation}
  // Handles: flat [{term,explanation}], grouped [{group,points:[{term,explanation}]}],
  // and the AI mistake of single unnamed group [{group:'',points:[...]}]
  if (!kps || !kps.length) return [];
  if ('group' in kps[0]) {
    // Any grouped format — unwrap all points
    return kps.flatMap(g => (g.points || []).map(p => ({ term: p.term, explanation: p.explanation })));
  }
  return kps;
}

function getTopicItems(t) {
  const kps = t.keyPoints || [];
  if (kps.length) {
    if (isGroupedKps(kps)) {
      // True grouped: return group nodes as intermediates
      return kps.map(g => ({ term: g.group, detail: '', isGroup: true, points: g.points || [] }));
    }
    // Flat or single-unnamed-group — flatten and return as leaves
    const flat = normaliseKps(kps);
    return flat.map(kp => ({ term: kp.term, detail: kp.explanation }));
  }
  return (t.questions || []).map(q => {
    const text = (q.question || q.sentence || q.instruction || '').substring(0, 40);
    return { term: text, detail: '' };
  });
}

function getFlatTopicItems(t) {
  const kps = t.keyPoints || [];
  if (!kps.length) return getTopicItems(t);
  const flat = normaliseKps(kps);
  return flat.map(kp => ({ term: kp.term, detail: kp.explanation }));
}

function layoutBranches(cx, cy, items, startIdx, C, w, h) {
  const count = items.length;
  if (!count) return;

  // Pill dimensions — estimate average pill width
  const pillW = 160; // approximate max pill width in px
  const pillH = 32;
  const rootR = 60; // centre node radius

  // The circumference needed to fit all pills without overlap
  // Each pill needs ~pillW + gap pixels of arc space
  const gapBetween = 24;
  const arcPerItem = pillW + gapBetween;
  const minCircumference = count * arcPerItem;
  const minRadius = minCircumference / (2 * Math.PI);

  // Also must leave margin from edges
  const margin = pillW / 2 + 16;
  const maxRadius = Math.min(w / 2, h / 2) - margin;

  // Use whichever is larger — fit all pills, but cap to canvas
  const r = Math.min(Math.max(minRadius, rootR + 120), maxRadius);

  // If items still won't fit at maxRadius, scale down pill rendering (handled in draw)
  const scaleFactor = r === maxRadius && minRadius > maxRadius
    ? maxRadius / minRadius
    : 1;

  items.forEach((item, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    const bx = cx + Math.cos(angle) * r;
    const by = cy + Math.sin(angle) * r;
    const nodeIdx = spiderNodes.length;
    spiderNodes.push({
      x: bx, y: by,
      label: item.term || '',
      detail: item.detail || '',
      type: 'leaf', angle,
      scaleFactor
    });
    spiderEdges.push({ from: startIdx, to: nodeIdx });
  });
}

function drawSpider(ctx, canvas) {
  const C = spiderColors();
  ctx.globalAlpha = 1.0; // always start clean
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Draw edges first
  spiderEdges.forEach((e, ei) => {
    const a = spiderNodes[e.from];
    const b = spiderNodes[e.to];
    // Dim edge if focus mode active and neither node is in focus set
    const edgeDimmed = focusedNodeSet && (!focusedNodeSet.has(e.from) || !focusedNodeSet.has(e.to));
    ctx.globalAlpha = edgeDimmed ? 0.08 : 1.0;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    // Curved line for leaves
    if (b.type === 'leaf') {
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      ctx.quadraticCurveTo(mx, my, b.x, b.y);
    } else {
      ctx.lineTo(b.x, b.y);
    }
    ctx.strokeStyle = b.type === 'leaf' ? C.primary + '60' : C.primary + '90';
    ctx.lineWidth = b.type === 'leaf' ? 1.5 : 2.5;
    ctx.setLineDash([]);
    ctx.stroke();
  });
  ctx.globalAlpha = 1.0;

  // Determine which node indices belong to focused group
  let focusedNodeSet = null;
  if (focusedGroupIdx !== null) {
    focusedNodeSet = new Set([0, focusedGroupIdx]); // root + group node always visible
    // Add all leaves connected to focused group
    spiderEdges.forEach(e => {
      if (e.from === focusedGroupIdx) focusedNodeSet.add(e.to);
    });
  }

  // Draw nodes
  spiderNodes.forEach((n, ni) => {
    // Apply dim if focus mode active and this node not in focus set
    const dimmed = focusedNodeSet && !focusedNodeSet.has(ni);
    ctx.globalAlpha = dimmed ? 0.15 : 1.0;

    if (n.type === 'root') {
      // Centre circle
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = C.primary;
      ctx.fill();
      // Glow
      const grd = ctx.createRadialGradient(n.x, n.y, n.r * 0.5, n.x, n.y, n.r * 1.4);
      grd.addColorStop(0, C.primary + '30');
      grd.addColorStop(1, C.primary + '00');
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r * 1.4, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      // Label
      drawWrappedText(ctx, n.label, n.x, n.y, n.r * 1.5, '#ffffff', 'bold 14px sans-serif', 16);

    } else if (n.type === 'topic') {
      // Topic mid-node
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = C.surface2;
      ctx.fill();
      ctx.strokeStyle = C.primary;
      ctx.lineWidth = 2;
      ctx.stroke();
      drawWrappedText(ctx, n.label, n.x, n.y, n.r * 1.6, C.text, '600 12px sans-serif', 14);
      // Draw count badge and tap hint
      if (n.countLabel) {
        const badgeX = n.x + n.r * 0.6;
        const badgeY = n.y - n.r * 0.6;
        ctx.beginPath();
        ctx.arc(badgeX, badgeY, 14, 0, Math.PI * 2);
        ctx.fillStyle = C.primary;
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 9px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(n.countLabel, badgeX, badgeY);
      }

    } else if (n.type === 'leaf') {
      // Key point label — pill/rounded rect
      const label = n.label || '';
      ctx.font = '12px sans-serif';
      const tw = ctx.measureText(label).width;
      const pw = Math.max(tw + 20, 60);
      const ph = 28;
      const rx = n.x - pw/2;
      const ry = n.y - ph/2;

      // Scale pill for dense diagrams
      const sf = n.scaleFactor || 1;
      const spw = pw * sf;
      const sph = Math.max(ph * sf, 20);
      const srx = n.x - spw/2;
      const sry = n.y - sph/2;
      const fontSize = Math.max(Math.round(12 * sf), 9);
      const cornerR = Math.max(14 * sf, 8);

      // Pill background
      ctx.beginPath();
      roundRect(ctx, srx, sry, spw, sph, cornerR);
      ctx.fillStyle = C.surface2;
      ctx.fill();
      ctx.strokeStyle = C.primary + '80';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Term text — highlight if selected
      const isSelected = selectedLeaf && selectedLeaf.label === n.label && selectedLeaf.x === n.x;
      if (isSelected) {
        ctx.beginPath();
        roundRect(ctx, srx - 2, sry - 2, spw + 4, sph + 4, cornerR + 1);
        ctx.fillStyle = C.primary;
        ctx.fill();
      }
      ctx.fillStyle = isSelected ? '#fff' : C.text;
      ctx.font = `600 ${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxChars = Math.max(Math.floor(28 * sf), 10);
      ctx.fillText(label.length > maxChars ? label.substring(0, maxChars - 2)+'…' : label, n.x, n.y);
    }
  });

  ctx.globalAlpha = 1.0; // reset
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawWrappedText(ctx, text, cx, cy, maxW, color, font, lineH) {
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
    else cur = test;
  });
  if (cur) lines.push(cur);
  const startY = cy - ((lines.length - 1) * lineH) / 2;
  lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineH));
}

function handleSpiderClick(clientX, clientY, canvas) {
  const rect = canvas.getBoundingClientRect();
  // Convert screen coords to canvas/world coords
  const cx = (clientX - rect.left - panX) / zoom;
  const cy2 = (clientY - rect.top  - panY) / zoom;

  // Find which leaf node was clicked
  let hit = null;
  for (const n of spiderNodes) {
    if (n.type !== 'leaf') continue;
    const label = n.label || '';
    const ctx2 = canvas.getContext('2d');
    const sf = n.scaleFactor || 1;
    ctx2.font = '12px sans-serif';
    const tw = ctx2.measureText(label).width;
    const pw = Math.max(tw + 20, 60) * sf;
    const ph = Math.max(28 * sf, 20);
    if (cx >= n.x - pw/2 && cx <= n.x + pw/2 && cy2 >= n.y - ph/2 && cy2 <= n.y + ph/2) {
      hit = n; break;
    }
  }

  if (hit && hit.detail) {
    selectedLeaf = hit;
    document.getElementById('spider-detail-term').textContent = hit.label;
    document.getElementById('spider-detail-explanation').textContent = hit.detail;
    document.getElementById('spider-detail').classList.add('open');
    document.getElementById('spider-hint').style.opacity = '0';
    drawSpider(canvas.getContext('2d'), canvas);
    return;
  }

  // Check for topic/group node click
  for (let ni = 0; ni < spiderNodes.length; ni++) {
    const n = spiderNodes[ni];
    if (n.type !== 'topic') continue;
    const dist = Math.hypot(cx - n.x, cy2 - n.y);
    if (dist <= n.r) {
      if (n.topicData) {
        // Subject view: drill into topic
        subjects[0] = { ...subjects[0], topics: [n.topicData] };
        focusedGroupIdx = null;
        buildSpider();
        document.getElementById('btn-spider-back').style.display = 'block';
        document.getElementById('spider-hint').style.opacity = '1';
        document.getElementById('spider-hint').textContent = 'Tap a key point to see details · Drag to pan';
      } else {
        // Three-level grouped view: toggle focus on this group
        const spiderCanvas = document.getElementById('spider-canvas');
        if (focusedGroupIdx === ni) {
          // Unfocus
          focusedGroupIdx = null;
          document.getElementById('spider-hint').textContent = 'Tap a group to focus · Tap a key point for details · Drag to pan';
        } else {
          // Focus this group and zoom to it
          focusedGroupIdx = ni;
          const targetX = spiderCanvas.width  / 2 - n.x * zoom;
          const targetY = spiderCanvas.height / 2 - n.y * zoom;
          panX = targetX;
          panY = targetY;
          document.getElementById('spider-hint').textContent = `${n.label} — tap group again to unfocus`;
        }
        drawSpider(spiderCanvas.getContext('2d'), spiderCanvas);
      }
      return;
    }
  }

  // Click on empty space — close detail and reset focus
  const spiderCanvas2 = document.getElementById('spider-canvas');
  if (focusedGroupIdx !== null) {
    focusedGroupIdx = null;
    drawSpider(spiderCanvas2.getContext('2d'), spiderCanvas2);
    document.getElementById('spider-hint').textContent = 'Tap a group to focus · Tap a key point for details · Drag to pan';
  }
  window._closeSpiderDetail && window._closeSpiderDetail();
}

function setupSpiderInteraction(canvas, ctx) {
  const c = canvas;
  // Always re-attach — canvas is reused, not cloned
  c._spiderSetup = true;
  const drawFn = () => drawSpider(c.getContext('2d'), c);

  let clickStartX = 0, clickStartY = 0;
  c.addEventListener('mousedown', e => { dragging = true; dragStartX = e.clientX; dragStartY = e.clientY; panStartX = panX; panStartY = panY; clickStartX = e.clientX; clickStartY = e.clientY; });
  c.addEventListener('mousemove', e => { if (!dragging) return; panX = panStartX + (e.clientX - dragStartX); panY = panStartY + (e.clientY - dragStartY); drawFn(); });
  c.addEventListener('mouseup', e => {
    dragging = false;
    // Only register as click if mouse didn't move much (not a drag)
    const dist = Math.hypot(e.clientX - clickStartX, e.clientY - clickStartY);
    if (dist < 6) handleSpiderClick(e.clientX, e.clientY, c);
  });
  c.addEventListener('mouseleave', () => dragging = false);
  c.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    zoom = Math.max(0.3, Math.min(3, zoom * delta));
    drawFn();
  }, { passive: false });

  // Touch
  let lastTouchDist = 0;
  c.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { dragging = true; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY; panStartX = panX; panStartY = panY; }
    if (e.touches.length === 2) { lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
  });
  c.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) { panX = panStartX + (e.touches[0].clientX - dragStartX); panY = panStartY + (e.touches[0].clientY - dragStartY); drawFn(); }
    if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      zoom = Math.max(0.3, Math.min(3, zoom * (dist / lastTouchDist)));
      lastTouchDist = dist; drawFn();
    }
  }, { passive: false });
  let touchStartX = 0, touchStartY = 0;
  c.addEventListener('touchstart', e2 => {
    if (e2.touches.length === 1) { touchStartX = e2.touches[0].clientX; touchStartY = e2.touches[0].clientY; }
  }, { passive: true });
  c.addEventListener('touchend', e => {
    dragging = false;
    if (e.changedTouches.length === 1) {
      const dist = Math.hypot(e.changedTouches[0].clientX - touchStartX, e.changedTouches[0].clientY - touchStartY);
      if (dist < 10) handleSpiderClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY, c);
    }
  });

  window.addEventListener('resize', () => {
    const wrap = document.getElementById('view-spider');
    c.width = wrap.clientWidth; c.height = wrap.clientHeight;
    buildSpider();
  });
}

/* ══════════════════════════════════════════════════════════
   OUTLINE VIEW
══════════════════════════════════════════════════════════ */
function buildOutline() {
  const wrap = document.getElementById('view-outline');
  wrap.innerHTML = '';

  if (!subjects.length) {
    wrap.innerHTML = `<div class="empty-state"><h3>No content</h3></div>`;
    return;
  }

  subjects.forEach(s => {
    const subEl = document.createElement('div');
    subEl.className = 'outline-subject';

    const topics = s.topics || [];
    const totalQ = topics.reduce((acc, t) => acc + (t.questions||[]).length, 0);

    const totalPts = topics.reduce((acc, t) => acc + (t.keyPoints||[]).length, 0);
    const metaLabel = totalPts ? `${topics.length} topics · ${totalPts} key points` : `${topics.length} topics · ${totalQ} questions`;
    subEl.innerHTML = `
      <div class="outline-subject-header" data-action="toggle-subject">
        <span class="outline-subject-emoji">${s.emoji || '📚'}</span>
        <span class="outline-subject-name">${esc(s.name)}</span>
        <span style="font-size:0.8rem;color:var(--color-text-muted);margin-right:8px;">${metaLabel}</span>
        <span class="outline-chevron">›</span>
      </div>
      <div class="outline-topics" id="outline-topics-${s.id}"></div>`;
    // Auto-open first subject always
    subEl.classList.add('open');
    wrap.appendChild(subEl);

    const topicsWrap = subEl.querySelector('.outline-topics');
    topics.forEach(t => {
      const qs = t.questions || [];
      const kps = t.keyPoints || [];
      const topicEl = document.createElement('div');
      topicEl.className = 'outline-topic';

      // Use key points if available, otherwise fall back to questions
      let pointsHtml = '';
      if (kps.length) {
        // Re-detect: might be single unnamed group (AI mistake)
        const hasGroupKey = kps.length && 'group' in kps[0];
        if (hasGroupKey && !isGroupedKps(kps)) {
          // Single unnamed group — treat as flat
          const flat = normaliseKps(kps);
          pointsHtml = flat.map(kp => `
            <div class="keypoint-item">
              <div class="keypoint-term">${esc(kp.term||'')}</div>
              <div class="keypoint-explanation">${esc(kp.explanation||'')}</div>
            </div>`).join('');
        } else if (isGroupedKps(kps)) {
          pointsHtml = kps.map(g => `
            <div style="margin-bottom:var(--space-sm);">
              <div style="font-family:var(--font-ui);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-primary);padding:6px 0 4px;border-bottom:1px solid var(--color-border);margin-bottom:4px;">📂 ${esc(g.group)}</div>
              ${(g.points||[]).map(kp => `
                <div class="keypoint-item">
                  <div class="keypoint-term">${esc(kp.term)}</div>
                  <div class="keypoint-explanation">${esc(kp.explanation)}</div>
                </div>`).join('')}
            </div>`).join('');
        } else {
          pointsHtml = kps.map(kp => `
            <div class="keypoint-item">
              <div class="keypoint-term">${esc(kp.term)}</div>
              <div class="keypoint-explanation">${esc(kp.explanation)}</div>
            </div>`).join('');
        }
      } else {
        const derived = qs.map(q => questionToKeypoint(q)).filter(Boolean);
        pointsHtml = derived.length
          ? derived.map(kp => `
              <div class="keypoint-item">
                <div class="keypoint-term">${kp.type}</div>
                <div class="keypoint-explanation">${esc(kp.text)}</div>
              </div>`).join('')
          : '<div style="font-size:0.85rem;color:var(--color-text-muted);padding:8px 0;">No content yet</div>';
      }

      topicEl.innerHTML = `
        <div class="outline-topic-header" data-action="toggle-topic">
          <span class="outline-topic-name">📝 ${esc(t.name)}</span>
          <span class="outline-topic-count">${kps.length ? (isGroupedKps(kps) ? kps.reduce((a,g)=>a+(g.points||[]).length,0)+' pts' : kps.length+' pts') : qs.length+' Q'}</span>
          <span class="outline-topic-chevron">›</span>
        </div>
        <div class="outline-keypoints">${pointsHtml}</div>`;
      // Auto-open topic if single topic view
      if (topics.length === 1) topicEl.classList.add('open');
      topicsWrap.appendChild(topicEl);
    });
  });
}

function questionToKeypoint(q) {
  if (q.type === 'mcq')   return { type: 'MCQ', text: q.question };
  if (q.type === 'tf')    return { type: 'T/F', text: q.question + ' → ' + (q.answer ? 'True' : 'False') };
  if (q.type === 'fill')  return { type: 'Fill', text: (q.sentence||'').replace('_____', `[${q.answer}]`) };
  if (q.type === 'match') return { type: 'Match', text: (q.pairs||[]).map(p => `${p.left} → ${p.right}`).join(' | ') };
  if (q.type === 'short') return { type: 'Short', text: q.question };
  return null;
}

/* ══════════════════════════════════════════════════════════
   FLASHCARDS
══════════════════════════════════════════════════════════ */
function renderFlashcard() {
  const cards = flattenFlashcards();
  if (!cards.length) {
    document.getElementById('fc-front').textContent = 'No cards available';
    document.getElementById('fc-back').textContent = 'Add key points to this topic first';
    document.getElementById('fc-counter').textContent = '0 / 0';
    return;
  }

  document.getElementById('fc-meta').textContent = `${cards.length} cards`;
  const card = cards[fcIdx];
  document.getElementById('fc-hint').style.display = 'block';
  document.getElementById('fc-front').textContent = card.front;
  document.getElementById('fc-back').textContent = card.back;
  document.getElementById('fc-type').textContent = card.type || '';
  document.getElementById('fc-topic-label').textContent = card.topic || '';
  document.getElementById('fc-counter').textContent = `${fcIdx + 1} / ${cards.length}`;
  document.getElementById('fc-prev').disabled = fcIdx === 0;
  document.getElementById('fc-next').disabled = fcIdx === cards.length - 1;

  // Reset flip
  document.getElementById('flashcard').classList.remove('flipped');
  fcFlipped = false;
}

function flattenFlashcards() {
  const cards = [];
  allFlashcards.forEach(fc => {
    if (Array.isArray(fc)) cards.push(...fc.filter(Boolean));
    else if (fc) cards.push(fc);
  });
  return cards.filter(c => c && c.front);
}

window._flipCard  = () => { fcFlipped = !fcFlipped; document.getElementById('flashcard').classList.toggle('flipped', fcFlipped); };
window._prevCard  = () => { if (fcIdx > 0) { fcIdx--; fcFlipped = false; document.getElementById('flashcard').classList.remove('flipped'); renderFlashcard(); } };
window._nextCard  = () => { const cards = flattenFlashcards(); if (fcIdx < cards.length - 1) { fcIdx++; fcFlipped = false; document.getElementById('flashcard').classList.remove('flipped'); renderFlashcard(); } };

/* ── Utils ───────────────────────────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
<script>
window.showToast = function(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3500);
};
</script>

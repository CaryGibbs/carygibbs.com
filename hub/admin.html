<!DOCTYPE html>
<html lang="en" data-theme="parent">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasp — Admin</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .stub {
      text-align: center;
      padding: var(--space-2xl);
    }
    .stub h1 { font-size: 2rem; margin-bottom: var(--space-md); }
    .stub p { color: var(--color-text-muted); margin-bottom: var(--space-lg); }
    .phase-badge {
      display: inline-block;
      background: var(--color-primary-glow);
      color: var(--color-primary);
      padding: 4px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.8rem;
      font-family: var(--font-ui);
      font-weight: 600;
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body class="page-fade">
  <div class="stub">
    <div class="phase-badge">Phase 3 — Coming soon</div>
    <h1>⚙️ Admin Panel</h1>
    <p>Content management, question generation, and group administration.</p>
    <a href="index.html" class="btn btn-secondary">← Back to login</a>
  </div>
  <script type="module">
    import { auth } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      if (!user) window.location.href = 'index.html';
    });
  </script>
</body>
</html>

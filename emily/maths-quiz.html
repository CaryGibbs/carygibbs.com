<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily's Year 8 Maths – Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
    --text:#f0eeff;--muted:rgba(240,238,255,0.55);--dim:rgba(240,238,255,0.3);
    --purple:#7c6fcd;--purple-light:#c4bbff;--purple-bg:rgba(124,111,205,0.18);
    --teal:#3ecfac;--teal-light:#9ef5e2;--teal-bg:rgba(62,207,172,0.15);
    --amber:#f5a623;--amber-light:#ffd580;--amber-bg:rgba(245,166,35,0.15);
    --red:#e05c6a;--red-light:#ffaab3;--red-bg:rgba(224,92,106,0.15);
    --coral:#f07050;--coral-light:#ffbfad;--coral-bg:rgba(240,112,80,0.15);
    --pink:#d066a8;--pink-light:#f5b8e4;--pink-bg:rgba(208,102,168,0.15);
    --blue:#4a90d9;--blue-light:#a8d0ff;--blue-bg:rgba(74,144,217,0.15);
    --green:#5bbf6a;--green-light:#b2f0bb;--green-bg:rgba(91,191,106,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 60% 20%,rgba(255,255,255,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 80% 65%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 95% 40%,rgba(255,255,255,0.15) 0%,transparent 100%);pointer-events:none;z-index:0;}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.65rem 1.25rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .nav-home{display:flex;align-items:center;gap:6px;text-decoration:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);padding:5px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);transition:all 0.15s;white-space:nowrap;}
  .nav-home:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
  .nav-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
  .nav-subject{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--purple-light);white-space:nowrap;}
  .nav-spacer{flex:1;}
  .nav-btn{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 14px;border-radius:10px;border:1px solid;transition:all 0.15s;white-space:nowrap;}
  .nav-btn:hover{opacity:0.85;transform:translateY(-1px);}
  .nav-btn-map{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-light);}
  .nav-btn-quiz{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-light);}

  .wrap{max-width:660px;margin:0 auto;padding:2rem 1.25rem 4rem;position:relative;z-index:1;}

  header{text-align:center;margin-bottom:1.75rem;}
  .subject-tag{display:inline-block;background:var(--purple-bg);color:var(--purple-light);border:1px solid var(--purple);border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 16px;margin-bottom:0.75rem;}
  header h1{font-family:'Nunito',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;background:linear-gradient(135deg,var(--purple-light),var(--teal-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.4rem;}
  header p{color:var(--muted);font-size:14px;}

  /* TOPIC SELECTOR */
  #topic-selector{margin-bottom:1.5rem;}
  .selector-label{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dim);margin-bottom:0.65rem;}
  .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
  .topic-tile{padding:0.65rem 0.875rem;border-radius:12px;border:1px solid;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;text-align:left;background:transparent;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .topic-tile:hover{transform:translateY(-2px);}
  .topic-tile.selected::after{content:'✓';font-size:13px;}
  .topic-tile.selected{opacity:1 !important;}
  .tile-all{width:100%;margin-bottom:8px;padding:0.75rem 1rem;border-radius:12px;border:1px solid;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.15s;background:var(--purple-bg);border-color:var(--purple);color:var(--purple-light);display:flex;align-items:center;justify-content:space-between;}
  .tile-all:hover{transform:translateY(-2px);}
  .tile-all.selected::after{content:'✓';}
  .start-row{margin-top:1rem;display:flex;gap:10px;align-items:center;}
  .btn-start{flex:1;padding:0.9rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--purple),#5b8de8);color:#fff;transition:opacity 0.15s,transform 0.15s;}
  .btn-start:hover{opacity:0.9;transform:translateY(-1px);}
  .q-count-note{font-size:13px;color:var(--muted);}

  /* QUIZ */
  #quiz-screen{display:none;}
  .progress-row{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
  .progress-bar{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--teal));border-radius:3px;transition:width 0.4s ease;}
  .progress-label{font-size:13px;color:var(--muted);white-space:nowrap;}
  .score-pill{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:3px 12px;border-radius:20px;background:var(--purple-bg);color:var(--purple-light);border:1px solid var(--purple);white-space:nowrap;}

  .q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:1rem;animation:slideIn 0.3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .topic-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:1rem;border:1px solid;letter-spacing:0.02em;}
  .q-text{font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;line-height:1.5;margin-bottom:1.25rem;color:var(--text);}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:0.875rem 1rem;font-family:'Nunito Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:background 0.15s,border-color 0.15s,transform 0.1s;line-height:1.4;}
  .opt:hover:not(:disabled){background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.25);transform:translateY(-1px);}
  .opt:active:not(:disabled){transform:scale(0.98);}
  .opt.correct{background:rgba(91,191,106,0.12);border-color:rgba(91,191,106,0.5);color:#b2f0bb;}
  .opt.wrong{background:rgba(224,92,106,0.12);border-color:rgba(224,92,106,0.5);color:#ffaab3;}
  .opt.reveal{background:rgba(91,191,106,0.12);border-color:rgba(91,191,106,0.5);color:#b2f0bb;}
  .opt:disabled{cursor:default;}

  .feedback-box{margin-top:1rem;padding:0.875rem 1.1rem;border-radius:12px;font-size:14px;line-height:1.6;display:none;animation:fadeIn 0.25s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .feedback-box.correct{background:rgba(91,191,106,0.1);border:1px solid rgba(91,191,106,0.4);color:#b2f0bb;display:block;}
  .feedback-box.wrong{background:rgba(224,92,106,0.1);border:1px solid rgba(224,92,106,0.4);color:#ffaab3;display:block;}

  .btn-next{width:100%;padding:0.9rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--purple),#5b8de8);color:#fff;transition:opacity 0.15s,transform 0.15s;display:none;margin-top:0.75rem;}
  .btn-next:hover{opacity:0.9;transform:translateY(-1px);}

  /* END */
  #end-screen{display:none;text-align:center;}
  .end-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 1.5rem;margin-bottom:1.25rem;}
  .medal{font-size:56px;margin-bottom:0.5rem;}
  .final-score{font-family:'Nunito',sans-serif;font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--purple-light),var(--teal-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:0.25rem;}
  .final-pct{font-size:20px;color:var(--muted);margin-bottom:0.75rem;}
  .final-msg{font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:1.5rem;}
  .breakdown-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;}
  .breakdown-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .breakdown-topic{font-size:13px;font-weight:600;min-width:145px;text-align:left;}
  .breakdown-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
  .breakdown-bar{height:100%;border-radius:4px;transition:width 0.6s ease;}
  .breakdown-frac{font-size:12px;color:var(--muted);min-width:32px;text-align:right;}
  .end-btns{display:flex;gap:10px;margin-bottom:0.75rem;}
  .btn-retry{flex:1;padding:0.9rem;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--purple),#5b8de8);color:#fff;transition:opacity 0.15s,transform 0.15s;}
  .btn-retry:hover{opacity:0.9;transform:translateY(-1px);}
  .btn-change{flex:1;padding:0.9rem;border-radius:12px;border:1px solid var(--border2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;background:var(--surface);color:var(--text);transition:all 0.15s;}
  .btn-change:hover{border-color:rgba(255,255,255,0.25);}
  .back-link{font-size:13px;color:var(--muted);}
  .back-link a{color:var(--purple-light);text-decoration:none;}
  .back-link a:hover{text-decoration:underline;}
</style>
</head>
<body>

<nav>
  <a class="nav-home" href="index.html">🏠 All Subjects</a>
  <div class="nav-divider"></div>
  <span class="nav-subject">📐 Mathematics</span>
  <div class="nav-spacer"></div>
  <a class="nav-btn nav-btn-map" href="maths-mindmap.html">🗺 Mind Map</a>
  <a class="nav-btn nav-btn-quiz" href="maths-quiz.html">✏️ Full Quiz</a>
</nav>

<div class="wrap">
  <header>
    <div class="subject-tag">Year 8 · Mathematics · EOY Revision</div>
    <h1>Maths Quiz</h1>
    <p>Choose topics below — drill one area or mix them all</p>
  </header>

  <!-- TOPIC SELECTOR SCREEN -->
  <div id="selector-screen">
    <div id="topic-selector">
      <div class="selector-label">Choose topics to include</div>
      <button class="tile-all selected" id="tile-all" onclick="toggleAll()">🎲 All topics mixed <span style="font-size:11px;opacity:0.7;font-weight:600">30 questions</span></button>
      <div class="topic-grid" id="topic-grid"></div>
    </div>
    <div class="start-row">
      <button class="btn-start" onclick="startQuiz()">Start quiz →</button>
      <span class="q-count-note" id="q-count-note">30 questions</span>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="progress-label" id="prog-label">1 / 30</span>
      <span class="score-pill" id="score-pill">Score: 0</span>
    </div>
    <div class="q-card" id="q-card">
      <div class="topic-badge" id="q-badge"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-opts"></div>
      <div class="feedback-box" id="feedback"></div>
    </div>
    <button class="btn-next" id="next-btn" onclick="nextQ()"></button>
  </div>

  <!-- END SCREEN -->
  <div id="end-screen">
    <div class="end-card">
      <div class="medal" id="end-medal"></div>
      <div class="final-score" id="end-score"></div>
      <div class="final-pct" id="end-pct"></div>
      <div class="final-msg" id="end-msg"></div>
      <div class="breakdown-title">Topic breakdown</div>
      <div id="breakdown"></div>
    </div>
    <div class="end-btns">
      <button class="btn-retry" onclick="retryQuiz()">Try again →</button>
      <button class="btn-change" onclick="backToSelector()">Change topics</button>
    </div>
    <div class="back-link"><a href="maths-mindmap.html">← Back to mind map</a></div>
  </div>
</div>

<script>
const TOPICS = {
  "Indices":            {color:"#7c6fcd",light:"#c4bbff",bg:"rgba(124,111,205,0.18)",icon:"🔢"},
  "Transformations":    {color:"#3ecfac",light:"#9ef5e2",bg:"rgba(62,207,172,0.15)",icon:"📐"},
  "Brackets":           {color:"#f5a623",light:"#ffd580",bg:"rgba(245,166,35,0.15)",icon:"🧮"},
  "Linear Equations":   {color:"#e05c6a",light:"#ffaab3",bg:"rgba(224,92,106,0.15)",icon:"⚖️"},
  "Fractions & %":      {color:"#f07050",light:"#ffbfad",bg:"rgba(240,112,80,0.15)",icon:"🍕"},
  "Squares & Rounding": {color:"#d066a8",light:"#f5b8e4",bg:"rgba(208,102,168,0.15)",icon:"🔲"},
  "Circles":            {color:"#3ecfac",light:"#9ef5e2",bg:"rgba(62,207,172,0.15)",icon:"⭕"},
  "Standard Form":      {color:"#4a90d9",light:"#a8d0ff",bg:"rgba(74,144,217,0.15)",icon:"🔬"},
  "Statistics":         {color:"#5bbf6a",light:"#b2f0bb",bg:"rgba(91,191,106,0.15)",icon:"📊"},
};

const ALL_Q = [
  // INDICES
  {topic:"Indices",q:"What is 2⁴ × 2³ written as a single power?",opts:["2⁷","2¹²","4⁷","2¹"],ans:0,exp:"Multiplying same base → ADD powers: 2⁴ × 2³ = 2^(4+3) = <strong>2⁷</strong>."},
  {topic:"Indices",q:"Write 60 as a product of its prime factors.",opts:["2² × 3 × 5","2 × 3 × 10","4 × 15","2³ × 3²"],ans:0,exp:"Factor tree: 60 = 2 × 30 = 2 × 2 × 15 = 2 × 2 × 3 × 5 = <strong>2² × 3 × 5</strong>."},
  {topic:"Indices",q:"What is 5⁻² equal to?",opts:["−25","1/25","−1/25","25"],ans:1,exp:"Negative index = reciprocal: 5⁻² = 1/5² = <strong>1/25</strong>."},
  {topic:"Indices",q:"What is (3²)³?",opts:["3⁵","3⁶","9³","3⁸"],ans:1,exp:"Power of a power → MULTIPLY indices: (3²)³ = 3^(2×3) = <strong>3⁶</strong>."},
  {topic:"Indices",q:"Find the HCF of 24 and 36 using prime factors.",opts:["6","8","12","4"],ans:2,exp:"24 = 2³×3, 36 = 2²×3². Shared: 2²×3 = <strong>12</strong>."},
  {topic:"Indices",q:"Simplify: x⁵ ÷ x²",opts:["x³","x⁷","x¹⁰","x²"],ans:0,exp:"Dividing same base → SUBTRACT powers: x⁵ ÷ x² = <strong>x³</strong>."},
  // TRANSFORMATIONS
  {topic:"Transformations",q:"A square has rotational symmetry of order:",opts:["1","2","4","8"],ans:2,exp:"A square maps onto itself after 90°, 180°, 270° and 360° — <strong>4 positions</strong>, so order 4."},
  {topic:"Transformations",q:"Point A(3,1) is reflected in the y-axis. Where is A'?",opts:["(3,−1)","(−3,1)","(1,3)","(−3,−1)"],ans:1,exp:"Reflecting in y-axis flips x-sign only: (3,1) → <strong>(−3,1)</strong>."},
  {topic:"Transformations",q:"Which is NOT needed to describe a rotation?",opts:["Angle","Direction (CW/CCW)","Centre of rotation","Colour of shape"],ans:3,exp:"A rotation requires angle, direction, and centre. The <strong>colour</strong> is irrelevant."},
  {topic:"Transformations",q:"A shape is translated by vector (4, −3). If a point starts at (1, 5), where does it end?",opts:["(5, 2)","(−3, 8)","(5, 8)","(4, 2)"],ans:0,exp:"Add the vector: x: 1+4=5, y: 5+(−3)=2. Answer: <strong>(5, 2)</strong>."},
  // BRACKETS
  {topic:"Brackets",q:"Expand: 3(2x − 5)",opts:["6x − 15","6x − 5","6x + 15","5x − 15"],ans:0,exp:"3×2x = 6x and 3×(−5) = −15. Answer: <strong>6x − 15</strong>."},
  {topic:"Brackets",q:"Expand: (x + 3)(x + 4)",opts:["x² + 7x + 12","x² + 7x + 7","x² + 12","x² + 4x + 12"],ans:0,exp:"FOIL: x² + 4x + 3x + 12 = <strong>x² + 7x + 12</strong>."},
  {topic:"Brackets",q:"Factorise fully: 12x + 8",opts:["4(3x + 2)","2(6x + 4)","4(3x + 8)","12(x + 8)"],ans:0,exp:"HCF of 12 and 8 is 4: <strong>4(3x + 2)</strong>."},
  {topic:"Brackets",q:"If p = 4 and q = −3, find 2p − q²",opts:["−1","−17","1","17"],ans:0,exp:"2×4 − (−3)² = 8 − 9 = <strong>−1</strong>. Remember: (−3)² = +9."},
  {topic:"Brackets",q:"Expand and simplify: 2(x + 5) + 3(x − 2)",opts:["5x + 4","5x + 16","5x − 4","5x + 1"],ans:0,exp:"2x+10 + 3x−6 = <strong>5x + 4</strong>."},
  // LINEAR EQUATIONS
  {topic:"Linear Equations",q:"Solve: 3x + 7 = 22",opts:["x = 5","x = 4","x = 6","x = 3"],ans:0,exp:"3x = 15 → x = <strong>5</strong>."},
  {topic:"Linear Equations",q:"Solve: 5x − 3 = 2x + 9",opts:["x = 2","x = 3","x = 4","x = 6"],ans:2,exp:"3x = 12 → x = <strong>4</strong>."},
  {topic:"Linear Equations",q:"Solve: x/3 + 2 = 6",opts:["x = 4","x = 12","x = 8","x = 24"],ans:1,exp:"x/3 = 4 → x = <strong>12</strong>."},
  {topic:"Linear Equations",q:"Solve: 2(3x − 1) = 16",opts:["x = 2","x = 3","x = 4","x = 6"],ans:1,exp:"6x − 2 = 16 → 6x = 18 → x = <strong>3</strong>."},
  // FRACTIONS & %
  {topic:"Fractions & %",q:"Calculate: ²⁄₃ × ³⁄₄",opts:["1/2","2/3","5/7","6/12"],ans:0,exp:"(2×3)/(3×4) = 6/12 = <strong>1/2</strong>."},
  {topic:"Fractions & %",q:"A jacket costs £80, reduced by 15%. Sale price?",opts:["£12","£65","£68","£92"],ans:2,exp:"Multiplier 0.85: 80 × 0.85 = <strong>£68</strong>."},
  {topic:"Fractions & %",q:"A price rises from £50 to £60. Percentage increase?",opts:["10%","15%","20%","25%"],ans:2,exp:"(10 ÷ 50) × 100 = <strong>20%</strong>."},
  {topic:"Fractions & %",q:"Calculate: ³⁄₄ ÷ ¹⁄₂",opts:["3/8","1½","3/2","6/4"],ans:1,exp:"Keep, Change, Flip: 3/4 × 2/1 = 6/4 = <strong>1½</strong>."},
  // SQUARES & ROUNDING
  {topic:"Squares & Rounding",q:"Round 0.07463 to 2 significant figures.",opts:["0.07","0.075","0.074","0.0746"],ans:1,exp:"First sig fig is 7, second is 4. Next digit 6 ≥ 5 → round up: <strong>0.075</strong>."},
  {topic:"Squares & Rounding",q:"What is √169?",opts:["12","13","14","11"],ans:1,exp:"13 × 13 = 169, so √169 = <strong>13</strong>."},
  {topic:"Squares & Rounding",q:"Estimate √50 to 1 decimal place.",opts:["6.5","7.1","7.5","8.0"],ans:1,exp:"7² = 49, 8² = 64. √50 ≈ <strong>7.1</strong>."},
  {topic:"Squares & Rounding",q:"Round 34,756 to 3 significant figures.",opts:["34,700","34,800","35,000","34,756"],ans:1,exp:"3 sig figs: 3, 4, 7. Next digit is 5 → round up: <strong>34,800</strong>."},
  // CIRCLES
  {topic:"Circles",q:"Circumference of circle with diameter 10 cm? (π=3.14)",opts:["31.4 cm","15.7 cm","78.5 cm","314 cm"],ans:0,exp:"C = πd = 3.14 × 10 = <strong>31.4 cm</strong>."},
  {topic:"Circles",q:"Area of circle with radius 5 cm? (π=3.14)",opts:["15.7 cm²","31.4 cm²","78.5 cm²","157 cm²"],ans:2,exp:"A = πr² = 3.14 × 25 = <strong>78.5 cm²</strong>."},
  {topic:"Circles",q:"What fraction of a full circle is a semi-circle arc?",opts:["1/4","1/2","3/4","1/3"],ans:1,exp:"Semi = half: arc = <strong>½ × πd</strong>."},
  // STANDARD FORM
  {topic:"Standard Form",q:"Write 34,000,000 in standard form.",opts:["3.4 × 10⁷","34 × 10⁶","3.4 × 10⁶","0.34 × 10⁸"],ans:0,exp:"Move decimal 7 places left: <strong>3.4 × 10⁷</strong>."},
  {topic:"Standard Form",q:"Write 6.2 × 10⁻³ as an ordinary number.",opts:["6200","620","0.062","0.0062"],ans:3,exp:"Move decimal LEFT 3 places: <strong>0.0062</strong>."},
  {topic:"Standard Form",q:"Calculate (2 × 10³) × (4 × 10⁵) in standard form.",opts:["8 × 10⁸","8 × 10¹⁵","6 × 10⁸","8 × 10⁷"],ans:0,exp:"2×4=8, 3+5=8. Answer: <strong>8 × 10⁸</strong>."},
  // STATISTICS
  {topic:"Statistics",q:"Find the mean of: 4, 7, 9, 2, 8",opts:["7","6","5","8"],ans:1,exp:"Sum=30, count=5. Mean = <strong>6</strong>."},
  {topic:"Statistics",q:"Find the median of: 3, 8, 1, 6, 4",opts:["4","6","3","8"],ans:0,exp:"Sorted: 1,3,<strong>4</strong>,6,8. Middle = <strong>4</strong>."},
  {topic:"Statistics",q:"Which type of data is 'shoe size'?",opts:["Continuous","Discrete","Qualitative","None"],ans:1,exp:"Shoe sizes are specific values — that's <strong>discrete</strong> data."},
  {topic:"Statistics",q:"The temperatures in a week were: 12,15,11,14,13,16,10°C. What is the range?",opts:["4°C","5°C","6°C","7°C"],ans:2,exp:"Range = max − min = 16 − 10 = <strong>6°C</strong>."},
];

// Vars
let selectedTopics = new Set(Object.keys(TOPICS));
let isAllSelected = true;
let shuffledQ = [], idx = 0, score = 0, answered = false;
let topicTrack = {}, currentTopicFilter = null;

// Check URL for ?topic= param (from mind map links)
const urlTopic = new URLSearchParams(window.location.search).get('topic');

// Build topic tiles
(function buildTiles(){
  const grid = document.getElementById('topic-grid');
  Object.entries(TOPICS).forEach(([name, tc]) => {
    const count = ALL_Q.filter(q => q.topic === name).length;
    const btn = document.createElement('button');
    btn.className = 'topic-tile selected';
    btn.dataset.topic = name;
    btn.style.borderColor = tc.color;
    btn.style.color = tc.light;
    btn.style.background = tc.bg;
    btn.innerHTML = `${tc.icon} ${name} <span style="font-size:11px;opacity:0.65;font-weight:600">${count}q</span>`;
    btn.onclick = () => toggleTile(name, btn);
    grid.appendChild(btn);
  });
  updateQCount();
})();

// If came from mind map with a topic param — pre-select just that topic
if (urlTopic && TOPICS[urlTopic]) {
  currentTopicFilter = urlTopic;
  selectedTopics = new Set([urlTopic]);
  isAllSelected = false;
  document.querySelectorAll('.topic-tile').forEach(btn => {
    btn.classList.remove('selected');
    if (btn.dataset.topic === urlTopic) btn.classList.add('selected');
  });
  document.getElementById('tile-all').classList.remove('selected');
  updateQCount();
}

function toggleAll(){
  isAllSelected = !isAllSelected;
  selectedTopics = new Set(isAllSelected ? Object.keys(TOPICS) : []);
  document.querySelectorAll('.topic-tile').forEach(btn => {
    btn.classList.toggle('selected', isAllSelected);
  });
  document.getElementById('tile-all').classList.toggle('selected', isAllSelected);
  updateQCount();
}

function toggleTile(name, btn){
  if(selectedTopics.has(name)){
    selectedTopics.delete(name);
    btn.classList.remove('selected');
  } else {
    selectedTopics.add(name);
    btn.classList.add('selected');
  }
  isAllSelected = selectedTopics.size === Object.keys(TOPICS).length;
  document.getElementById('tile-all').classList.toggle('selected', isAllSelected);
  updateQCount();
}

function updateQCount(){
  const n = ALL_Q.filter(q => selectedTopics.has(q.topic)).length;
  document.getElementById('q-count-note').textContent = n + ' question' + (n===1?'':'s');
}

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startQuiz(){
  if(selectedTopics.size===0){ alert('Please select at least one topic!'); return; }
  const pool = ALL_Q.filter(q => selectedTopics.has(q.topic));
  shuffledQ = shuffle(pool);
  idx=0; score=0; answered=false;
  topicTrack={};
  selectedTopics.forEach(t => topicTrack[t]={right:0,total:0});
  document.getElementById('selector-screen').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  renderQ();
}

function renderQ(){
  answered=false;
  const q=shuffledQ[idx];
  const tc=TOPICS[q.topic];
  const total=shuffledQ.length;
  document.getElementById('prog-fill').style.width=((idx/total)*100)+'%';
  document.getElementById('prog-label').textContent=(idx+1)+' / '+total;
  document.getElementById('score-pill').textContent='Score: '+score;
  const badge=document.getElementById('q-badge');
  badge.textContent=tc.icon+' '+q.topic;
  badge.style.background=tc.bg; badge.style.color=tc.light; badge.style.borderColor=tc.color;
  document.getElementById('q-text').textContent=q.q;
  const optsEl=document.getElementById('q-opts');
  optsEl.innerHTML='';
  const order=shuffle([0,1,2,3]);
  order.forEach(i=>{
    const btn=document.createElement('button');
    btn.className='opt'; btn.textContent=q.opts[i]; btn.dataset.realIdx=i;
    btn.onclick=()=>choose(btn,i,q);
    optsEl.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback-box';
  document.getElementById('feedback').innerHTML='';
  const nb=document.getElementById('next-btn');
  nb.style.display='none';
  nb.textContent=idx<shuffledQ.length-1?'Next question →':'See my results →';
  const card=document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth; card.style.animation='slideIn 0.3s ease';
}

function choose(btn, chosen, q){
  if(answered) return;
  answered=true;
  topicTrack[q.topic].total++;
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(parseInt(b.dataset.realIdx)===q.ans) b.classList.add('reveal');
  });
  const fb=document.getElementById('feedback');
  if(chosen===q.ans){
    score++; topicTrack[q.topic].right++;
    btn.classList.remove('reveal'); btn.classList.add('correct');
    fb.className='feedback-box correct';
    fb.innerHTML='✓ <strong>Correct!</strong> '+q.exp;
  } else {
    btn.classList.remove('reveal'); btn.classList.add('wrong');
    fb.className='feedback-box wrong';
    fb.innerHTML='✗ <strong>Not quite.</strong> '+q.exp;
  }
  document.getElementById('score-pill').textContent='Score: '+score;
  document.getElementById('next-btn').style.display='block';
}

function nextQ(){
  idx++;
  if(idx>=shuffledQ.length){ showEnd(); return; }
  renderQ();
}

function showEnd(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('end-screen').style.display='block';
  const total=shuffledQ.length;
  const pct=Math.round((score/total)*100);
  document.getElementById('end-medal').textContent=pct>=90?'🥇':pct>=70?'🥈':pct>=50?'🥉':'📚';
  document.getElementById('end-score').textContent=score+'/'+total;
  document.getElementById('end-pct').textContent=pct+'%';
  document.getElementById('end-msg').textContent=
    pct>=90?'Outstanding work, Emily! 🌟':
    pct>=70?'Great effort — nearly there!':
    pct>=50?'Good start! Check the explanations and try again.':
    'Keep practising — review the mind map first 📖';
  const bd=document.getElementById('breakdown');
  bd.innerHTML='';
  const shownTopics=[...new Set(shuffledQ.map(q=>q.topic))];
  shownTopics.forEach(t=>{
    const data=topicTrack[t]||{right:0,total:0};
    if(!data.total) return;
    const tc=TOPICS[t];
    const pctT=Math.round((data.right/data.total)*100);
    const row=document.createElement('div');
    row.className='breakdown-row';
    row.innerHTML=`<span class="breakdown-topic" style="color:${tc.light}">${tc.icon} ${t}</span><div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:0%;background:${tc.color}" data-w="${pctT}"></div></div><span class="breakdown-frac">${data.right}/${data.total}</span>`;
    bd.appendChild(row);
  });
  // animate bars
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.breakdown-bar').forEach(b=>{ b.style.width=b.dataset.w+'%'; });
  }));
}

function retryQuiz(){ startQuiz(); }
function backToSelector(){
  document.getElementById('end-screen').style.display='none';
  document.getElementById('selector-screen').style.display='block';
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily's Progress — Parent View</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0910;--surface:#141220;--card:#1a1825;--border:rgba(255,255,255,.08);--text:#f0eeff;--muted:rgba(240,238,255,.55);--dim:rgba(240,238,255,.3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,rgba(155,89,182,.25),rgba(52,152,219,.2));border-bottom:1px solid var(--border);padding:1.25rem 1.5rem;text-align:center;}
.header h1{font-family:'Nunito',sans-serif;font-size:clamp(1.3rem,3.5vw,1.9rem);font-weight:900;background:linear-gradient(135deg,#c4bbff,#9ef5e2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{color:var(--muted);font-size:12px;margin-top:.25rem;}
.wrap{max-width:980px;margin:0 auto;padding:1.25rem 1.5rem 3rem;}

/* TOP STATS */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;margin-bottom:1.25rem;}
@media(max-width:650px){.stats-row{grid-template-columns:repeat(3,1fr);}}
@media(max-width:400px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.8rem;text-align:center;}
.stat-val{font-family:'Nunito',sans-serif;font-size:1.7rem;font-weight:900;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:.2rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

/* SECTION LABELS */
.sec-label{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:.1rem 0 .75rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;}

/* TIME */
.time-tabs{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem;}
.time-tab{padding:.3rem .75rem;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;background:rgba(255,255,255,.05);color:var(--muted);transition:all .15s;font-family:'Nunito Sans',sans-serif;}
.time-tab.active{background:rgba(155,89,182,.2);border-color:rgba(155,89,182,.5);color:var(--text);}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem;}
@media(max-width:500px){.time-grid{grid-template-columns:repeat(2,1fr);}}
.time-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:.65rem;text-align:center;}
.time-card-val{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;line-height:1;}
.time-card-lbl{font-size:10px;color:var(--muted);margin-top:.2rem;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:.45rem;}
.bar-lbl{width:75px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;}
.bar-wrap{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.bar-val{width:55px;font-size:12px;font-weight:700;color:var(--text);flex-shrink:0;}

/* DAY-BY-DAY TABLE */
.day-table{width:100%;border-collapse:collapse;}
.day-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);padding:.5rem .75rem;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);}
.day-table td{padding:.6rem .75rem;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--muted);vertical-align:top;}
.day-table tr:last-child td{border-bottom:none;}
.day-table tr:hover td{background:rgba(255,255,255,.02);}
.day-date{font-family:'Nunito',sans-serif;font-weight:800;color:var(--text);white-space:nowrap;}
.day-date.today{color:#9ef5e2;}
.day-quizzes{display:flex;flex-wrap:wrap;gap:4px;}
.day-quiz-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;}
.pill-good{background:rgba(91,191,106,.15);color:#b2f0bb;}
.pill-ok{background:rgba(245,166,35,.15);color:#ffd580;}
.pill-weak{background:rgba(224,92,106,.15);color:#ffaab3;}
.day-time{font-size:12px;font-weight:700;color:#c4bbff;}
.day-xp{font-size:12px;font-weight:700;color:#ffd580;}
.day-no-activity{color:var(--dim);font-style:italic;font-size:12px;}
.chevron{color:var(--dim);font-size:13px;transition:transform .2s;cursor:pointer;}
.chevron.open{transform:rotate(90deg);}
.day-detail{display:none;padding:.5rem 0;}
.day-detail.open{display:block;}
.day-topic-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:2px 0;}
.day-topic-name{flex:1;color:var(--muted);}
.day-topic-bar-wrap{width:80px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.day-topic-bar{height:100%;border-radius:3px;}
.day-topic-pct{width:30px;text-align:right;font-weight:700;font-size:11px;}
.w{color:#ffaab3;}.m{color:#ffd580;}.g{color:#b2f0bb;}

/* HEATMAP */
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:.6rem;}
.hm-cell{width:14px;height:14px;border-radius:2px;background:rgba(255,255,255,.06);}
.hm-cell.a1{background:rgba(155,89,182,.3);}.hm-cell.a2{background:rgba(155,89,182,.55);}.hm-cell.a3{background:rgba(155,89,182,.8);}.hm-cell.a4{background:#9b59b6;}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:.5rem;font-size:10px;color:var(--dim);}
.hm-legend-cell{width:10px;height:10px;border-radius:2px;}

/* SUBJECTS */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.75rem;margin-bottom:1.25rem;}
.subj-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;overflow:hidden;}
.subj-bar{height:4px;border-radius:2px;margin-bottom:.7rem;}
.subj-name{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;margin-bottom:.2rem;}
.subj-meta{font-size:11px;color:var(--muted);margin-bottom:.5rem;}
.subj-pct{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;}
.tl-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px;}
.tl-name{flex:1;color:var(--muted);}
.tl-bar-wrap{width:60px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.tl-bar{height:100%;border-radius:3px;}
.tl-pct{width:28px;text-align:right;font-weight:700;}

/* CHART */
.chart-wrap{position:relative;height:80px;margin-top:.6rem;}
.chart-svg{width:100%;height:100%;display:block;}
.chart-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:2px;padding:0 4px;}

/* BADGES */
.badge-list{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.25rem;}
.bl-badge{background:var(--card);border:1px solid rgba(196,187,255,.25);border-radius:10px;padding:.3rem .7rem;font-size:12px;font-weight:700;}
.bl-locked{opacity:.28;filter:grayscale(1);}

/* FEED */
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
.feed-item:last-child{border-bottom:none;}
.feed-emoji{font-size:17px;flex-shrink:0;margin-top:1px;}
.feed-text{flex:1;color:var(--muted);line-height:1.5;}
.feed-text strong{color:var(--text);}
.feed-date{font-size:11px;color:var(--dim);flex-shrink:0;white-space:nowrap;}
.feed-score{padding:2px 7px;border-radius:7px;font-size:11px;font-weight:700;margin-left:5px;}
.sg{background:rgba(91,191,106,.15);color:#b2f0bb;}
.so{background:rgba(245,166,35,.15);color:#ffd580;}
.sw{background:rgba(224,92,106,.15);color:#ffaab3;}

.refresh-row{display:flex;gap:.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;}
.refresh-btn{background:rgba(155,89,182,.15);border:1px solid rgba(155,89,182,.3);color:#c4bbff;padding:.4rem .9rem;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;}
.refresh-btn:hover{background:rgba(155,89,182,.25);}
.last-updated{font-size:12px;color:var(--dim);}
.empty{text-align:center;padding:1.5rem;color:var(--dim);font-size:13px;}
.reset-section{border-top:1px solid rgba(255,255,255,.06);margin-top:2rem;padding-top:1.5rem;text-align:center;}
.reset-btn{background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.3);color:#ffaab3;padding:.6rem 1.5rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:background .15s;}
.reset-btn:hover{background:rgba(224,92,106,.22);}
.reset-confirm{display:none;margin-top:1rem;padding:1rem 1.25rem;background:rgba(224,92,106,.08);border:1px solid rgba(224,92,106,.25);border-radius:12px;}
.reset-confirm p{font-size:13px;color:var(--muted);margin-bottom:.75rem;line-height:1.6;}
.reset-confirm-btns{display:flex;gap:.75rem;justify-content:center;}
.reset-yes{background:#e05c6a;border:none;color:#fff;padding:.5rem 1.25rem;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;}
.reset-yes:hover{background:#c94d5a;}
.reset-no{background:rgba(255,255,255,.08);border:1px solid var(--border);color:var(--muted);padding:.5rem 1.25rem;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;}
.reset-area{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.06);}
.reset-btn{background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.3);color:#ffaab3;padding:.6rem 1.5rem;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:"Nunito Sans",sans-serif;transition:background .15s;}
.reset-btn:hover{background:rgba(224,92,106,.22);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease both;}
</style>

<body>
<div class="header">
  <h1>👩‍👧 Emily's Progress — Parent View</h1>
  <p>Live dashboard · syncs from Emily's device via Firebase · auto-refreshes every 60s</p>
</div>
<div class="wrap">
  <div class="refresh-row">
    <button class="refresh-btn" onclick="load()">🔄 Refresh</button>
    <span class="last-updated" id="last-updated">Connecting…</span>
  </div>
  <div id="main"></div>
  </div>

<script>


/* ── CONSTANTS ─────────────────────────────────────────── */
var BADGE_DEFS=[{id:'first_quiz',emoji:'🎉',title:'First Steps'},{id:'perfect_ten',emoji:'💯',title:'Perfect Ten'},{id:'streak_3',emoji:'🔥',title:'On Fire'},{id:'streak_7',emoji:'🌟',title:'Week Warrior'},{id:'streak_30',emoji:'🚀',title:'Unstoppable'},{id:'bookworm',emoji:'📚',title:'Bookworm'},{id:'explorer',emoji:'🌍',title:'Explorer'},{id:'sharp',emoji:'🎯',title:'Sharp Shooter'},{id:'comeback',emoji:'💪',title:'Comeback Kid'},{id:'star_pupil',emoji:'⭐',title:'Star Pupil'},{id:'trending',emoji:'📈',title:'Trending Up'},{id:'all_rounder',emoji:'🎪',title:'All-Rounder'},{id:'century',emoji:'💫',title:'Century'},{id:'night_owl',emoji:'🦉',title:'Night Owl'},{id:'early_bird',emoji:'🐦',title:'Early Bird'},{id:'lesson_20',emoji:'🧠',title:'Deep Diver'}];
var LEVELS=[{level:1,title:'Starter',xp:0,emoji:'🌱'},{level:2,title:'Learner',xp:100,emoji:'📖'},{level:3,title:'Scholar',xp:300,emoji:'🎓'},{level:4,title:'Expert',xp:600,emoji:'🔬'},{level:5,title:'Champion',xp:1000,emoji:'🏆'},{level:6,title:'Legend',xp:1500,emoji:'⭐'}];
var SI={maths:{name:'Mathematics',icon:'📐',g:['#4a90d9','#43b89c']},english:{name:'English',icon:'📗',g:['#e05c6a','#f5a623']},geography:{name:'Geography',icon:'🌍',g:['#5bbf6a','#4a90d9']},spanish:{name:'Spanish',icon:'🇪🇸',g:['#e05c6a','#f5a623']},science:{name:'Science',icon:'🔬',g:['#43b89c','#4a90d9']},re:{name:'RE',icon:'✝️',g:['#9b59b6','#3498db']}};

/* ── HELPERS ───────────────────────────────────────────── */
function getLevel(xp){xp=xp||0;var lv=LEVELS[0];for(var i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i].xp)lv=LEVELS[i];else break;}return lv;}
function pctCls(p){return p<60?'w':p<75?'m':'g';}
function barCol(p,c1,c2){if(p<60)return '#e05c6a';if(p<75)return '#f5a623';return 'linear-gradient(90deg,'+c1+','+c2+')';}
function scoreClass(p){return p>=80?'sg':p>=60?'so':'sw';}
function fmtTime(s){if(!s||s<60)return s?s+'s':'0m';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+'h '+(m>0?m+'m':'');return m+'m';}
function fmtTimeLong(s){if(!s)return '0 min';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+' hr '+(m>0?m+' min':'');return m+' min';}
function timeAgo(ts){var m=Math.round((Date.now()-ts)/60000);if(m<2)return 'just now';if(m<60)return m+'m ago';var h=Math.round(m/60);if(h<24)return h+'h ago';return Math.round(h/24)+'d ago';}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){var parts=d.split('-');var dt=new Date(parts[0],parts[1]-1,parts[2]);var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return days[dt.getDay()]+' '+dt.getDate()+' '+months[dt.getMonth()];}

/* ── HEATMAP ───────────────────────────────────────────── */
function drawHeatmap(timeLog){
  var t=new Date(),cells='';
  for(var i=83;i>=0;i--){var d=new Date(t);d.setDate(d.getDate()-i);var k=d.toISOString().slice(0,10);var s=(timeLog&&timeLog[k]&&timeLog[k].total)||0;var m=Math.round(s/60);var l=m===0?'':m<5?'a1':m<15?'a2':m<30?'a3':'a4';cells+='<div class="hm-cell '+l+'" title="'+k+(m>0?' · '+fmtTimeLong(s):'')+'"></div>';}
  return cells;
}

/* ── SCORE CHART ───────────────────────────────────────── */
function drawChart(sessions,c1,c2){
  if(!sessions||sessions.length<2)return '<div style="font-size:11px;color:var(--dim);padding:.4rem 0">Need 2+ quizzes for trend.</div>';
  var pts=sessions.slice(-20),n=pts.length,W=500,H=75,pad=5;
  var xs=pts.map(function(_,i){return pad+(i/(n-1))*(W-2*pad);});
  var ys=pts.map(function(s){return H-pad-((s.pct/100)*(H-2*pad));});
  var area='M'+xs[0]+' '+H;pts.forEach(function(_,i){area+=' L'+xs[i]+' '+ys[i];});area+=' L'+xs[n-1]+' '+H+' Z';
  var line='M'+xs[0]+' '+ys[0];pts.forEach(function(_,i){if(i>0)line+=' L'+xs[i]+' '+ys[i];});
  var y60=H-pad-(0.6*(H-2*pad)),y90=H-pad-(0.9*(H-2*pad));
  var gid='g'+Math.random().toString(36).slice(2,6),agid='ag'+Math.random().toString(36).slice(2,6);
  return '<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient>'
    +'<linearGradient id="'+agid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+c1+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+c1+'" stop-opacity=".02"/></linearGradient></defs>'
    +'<line x1="'+pad+'" y1="'+y60+'" x2="'+(W-pad)+'" y2="'+y60+'" stroke="rgba(224,92,106,.3)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<line x1="'+pad+'" y1="'+y90+'" x2="'+(W-pad)+'" y2="'+y90+'" stroke="rgba(91,191,106,.3)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<path d="'+area+'" fill="url(#'+agid+')"/>'
    +'<path d="'+line+'" fill="none" stroke="url(#'+gid+')" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +pts.map(function(s,i){var dc=s.pct>=90?'#5bbf6a':s.pct>=60?c1:'#e05c6a';return '<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="3.5" fill="'+dc+'"/>';}).join('')
    +'</svg></div>'
    +'<div class="chart-labels"><span>'+pts[0].date+'</span><span style="color:rgba(224,92,106,.6)">─60%</span><span style="color:rgba(91,191,106,.6)">─90%</span><span>'+pts[n-1].date+'</span></div>';
}

/* ── TIME SECTION ──────────────────────────────────────── */
var _period = '7';
var _allData = null;

function setPeriod(p){_period=p;if(_allData)renderMain(_allData);}

function buildTimeSection(timeLog, sessions){
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - (_period==='all'?3650:parseInt(_period)));
  var cutStr = cutoff.toISOString().slice(0,10);
  var tot={total:0,quiz:0,lesson:0,mindmap:0};
  var daily=[];
  Object.entries(timeLog||{}).forEach(function(e){
    var d=e[0],v=e[1]; if(d<cutStr)return;
    tot.total+=(v.total||0); tot.quiz+=(v.quiz||0); tot.lesson+=(v.lesson||0); tot.mindmap+=(v.mindmap||0);
    daily.push({date:d,secs:v.total||0});
  });
  daily.sort(function(a,b){return a.date.localeCompare(b.date);});
  var active=daily.filter(function(d){return d.secs>0;}).length;
  var avg=active>0?Math.round(tot.total/active):0;
  var qCount=(sessions||[]).filter(function(s){return s.date>=cutStr;}).length;
  var maxSecs=Math.max(tot.quiz,tot.lesson,tot.mindmap,1);

  var html='<div class="card anim">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">'
    +'<div style="font-family:Nunito,sans-serif;font-size:16px;font-weight:800">⏱ Time Spent</div>'
    +'<div class="time-tabs">'
    +['1','2','3','4','5','6','7','14','30','all'].map(function(p){
        var lbl={'1':'1d','2':'2d','3':'3d','4':'4d','5':'5d','6':'6d','7':'7d','14':'14d','30':'30d','all':'All'}[p]||p;
        return '<div class="time-tab '+(p===_period?'active':'')+'" onclick="setPeriod(\''+p+'\')" style="padding:.25rem .45rem;font-size:11px">'+lbl+'</div>';
      }).join('')
    +'</div></div>'
    +'<div class="time-grid">'
    +'<div class="time-card"><div class="time-card-val" style="color:#c4bbff">'+fmtTime(tot.total)+'</div><div class="time-card-lbl">Total time</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#9ef5e2">'+fmtTime(avg)+'</div><div class="time-card-lbl">Avg per active day</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#ffd580">'+active+'</div><div class="time-card-lbl">Active days</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#b2f0bb">'+qCount+'</div><div class="time-card-lbl">Quizzes taken</div></div>'
    +'</div>';

  if(tot.total>0){
    html+='<div style="margin-top:.25rem">';
    [{label:'Quizzes',secs:tot.quiz,color:'#9b59b6'},{label:'Lessons',secs:tot.lesson,color:'#3498db'},{label:'Mind Maps',secs:tot.mindmap,color:'#43b89c'}]
      .filter(function(b){return b.secs>0;})
      .forEach(function(b){
        var w=Math.round((b.secs/maxSecs)*100);
        html+='<div class="bar-row"><div class="bar-lbl">'+b.label+'</div>'
          +'<div class="bar-wrap"><div class="bar-fill" style="width:'+w+'%;background:'+b.color+'"></div></div>'
          +'<div class="bar-val">'+fmtTimeLong(b.secs)+'</div></div>';
      });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ── DAY BY DAY ────────────────────────────────────────── */
function buildDayByDay(sessions, timeLog) {
  // Group sessions by date
  var byDate = {};
  (sessions||[]).forEach(function(s) {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });

  // Merge with timeLog dates
  Object.keys(timeLog||{}).forEach(function(d) {
    if (!byDate[d]) byDate[d] = [];
  });

  var dates = Object.keys(byDate).sort().reverse().slice(0,30); // last 30 active days
  if (dates.length === 0) return '<div class="empty">No activity recorded yet.</div>';

  var todayStr = today();
  var html = '<table class="day-table"><thead><tr>'
    +'<th>Date</th><th>Time</th><th>Quizzes</th><th>XP</th><th style="width:20px"></th>'
    +'</tr></thead><tbody>';

  dates.forEach(function(d, idx) {
    var dayQuizzes = byDate[d] || [];
    var tl = (timeLog&&timeLog[d]) || {};
    var timeSecs = tl.total || 0;
    
    // Per-day XP: read from timeLog.xp written by quiz/lesson/mindmap pages.
    // Falls back to quiz-only estimate if xp field absent (older data before this fix).
    var dayXP = tl.xp || dayQuizzes.reduce(function(a,s) {
      var xp = 10;
      if (s.pct >= 90) xp += 15;
      if (s.score === s.total) xp += 20;
      return a + xp;
    }, 0);

    var detailId = 'day-detail-' + idx;
    var chevId = 'day-chev-' + idx;

    html += '<tr style="cursor:'+(dayQuizzes.length>0?'pointer':'default')+'" '
      + (dayQuizzes.length>0 ? 'onclick="togDay(\''+detailId+'\',\''+chevId+'\')"' : '')+'>';
    
    // Date
    html += '<td><div class="day-date'+(d===todayStr?' today':'')+'">'+fmtDate(d)+(d===todayStr?' <span style="font-size:10px;color:#9ef5e2;font-weight:700">TODAY</span>':'')+'</div></td>';
    
    // Time
    html += '<td><span class="day-time">'+(timeSecs>0?fmtTimeLong(timeSecs):'—')+'</span></td>';
    
    // Quizzes
    if (dayQuizzes.length === 0) {
      html += '<td><span class="day-no-activity">—</span></td>';
    } else {
      html += '<td><div class="day-quizzes">';
      dayQuizzes.forEach(function(s) {
        var si = SI[s.sid] || {name:s.sid, icon:'📝'};
        var cls = s.pct>=80?'pill-good':s.pct>=60?'pill-ok':'pill-weak';
        html += '<span class="day-quiz-pill '+cls+'">'+si.icon+' '+si.name+' '+s.score+'/'+s.total+'</span>';
      });
      html += '</div></td>';
    }
    
    // XP
    html += '<td><span class="day-xp">'+(dayXP>0?'+'+dayXP+' XP':'—')+'</span></td>';
    
    // Chevron
    html += '<td>'+(dayQuizzes.length>0?'<span class="chevron" id="'+chevId+'">›</span>':'')+'</td>';
    html += '</tr>';

    // Detail row — topic breakdown for each quiz that day
    if (dayQuizzes.length > 0) {
      html += '<tr><td colspan="5" style="padding:0 .75rem">'
        +'<div class="day-detail" id="'+detailId+'">';
      
      dayQuizzes.forEach(function(s) {
        var si = SI[s.sid] || {name:s.sid, icon:'📝'};
        var c1 = si.g ? si.g[0] : '#9b59b6';
        var c2 = si.g ? si.g[1] : '#3498db';
        html += '<div style="margin:.5rem 0;padding:.5rem .75rem;background:rgba(255,255,255,.03);border-radius:8px;">'
          +'<div style="font-family:Nunito,sans-serif;font-size:13px;font-weight:800;margin-bottom:.4rem;">'
          +si.icon+' '+si.name+' — '+s.score+'/'+s.total+' ('+s.pct+'%)'
          +'<span style="font-size:11px;font-weight:600;color:var(--dim);margin-left:8px">'+s.date+'</span></div>';
        
        if (s.topicScores && Object.keys(s.topicScores).length > 0) {
          Object.entries(s.topicScores).forEach(function(e) {
            var t=e[0], v=e[1];
            if (!v.t) return;
            var p = Math.round((v.c/v.t)*100);
            var bc = barCol(p,c1,c2);
            html += '<div class="day-topic-row">'
              +'<div class="day-topic-name">'+t+'</div>'
              +'<div class="day-topic-bar-wrap"><div class="day-topic-bar" style="width:'+p+'%;background:'+bc+'"></div></div>'
              +'<div class="day-topic-pct '+pctCls(p)+'">'+p+'%</div>'
              +'<div style="font-size:10px;color:var(--dim);width:40px;text-align:right">'+v.c+'/'+v.t+'</div>'
              +'</div>';
          });
        }
        html += '</div>';
      });
      
      // Time breakdown for the day
      if (timeSecs > 0) {
        html += '<div style="font-size:11px;color:var(--dim);padding:.3rem .75rem .5rem;display:flex;gap:12px;">';
        if (tl.quiz) html += '<span>📝 Quiz: '+fmtTimeLong(tl.quiz)+'</span>';
        if (tl.lesson) html += '<span>📖 Lessons: '+fmtTimeLong(tl.lesson)+'</span>';
        if (tl.mindmap) html += '<span>🗺 Mind maps: '+fmtTimeLong(tl.mindmap)+'</span>';
        html += '</div>';
      }
      
      html += '</div></td></tr>';
    }
  });

  html += '</tbody></table>';
  return html;
}

function togDay(id, cid) {
  var el=document.getElementById(id), ch=document.getElementById(cid);
  if(!el)return;
  var open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  ch.classList.toggle('open',!open);
}

/* ── MAIN RENDER ───────────────────────────────────────── */
function renderMain(data) {
  _allData = data;
  var summary  = data.summary  || {};
  var sessions = data.sessions || [];
  var timeLog  = data.timeLog  || {};
  var badges   = summary.badges || [];

  var xp = summary.xp || 0;
  var streak = summary.streak || 0;
  var lv = getLevel(xp);
  var totalCorrect = sessions.reduce(function(a,s){return a+(s.score||0);},0);
  var totalAns = sessions.reduce(function(a,s){return a+(s.total||0);},0);
  var ovPct = totalAns>0?Math.round((totalCorrect/totalAns)*100):0;
  var totalTimeSecs = Object.values(timeLog).reduce(function(a,v){return a+(v.total||0);},0);

  var html = '';

  // ── STATS ROW ──
  html += '<div class="stats-row anim">'
    +'<div class="stat"><div class="stat-val" style="color:#ffd580">'+xp+'</div><div class="stat-lbl">Total XP</div></div>'
    +'<div class="stat"><div class="stat-val">'+lv.emoji+'<span style="font-size:.95rem;color:#c4bbff"> '+lv.title+'</span></div><div class="stat-lbl">Level</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:'+(streak>0?'#ffd580':'var(--dim)')+'">🔥 '+streak+'</div><div class="stat-lbl">Streak</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:#b2f0bb">'+ovPct+'%</div><div class="stat-lbl">Overall score</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:#9ef5e2">'+fmtTime(totalTimeSecs)+'</div><div class="stat-lbl">Total time</div></div>'
    +'</div>';

  // ── TIME SECTION ──
  html += buildTimeSection(timeLog, sessions);

  // ── HEATMAP ──
  html += '<div class="card anim">'
    +'<div class="sec-label" style="margin:0 0 .3rem">Activity — last 12 weeks</div>'
    +'<div style="font-size:11px;color:var(--dim)">Darker = more time · hover for exact minutes</div>'
    +'<div class="heatmap-grid">'+drawHeatmap(timeLog)+'</div>'
    +'<div class="hm-legend">Less '
    +'<div class="hm-legend-cell" style="background:rgba(255,255,255,.08)"></div>'
    +'<div class="hm-legend-cell" style="background:rgba(155,89,182,.3)"></div>'
    +'<div class="hm-legend-cell" style="background:rgba(155,89,182,.6)"></div>'
    +'<div class="hm-legend-cell" style="background:#9b59b6"></div> More</div>'
    +'</div>';

  // ── DAY BY DAY ──
  html += '<div class="card anim">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'
    +'<div style="font-family:Nunito,sans-serif;font-size:16px;font-weight:800">📅 Day by Day</div>'
    +'<div style="font-size:11px;color:var(--dim)">Last 30 active days · click a row to expand</div>'
    +'</div>'
    + buildDayByDay(sessions, timeLog)
    +'</div>';

  // ── BADGES ──
  html += '<div class="sec-label">Badges — '+badges.length+'/'+BADGE_DEFS.length+'</div>'
    +'<div class="badge-list anim">';
  BADGE_DEFS.forEach(function(b){
    var earned=badges.indexOf(b.id)>-1;
    html+='<div class="bl-badge '+(earned?'':'bl-locked')+'">'+b.emoji+' '+b.title+'</div>';
  });
  html+='</div>';

  // ── BY SUBJECT ──
  html += '<div class="sec-label">By Subject</div><div class="subject-grid anim">';
  var subjSessions={}, subjTopics={};
  sessions.forEach(function(s){
    if(!subjSessions[s.sid])subjSessions[s.sid]=[];
    subjSessions[s.sid].push(s);
    if(!s.topicScores)return;
    if(!subjTopics[s.sid])subjTopics[s.sid]={};
    Object.entries(s.topicScores).forEach(function(e){
      var t=e[0],v=e[1];
      if(!subjTopics[s.sid][t])subjTopics[s.sid][t]={c:0,t:0};
      subjTopics[s.sid][t].c+=v.c||0;subjTopics[s.sid][t].t+=v.t||0;
    });
  });
  Object.keys(SI).forEach(function(sid){
    var ss=subjSessions[sid];if(!ss||ss.length===0)return;
    var si=SI[sid],c1=si.g[0],c2=si.g[1];
    var last=ss[ss.length-1];
    var avg=Math.round(ss.reduce(function(a,b){return a+b.pct;},0)/ss.length);
    var pctCol=last.pct>=80?'#b2f0bb':last.pct>=60?'#ffd580':'#ffaab3';
    html+='<div class="subj-card">'
      +'<div class="subj-bar" style="background:linear-gradient(90deg,'+c1+','+c2+')"></div>'
      +'<div class="subj-name">'+si.icon+' '+si.name+'</div>'
      +'<div class="subj-meta">'+ss.length+' quiz'+(ss.length!==1?'zes':'')+' · avg '+avg+'%</div>'
      +'<div class="subj-pct" style="color:'+pctCol+'">'+last.pct+'%</div>'
      +drawChart(ss,c1,c2)
      +'<div style="margin-top:.5rem;border-top:1px solid rgba(255,255,255,.05);padding-top:.5rem">';
    Object.entries(subjTopics[sid]||{}).forEach(function(e){
      var t=e[0],v=e[1];if(!v.t)return;
      var p=Math.round((v.c/v.t)*100),bc=barCol(p,c1,c2);
      html+='<div class="tl-row"><div class="tl-name">'+t+'</div>'
        +'<div class="tl-bar-wrap"><div class="tl-bar" style="width:'+p+'%;background:'+bc+'"></div></div>'
        +'<div class="tl-pct '+pctCls(p)+'">'+p+'%</div></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // ── RECENT FEED ──
  html += '<div class="sec-label">Recent Activity</div><div class="card anim">';
  var recent=sessions.slice().sort(function(a,b){return b.ts-a.ts;}).slice(0,20);
  if(recent.length===0){html+='<div class="empty">No sessions yet.</div>';}
  else{recent.forEach(function(s){
    var si=SI[s.sid]||{name:s.sid,icon:'📝'};
    html+='<div class="feed-item"><div class="feed-emoji">'+si.icon+'</div>'
      +'<div class="feed-text"><strong>'+si.name+'</strong><span class="feed-score '+scoreClass(s.pct)+'">'+s.score+'/'+s.total+' ('+s.pct+'%)</span></div>'
      +'<div class="feed-date">'+timeAgo(s.ts||Date.now())+'</div></div>';
  });}
  html+='</div>';

  // Reset button
  html += '<div class="reset-area">'
    +'<button class="reset-btn" onclick="resetAll()">🗑 Reset All of Emily\'s Progress</button>'
    +'<div style="font-size:11px;color:var(--dim);margin-top:.5rem">Clears all quiz results, XP, badges, streak and time data from Firebase</div>'
    +'</div>';

  document.getElementById('main').innerHTML = html;
}

/* ── LOAD DATA ─────────────────────────────────────────── */
function load() {
  if (!window.firebase || !firebase.apps || !firebase.apps.length) {
    document.getElementById('last-updated').textContent = 'Connecting…';
    setTimeout(load, 500);  // retry in 500ms
    return;
  }
  document.getElementById('last-updated').textContent = 'Loading…';
  var ref = firebase.database().ref('emily');
  Promise.all([
    ref.child('summary').once('value'),
    ref.child('sessions').once('value'),
    ref.child('timeLog').once('value'),
    ref.child('activity').once('value')
  ]).then(function(snaps) {
    var summary  = snaps[0].val() || {};
    var sessObj  = snaps[1].val() || {};
    var timeLog  = snaps[2].val() || {};
    var sessions = Object.values(sessObj).sort(function(a,b){return (a.ts||0)-(b.ts||0);});
    renderMain({summary:summary, sessions:sessions, timeLog:timeLog});
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  }).catch(function(e){
    document.getElementById('last-updated').textContent = 'Error: '+e.message;
    console.error(e);
  });
}

setInterval(function(){ if(window.firebase&&firebase.apps&&firebase.apps.length) load(); }, 60000);

// Load data immediately - Firebase is already initialised via <head> scripts
load();

/* ── RESET ─────────────────────────────────────────────── */
function showResetConfirm() {
  document.getElementById('reset-confirm').style.display = 'block';
}
function hideResetConfirm() {
  document.getElementById('reset-confirm').style.display = 'none';
}
function doReset() {
  if (!window.firebase || !firebase.apps || !firebase.apps.length) {
    alert('Firebase not connected — cannot reset remotely.');
    return;
  }
  var btn = document.getElementById('reset-yes-btn');
  btn.textContent = 'Resetting…';
  btn.disabled = true;

  var db = firebase.database();
  // 1. Wipe all Emily data
  db.ref('emily').remove().then(function() {
    // 2. Set reset flag — device will detect this and clear localStorage
    return db.ref('emily/resetRequested').set({
      ts: Date.now(),
      requestedBy: 'parent'
    });
  }).then(function() {
    hideResetConfirm();
    document.getElementById('reset-status').textContent = '✅ Reset complete — Firebase wiped. Emily\'s local data will clear next time she opens the hub.';
    document.getElementById('reset-status').style.color = '#b2f0bb';
    document.getElementById('reset-status').style.display = 'block';
    btn.textContent = 'Yes, reset everything';
    btn.disabled = false;
    // Reload the dashboard after 2s
    setTimeout(function(){ load(); }, 2000);
  }).catch(function(e) {
    alert('Reset failed: ' + e.message);
    btn.textContent = 'Yes, reset everything';
    btn.disabled = false;
  });
}

function resetAll() {
  if (!confirm('Reset ALL of Emily\'s progress?\n\nThis will delete:\n• All quiz results\n• XP and badges\n• Streak\n• Time tracking\n\nThis cannot be undone.')) return;
  if (!window.firebase || !firebase.apps || !firebase.apps.length) {
    alert('Firebase not connected — try again in a moment.');
    return;
  }
  document.getElementById('last-updated').textContent = 'Resetting…';
  firebase.database().ref('emily').remove()
    .then(function() {
      console.log('✅ Firebase data cleared');
      document.getElementById('last-updated').textContent = 'Reset complete — ' + new Date().toLocaleTimeString();
      document.getElementById('main').innerHTML = '<div class="empty" style="padding:3rem">✅ All data cleared. Emily\'s progress has been reset.</div>';
    })
    .catch(function(e) {
      alert('Error resetting Firebase: ' + e.message);
      console.error(e);
    });
}
</script>

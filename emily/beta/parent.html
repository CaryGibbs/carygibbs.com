<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily's Progress — Parent View</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e8eaf0;--surface:#f8f9fb;--card:#ffffff;--border:#e4e7ed;
  --text:#1a2035;--muted:#4b5563;--dim:#6b7280;
  --accent:#2563eb;--accent-light:#eff6ff;--accent-muted:rgba(37,99,235,.1);
  --success:#16a34a;--warning:#d97706;--danger:#dc2626;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
.header{background:#ffffff;border-bottom:2px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);}
.header-left{display:flex;align-items:center;gap:.75rem;}
.header-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.header h1{font-family:'Nunito',sans-serif;font-size:clamp(1.1rem,2.5vw,1.4rem);font-weight:900;color:var(--text);}
.header p{color:var(--muted);font-size:11px;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:.75rem;}
.wrap{max-width:980px;margin:0 auto;padding:1.25rem 1.5rem 3rem;}

/* TOP STATS */
.stats-row{display:grid;grid-template-columns:repeat(7,1fr);gap:.6rem;margin-bottom:1.25rem;}
@media(max-width:750px){.stats-row{grid-template-columns:repeat(4,1fr);}}
@media(max-width:400px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;text-align:center;box-shadow:var(--shadow);}
.stat-val{font-family:'Nunito',sans-serif;font-size:1.7rem;font-weight:900;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:.2rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

/* SECTION LABELS */
.sec-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:.1rem 0 .65rem;border-left:3px solid var(--accent);padding-left:.5rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;box-shadow:var(--shadow);}

/* TIME */
.time-tabs{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem;}
.time-tab{padding:.3rem .75rem;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s;font-family:'Nunito Sans',sans-serif;}
.time-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1rem;}
@media(max-width:500px){.time-grid{grid-template-columns:repeat(2,1fr);}}
.time-card{background:var(--accent-light);border:1px solid rgba(37,99,235,.12);border-radius:10px;padding:.65rem;text-align:center;}
.time-card-val{font-family:'Nunito',sans-serif;font-size:1.4rem;font-weight:900;line-height:1;}
.time-card-lbl{font-size:10px;color:var(--muted);margin-top:.2rem;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:.45rem;}
.bar-lbl{width:75px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0;}
.bar-wrap{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.bar-val{width:55px;font-size:12px;font-weight:700;color:var(--text);flex-shrink:0;}

/* DAY-BY-DAY TABLE */
.day-table{width:100%;border-collapse:collapse;}
.day-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:.5rem .75rem;text-align:left;border-bottom:2px solid var(--border);background:#f9fafb;}
.day-table td{padding:.6rem .75rem;font-size:13px;border-bottom:1px solid var(--border);color:var(--muted);vertical-align:top;}
.day-table tr:last-child td{border-bottom:none;}
.day-table tr:hover td{background:#f8faff;}
.day-date{font-family:'Nunito',sans-serif;font-weight:800;color:var(--text);white-space:nowrap;}
.day-date.today{color:var(--accent);font-weight:900;}
.day-quizzes{display:flex;flex-wrap:wrap;gap:4px;}
.day-quiz-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid transparent;}
.pill-good{background:#dcfce7;color:#15803d;}
.pill-ok{background:#fef9c3;color:#a16207;}
.pill-weak{background:#fee2e2;color:#b91c1c;}
.day-time{font-size:12px;font-weight:700;color:var(--accent);}
.day-xp{font-size:12px;font-weight:700;color:var(--warning);}
.day-no-activity{color:var(--dim);font-style:italic;font-size:12px;}
.chevron{color:var(--dim);font-size:13px;transition:transform .2s;cursor:pointer;}
.chevron.open{transform:rotate(90deg);}
.day-detail{display:none;padding:.5rem 0;}
.day-detail.open{display:block;}
.day-topic-row{display:flex;align-items:center;gap:8px;font-size:12px;padding:2px 0;}
.day-topic-name{flex:1;color:var(--muted);}
.day-topic-bar-wrap{width:80px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.day-topic-bar{height:100%;border-radius:3px;}
.day-topic-pct{width:30px;text-align:right;font-weight:700;font-size:11px;}
.w{color:#ffaab3;}.m{color:#ffd580;}.g{color:#b2f0bb;}

/* HEATMAP */
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:.6rem;}
.hm-cell{width:14px;height:14px;border-radius:2px;background:#e9ecf0;}
.hm-cell.a1{background:rgba(155,89,182,.3);}.hm-cell.a2{background:rgba(155,89,182,.55);}.hm-cell.a3{background:rgba(155,89,182,.8);}.hm-cell.a4{background:#9b59b6;}
.hm-legend{display:flex;align-items:center;gap:4px;margin-top:.5rem;font-size:10px;color:var(--dim);}
.hm-legend-cell{width:10px;height:10px;border-radius:2px;}

/* SUBJECTS */
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.75rem;margin-bottom:1.25rem;}
.subj-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;overflow:hidden;box-shadow:var(--shadow);}
.subj-bar{height:4px;border-radius:2px;margin-bottom:.7rem;}
.subj-name{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;margin-bottom:.2rem;}
.subj-meta{font-size:11px;color:var(--muted);margin-bottom:.5rem;}
.subj-pct{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;}
.tl-row{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px;}
.tl-name{flex:1;color:var(--muted);}
.tl-bar-wrap{width:60px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.tl-bar{height:100%;border-radius:3px;}
.tl-pct{width:28px;text-align:right;font-weight:700;}

/* CHART */
.chart-wrap{position:relative;height:80px;margin-top:.6rem;}
.chart-svg{width:100%;height:100%;display:block;}
.chart-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:2px;padding:0 4px;}

/* BADGES */
.badge-list{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.25rem;}
.bl-badge{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.3rem .7rem;font-size:12px;font-weight:700;box-shadow:var(--shadow);}
.bl-locked{opacity:.35;filter:grayscale(1);background:#f9fafb;}
.xp-overall-wrap{margin:.75rem 0 .25rem;}
.xp-overall-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-bottom:.35rem;}
.xp-overall-label span:last-child{color:#c4bbff;font-weight:700;}
.xp-overall-track{position:relative;height:8px;background:#e9ecf0;border-radius:4px;overflow:hidden;}
.xp-overall-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#7c3aed,#db2777,#ea580c);transition:width 1s ease;}
.xp-overall-ticks{position:absolute;inset:0;display:flex;}
.xp-overall-tick{flex:1;border-right:1px solid rgba(0,0,0,.25);}
.xp-overall-tick:last-child{border-right:none;}
.xp-level-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:.6rem;}
.xp-level-chip{flex:0 0 calc(20% - 4px);text-align:center;padding:3px 2px;border-radius:5px;font-size:11px;font-weight:600;background:#f3f4f6;border:1px solid #e5e7eb;color:#6b7280;line-height:1.3;}
.xp-level-chip.earned{background:#dcfce7;border-color:#86efac;color:#16a34a;}
.xp-level-chip.current{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;box-shadow:0 0 0 2px rgba(37,99,235,.15);}
.xp-level-bar-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;padding:.85rem 1rem;margin-bottom:.75rem;box-shadow:var(--shadow);}

/* FEED */
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:.65rem 0;border-bottom:1px solid var(--border);font-size:13px;}
.feed-item:last-child{border-bottom:none;}
.feed-emoji{font-size:17px;flex-shrink:0;margin-top:1px;}
.feed-text{flex:1;color:var(--muted);line-height:1.5;}
.feed-text strong{color:var(--text);}
.feed-date{font-size:11px;color:var(--dim);flex-shrink:0;white-space:nowrap;}
.feed-score{padding:2px 7px;border-radius:7px;font-size:11px;font-weight:700;margin-left:5px;}
.sg{background:#dcfce7;color:#15803d;}
.so{background:#fef9c3;color:#a16207;}
.sw{background:#fee2e2;color:#b91c1c;}

.refresh-row{display:flex;gap:.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;}
.refresh-btn{background:var(--accent);border:1px solid var(--accent);color:#fff;padding:.5rem 1rem;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s;box-shadow:var(--shadow);}
.refresh-btn:hover{background:rgba(155,89,182,.25);}
.last-updated{font-size:12px;color:var(--dim);}
.empty{text-align:center;padding:1.5rem;color:var(--dim);font-size:13px;}












@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease both;}
</style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   BADGE PROGRESS MODAL — shared across index, results, parent
   ═══════════════════════════════════════════════════════════ */

/* ── CSS (injected once) ──────────────────────────────────── */
var BADGE_MODAL_CSS = `
#bm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;padding:1rem;}
#bm-overlay.open{display:flex;}
#bm-box{background:#141720;border:1px solid #252a38;border-radius:14px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.6);}
#bm-header{padding:1.25rem 1.5rem .75rem;display:flex;align-items:flex-start;gap:.75rem;}
#bm-emoji{font-size:2.2rem;line-height:1;}
#bm-meta{flex:1;}
#bm-title{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:.2rem;}
#bm-status{font-size:.75rem;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-block;}
#bm-status.earned{background:rgba(91,191,106,.15);color:#5bbf6a;}
#bm-status.locked{background:rgba(90,96,112,.15);color:#5a6070;}
#bm-body{padding:.75rem 1.5rem 1.5rem;}
#bm-desc{color:#9da3b4;font-size:.85rem;margin-bottom:1rem;line-height:1.5;}
#bm-progress-wrap{margin-bottom:1rem;}
#bm-progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:#5a6070;margin-bottom:.4rem;}
#bm-progress-label span:last-child{color:#d4d8e8;font-weight:600;}
#bm-bar-bg{background:#252a38;border-radius:6px;height:8px;overflow:hidden;}
#bm-bar{height:100%;border-radius:6px;transition:width .4s ease;}
#bm-outstanding{background:#0d0f14;border:1px solid #252a38;border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:#9da3b4;line-height:1.6;}
#bm-outstanding strong{color:#d4d8e8;display:block;margin-bottom:.3rem;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;}
#bm-close{display:block;width:100%;padding:.75rem;background:none;border:none;border-top:1px solid #252a38;color:#5a6070;font-size:.85rem;cursor:pointer;transition:color .15s;}
#bm-close:hover{color:#d4d8e8;}
`;

function _injectBadgeModal() {
  if (document.getElementById('bm-overlay')) return;
  var style = document.createElement('style');
  style.textContent = BADGE_MODAL_CSS;
  document.head.appendChild(style);

  var el = document.createElement('div');
  el.id = 'bm-overlay';
  el.innerHTML = `
    <div id="bm-box">
      <div id="bm-header">
        <div id="bm-emoji"></div>
        <div id="bm-meta">
          <div id="bm-title"></div>
          <span id="bm-status"></span>
        </div>
      </div>
      <div id="bm-body">
        <div id="bm-desc"></div>
        <div id="bm-progress-wrap">
          <div id="bm-progress-label"><span>Progress</span><span id="bm-progress-val"></span></div>
          <div id="bm-bar-bg"><div id="bm-bar"></div></div>
        </div>
        <div id="bm-outstanding"></div>
      </div>
      <button id="bm-close" onclick="closeBadgeModal()">Close</button>
    </div>`;
  document.body.appendChild(el);
  el.addEventListener('click', function(e) { if (e.target === el) closeBadgeModal(); });
}

function closeBadgeModal() {
  var el = document.getElementById('bm-overlay');
  if (el) el.classList.remove('open');
}

/* ── Progress calculator ─────────────────────────────────── */
function getBadgeProgress(id, d) {
  // Returns { current, target, pct, outstanding }
  // d = the full data object from localStorage

  var qs       = d.quizSessions      || [];
  var badges   = d.badges            || [];
  var xp       = d.xp                || 0;
  var lessons  = d.lessonsRead       || [];
  var mm       = d.mindmapVisits     || {};
  var ss       = d.subjectSessions   || {};
  var streak   = (typeof getStreak === 'function' ? getStreak() : (d.streak || 0));
  var tfCount  = d.topicFixedCount   || 0;

  var perfects     = qs.filter(function(s){ return s.score === s.total && s.total === 10; }).length;
  var totalCorrect = qs.reduce(function(a,s){ return a + (s.score||0); }, 0);
  var highPct      = qs.filter(function(s){ return s.pct >= 90; }).length;
  var qCount       = qs.length;
  var lCount       = lessons.length;

  var mmSubjects   = Object.keys(mm).map(function(k){ return k.split('_')[0]; })
                           .filter(function(v,i,a){ return a.indexOf(v)===i; });

  var ALL_SUBJECTS = ['maths','english','geography','spanish','science','re'];

  // Helper: subject 90%+ count
  function subHigh(sid) {
    return (ss[sid]||[]).filter(function(p){ return p >= 90; }).length;
  }

  // Map badge id -> { current, target, outstandingText }
  var map = {
    // ── Original ──
    first_quiz:     { current: Math.min(qCount,1),    target:1,   label:'Quizzes completed' },
    perfect_ten:    { current: Math.min(perfects,1),  target:1,   label:'10/10 scores' },
    streak_3:       { current: Math.min(streak,3),    target:3,   label:'Day streak' },
    streak_7:       { current: Math.min(streak,7),    target:7,   label:'Day streak' },
    streak_14:      { current: Math.min(streak,14),   target:14,  label:'Day streak' },
    streak_30:      { current: Math.min(streak,30),   target:30,  label:'Day streak' },
    explorer: (function(){
      var subs = Object.keys(ss).length;
      return { current: Math.min(subs, ALL_SUBJECTS.length), target: ALL_SUBJECTS.length, label:'Subjects quizzed' };
    })(),
    sharp: (function(){
      return { current: Math.min(totalCorrect,100), target:100, label:'Correct answers' };
    })(),
    comeback: (function(){
      return { current: Math.min(tfCount,1), target:1, label:'Topics improved 60%→70%+' };
    })(),
    star_pupil:     { current: Math.min(highPct,5),   target:5,   label:'Scores of 90%+' },
    trending: (function(){
      // check if any subject has 3 improving sessions in a row
      var done = ALL_SUBJECTS.some(function(sid){
        var s = ss[sid]||[];
        if (s.length < 3) return false;
        var last3 = s.slice(-3);
        return last3[1] > last3[0] && last3[2] > last3[1];
      });
      return { current: done?1:0, target:1, label:'Subjects with 3 improving scores in a row' };
    })(),
    all_rounder: (function(){
      var done = ALL_SUBJECTS.filter(function(sid){
        return (ss[sid]||[]).some(function(p){ return p >= 70; });
      }).length;
      return { current: done, target: ALL_SUBJECTS.length, label:'Subjects with 70%+ score' };
    })(),
    century:        { current: Math.min(qCount,100),  target:100, label:'Quizzes completed' },
    lesson_20:      { current: Math.min(lCount,20),   target:20,  label:'Lessons read' },
    night_owl:      { current: badges.indexOf('night_owl')>-1?1:0,  target:1, label:'Quiz after 9pm' },
    early_bird:     { current: badges.indexOf('early_bird')>-1?1:0, target:1, label:'Quiz before 8am' },
    // ── Volume ──
    quiz_25:        { current: Math.min(qCount,25),   target:25,  label:'Quizzes completed' },
    quiz_50:        { current: Math.min(qCount,50),   target:50,  label:'Quizzes completed' },
    quiz_250:       { current: Math.min(qCount,250),  target:250, label:'Quizzes completed' },
    sharp_250:      { current: Math.min(totalCorrect,250), target:250, label:'Correct answers' },
    sharp_500:      { current: Math.min(totalCorrect,500), target:500, label:'Correct answers' },
    lesson_5:       { current: Math.min(lCount,5),    target:5,   label:'Lessons read' },
    lesson_10:      { current: Math.min(lCount,10),   target:10,  label:'Lessons read' },
    lesson_40:      { current: Math.min(lCount,40),   target:40,  label:'Lessons read' },
    mindmap_5:      { current: Math.min(mmSubjects.length,5), target:5, label:'Different mind maps visited' },
    mindmap_all:    { current: Math.min(mmSubjects.length,ALL_SUBJECTS.length), target:ALL_SUBJECTS.length, label:'Subject mind maps visited' },
    // ── Mastery ──
    perfect_3:      { current: Math.min(perfects,3),  target:3,   label:'Perfect 10/10 scores' },
    perfect_10:     { current: Math.min(perfects,10), target:10,  label:'Perfect 10/10 scores' },
    ace:            { current: Math.min(highPct,10),  target:10,  label:'Scores of 90%+' },
    flawless: (function(){
      var done = ALL_SUBJECTS.filter(function(sid){
        return (ss[sid]||[]).some(function(p){ return p >= 100; });
      }).length;
      return { current: done, target: ALL_SUBJECTS.length, label:'Subjects with 100% score' };
    })(),
    no_mistakes: (function(){
      if (qs.length < 5) return { current: qs.length, target:5, label:'Quizzes needed (all 80%+)' };
      var last5ok = qs.slice(-5).every(function(s){ return s.pct >= 80; });
      return { current: last5ok?5:qs.slice(-5).filter(function(s){ return s.pct>=80; }).length, target:5, label:'Last 5 quizzes at 80%+' };
    })(),
    xp_500:         { current: Math.min(xp,500),   target:500,   label:'XP earned' },
    xp_1000:        { current: Math.min(xp,1000),  target:1000,  label:'XP earned' },
    xp_2000:        { current: Math.min(xp,2000),  target:2000,  label:'XP earned' },
    // ── Subject ──
    maths_master:   { current: Math.min(subHigh('maths'),3),     target:3, label:'90%+ scores in Maths' },
    english_master: { current: Math.min(subHigh('english'),3),   target:3, label:'90%+ scores in English' },
    geo_master:     { current: Math.min(subHigh('geography'),3), target:3, label:'90%+ scores in Geography' },
    spanish_master: { current: Math.min(subHigh('spanish'),3),   target:3, label:'90%+ scores in Spanish' },
    science_master: { current: Math.min(subHigh('science'),3),   target:3, label:'90%+ scores in Science' },
    re_master:      { current: Math.min(subHigh('re'),3),        target:3, label:'90%+ scores in RE' },
    // ── Quirky ──
    lunch_break:    { current: badges.indexOf('lunch_break')>-1?1:0,   target:1, label:'Quiz between 12–1pm' },
    weekend:        { current: badges.indexOf('weekend')>-1?1:0,       target:1, label:'Quiz on both Sat and Sun' },
    hat_trick_day:  { current: badges.indexOf('hat_trick_day')>-1?1:0, target:1, label:'3 quizzes in one day' },
    comeback_5:     { current: Math.min(tfCount,5), target:5, label:'Weak topics improved 60%→70%+' },
  };

  var p = map[id] || { current:0, target:1, label:'' };
  var isEarned = badges.indexOf(id) > -1;
  var pct = isEarned ? 100 : Math.min(100, Math.round((p.current / p.target) * 100));

  var outstanding = '';
  if (isEarned) {
    outstanding = '🏆 Earned!';
  } else {
    var remaining = p.target - p.current;
    outstanding = remaining + ' more ' + p.label.toLowerCase() + ' needed';
  }

  return {
    current:     isEarned ? p.target : p.current,
    target:      p.target,
    pct:         pct,
    label:       p.label,
    outstanding: outstanding,
    isEarned:    isEarned
  };
}

/* ── Show modal ──────────────────────────────────────────── */
function showBadgeModal(id, d) {
  _injectBadgeModal();

  var def = BADGE_DEFS.find(function(b){ return b.id === id; });
  if (!def) return;

  var prog = getBadgeProgress(id, d);

  document.getElementById('bm-emoji').textContent   = def.emoji;
  document.getElementById('bm-title').textContent   = def.title;
  document.getElementById('bm-desc').textContent    = def.desc;

  var statusEl = document.getElementById('bm-status');
  statusEl.textContent  = prog.isEarned ? '✓ Earned' : 'Locked';
  statusEl.className    = 'earned' ? '' : '';
  statusEl.className    = prog.isEarned ? 'earned' : 'locked';

  document.getElementById('bm-progress-val').textContent = prog.current + ' / ' + prog.target;

  var bar = document.getElementById('bm-bar');
  // Pick colour: green if earned, purple if in progress, grey if not started
  var colour = prog.isEarned ? '#5bbf6a' : prog.current > 0 ? '#7c6fcd' : '#3a3f50';
  bar.style.background = colour;
  // Trigger transition
  bar.style.width = '0%';
  setTimeout(function(){ bar.style.width = prog.pct + '%'; }, 50);

  var outEl = document.getElementById('bm-outstanding');
  if (prog.isEarned) {
    outEl.innerHTML = '<strong>Status</strong>Badge earned — well done! 🎉';
  } else {
    outEl.innerHTML = '<strong>What\'s needed</strong>' + prog.outstanding;
    // Add progress detail for numeric badges
    if (prog.target > 1) {
      outEl.innerHTML += '<br><span style="color:#7c6fcd">' + prog.pct + '% of the way there</span>';
    }
  }

  // Hide progress bar for binary badges (target=1, quirky/time-based)
  var wrap = document.getElementById('bm-progress-wrap');
  wrap.style.display = prog.target === 1 ? 'none' : 'block';

  document.getElementById('bm-overlay').classList.add('open');
}

/* Helper: parent.html reads from Firebase summary, not localStorage.
   Convert it to the same shape as the Emily-side data object so
   getBadgeProgress works identically. */
function _getSummaryAsD() {
  // Read directly from _allData at call time so it's always current
  // even if renderMain hasn't run yet (falls back to empty)
  var summary  = (_allData && _allData.summary)  || {};
  var sessions = (_allData && _allData.sessions) || [];
  var subSessions = {};
  sessions.forEach(function(s) {
    if (s.sid) {
      if (!subSessions[s.sid]) subSessions[s.sid] = [];
      subSessions[s.sid].push(s.pct || 0);
    }
  });
  return {
    xp:              summary.xp              || 0,
    badges:          summary.badges          || [],
    quizSessions:    sessions,
    lessonsRead:     summary.lessonsRead     || [],
    mindmapVisits:   summary.mindmapVisits   || {},
    subjectSessions: subSessions,
    topicFixedCount: summary.topicFixedCount || 0,
    streak:          summary.streak          || 0,
  };
}

window.closeBadgeModal = closeBadgeModal;

/* ── HELPERS ───────────────────────────────────────────── */
function getLevel(xp){xp=xp||0;var lv=LEVELS[0];for(var i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i].xp)lv=LEVELS[i];else break;}return lv;}
function pctCls(p){return p<60?'w':p<75?'m':'g';}
function barCol(p,c1,c2){if(p<60)return '#e05c6a';if(p<75)return '#f5a623';return 'linear-gradient(90deg,'+c1+','+c2+')';}
function scoreClass(p){return p>=80?'sg':p>=60?'so':'sw';}
function fmtTime(s){if(!s||s<60)return s?s+'s':'0m';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+'h '+(m>0?m+'m':'');return m+'m';}
function fmtTimeLong(s){if(!s)return '0 min';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);if(h>0)return h+' hr '+(m>0?m+' min':'');return m+' min';}
function timeAgo(ts){var m=Math.round((Date.now()-ts)/60000);if(m<2)return 'just now';if(m<60)return m+'m ago';var h=Math.round(m/60);if(h<24)return h+'h ago';return Math.round(h/24)+'d ago';}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){var parts=d.split('-');var dt=new Date(parts[0],parts[1]-1,parts[2]);var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return days[dt.getDay()]+' '+dt.getDate()+' '+months[dt.getMonth()];}

/* ── HEATMAP ───────────────────────────────────────────── */
function drawHeatmap(timeLog){
  var t=new Date(),cells='';
  for(var i=83;i>=0;i--){var d=new Date(t);d.setDate(d.getDate()-i);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');var s=(timeLog&&timeLog[k]&&timeLog[k].total)||0;var m=Math.round(s/60);var l=m===0?'':m<5?'a1':m<15?'a2':m<30?'a3':'a4';cells+='<div class="hm-cell '+l+'" title="'+k+(m>0?' · '+fmtTimeLong(s):'')+'"></div>';}
  return cells;
}

/* ── SCORE CHART ───────────────────────────────────────── */
function drawChart(sessions,c1,c2){
  if(!sessions||sessions.length<2)return '<div style="font-size:11px;color:var(--dim);padding:.4rem 0">Need 2+ quizzes for trend.</div>';
  var pts=sessions.slice(-20),n=pts.length,W=500,H=75,pad=5;
  var xs=pts.map(function(_,i){return pad+(i/(n-1))*(W-2*pad);});
  var ys=pts.map(function(s){return H-pad-((s.pct/100)*(H-2*pad));});
  var area='M'+xs[0]+' '+H;pts.forEach(function(_,i){area+=' L'+xs[i]+' '+ys[i];});area+=' L'+xs[n-1]+' '+H+' Z';
  var line='M'+xs[0]+' '+ys[0];pts.forEach(function(_,i){if(i>0)line+=' L'+xs[i]+' '+ys[i];});
  var y60=H-pad-(0.6*(H-2*pad)),y90=H-pad-(0.9*(H-2*pad));
  var gid='g'+Math.random().toString(36).slice(2,6),agid='ag'+Math.random().toString(36).slice(2,6);
  return '<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient>'
    +'<linearGradient id="'+agid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+c1+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+c1+'" stop-opacity=".02"/></linearGradient></defs>'
    +'<line x1="'+pad+'" y1="'+y60+'" x2="'+(W-pad)+'" y2="'+y60+'" stroke="rgba(224,92,106,.3)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<line x1="'+pad+'" y1="'+y90+'" x2="'+(W-pad)+'" y2="'+y90+'" stroke="rgba(91,191,106,.3)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<path d="'+area+'" fill="url(#'+agid+')"/>'
    +'<path d="'+line+'" fill="none" stroke="url(#'+gid+')" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +pts.map(function(s,i){var dc=s.pct>=90?'#5bbf6a':s.pct>=60?c1:'#e05c6a';return '<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="3.5" fill="'+dc+'"/>';}).join('')
    +'</svg></div>'
    +'<div class="chart-labels"><span>'+pts[0].date+'</span><span style="color:rgba(224,92,106,.6)">─60%</span><span style="color:rgba(91,191,106,.6)">─90%</span><span>'+pts[n-1].date+'</span></div>';
}

/* ── TIME SECTION ──────────────────────────────────────── */
var _period = 'all';
var _allData = null;

function setPeriod(p){_period=p;if(_allData)renderMain(_allData);}

function buildTimeSection(timeLog, sessions, cutStr){
  cutStr = cutStr || new Date().toISOString().slice(0,10);
  var tot={total:0,quiz:0,lesson:0,mindmap:0};
  var daily=[];
  Object.entries(timeLog||{}).forEach(function(e){
    var d=e[0],v=e[1]; if(d<cutStr)return;
    tot.total+=(v.total||0); tot.quiz+=(v.quiz||0); tot.lesson+=(v.lesson||0); tot.mindmap+=(v.mindmap||0);
    daily.push({date:d,secs:v.total||0});
  });
  daily.sort(function(a,b){return a.date.localeCompare(b.date);});
  var active=daily.filter(function(d){return d.secs>0;}).length;
  var avg=active>0?Math.round(tot.total/active):0;
  var qCount=(sessions||[]).filter(function(s){return s.date>=cutStr;}).length;
  var maxSecs=Math.max(tot.quiz,tot.lesson,tot.mindmap,1);

  var html='<div class="card anim">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem">'
    +'<div style="font-family:Nunito,sans-serif;font-size:16px;font-weight:800">⏱ Time Spent</div>'
    +'<div class="time-tabs">'
    +['1','2','3','4','5','6','7','14','30','all'].map(function(p){
        var lbl={'1':'1d','2':'2d','3':'3d','4':'4d','5':'5d','6':'6d','7':'7d','14':'14d','30':'30d','all':'All'}[p]||p;
        return '<div class="time-tab '+(p===_period?'active':'')+'" data-period="'+p+'" style="padding:.25rem .45rem;font-size:11px;cursor:pointer">'+lbl+'</div>';
      }).join('')
    +'</div></div>'
    +'<div class="time-grid">'
    +'<div class="time-card"><div class="time-card-val" style="color:#c4bbff">'+fmtTime(tot.total)+'</div><div class="time-card-lbl">Total time</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#9ef5e2">'+fmtTime(avg)+'</div><div class="time-card-lbl">Avg per active day</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#ffd580">'+active+'</div><div class="time-card-lbl">Active days</div></div>'
    +'<div class="time-card"><div class="time-card-val" style="color:#b2f0bb">'+qCount+'</div><div class="time-card-lbl">Quizzes taken</div></div>'
    +'</div>'
    +(qCount===0 && tot.total>0 ? '<div style="font-size:11px;color:var(--dim);margin-top:.35rem;padding:.4rem .5rem;background:rgba(255,255,255,.04);border-radius:6px">⏱ Time today is from browsing lessons or mind maps — no quizzes completed yet</div>' : '');

  if(tot.total>0){
    html+='<div style="margin-top:.25rem">';
    [{label:'Quizzes',secs:tot.quiz,color:'#9b59b6'},{label:'Lessons',secs:tot.lesson,color:'#3498db'},{label:'Mind Maps',secs:tot.mindmap,color:'#43b89c'}]
      .filter(function(b){return b.secs>0;})
      .forEach(function(b){
        var w=Math.round((b.secs/maxSecs)*100);
        html+='<div class="bar-row"><div class="bar-lbl">'+b.label+'</div>'
          +'<div class="bar-wrap"><div class="bar-fill" style="width:'+w+'%;background:'+b.color+'"></div></div>'
          +'<div class="bar-val">'+fmtTimeLong(b.secs)+'</div></div>';
      });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ── DAY BY DAY ────────────────────────────────────────── */
function buildDayByDay(sessions, timeLog, cutStr) {
  cutStr = cutStr || '1970-01-01';
  // Group sessions by date
  var byDate = {};
  (sessions||[]).forEach(function(s) {
    if (!byDate[s.date]) byDate[s.date] = [];
    byDate[s.date].push(s);
  });

  // Merge with timeLog dates — only within the period
  Object.keys(timeLog||{}).forEach(function(d) {
    if (d >= cutStr && !byDate[d]) byDate[d] = [];
  });

  var dates = Object.keys(byDate).sort().reverse().slice(0,30); // last 30 active days
  if (dates.length === 0) return '<div class="empty">No activity recorded yet.</div>';

  var todayStr = today();
  var html = '<table class="day-table"><thead><tr>'
    +'<th>Date</th><th>Time</th><th>Quizzes</th><th>XP</th><th style="width:20px"></th>'
    +'</tr></thead><tbody>';

  dates.forEach(function(d, idx) {
    var dayQuizzes = byDate[d] || [];
    var tl = (timeLog&&timeLog[d]) || {};
    var timeSecs = tl.total || 0;
    
    // Per-day XP: read from timeLog.xp written by quiz/lesson/mindmap pages.
    // Falls back to quiz-only estimate if xp field absent (older data before this fix).
    var dayXP = tl.xp || dayQuizzes.reduce(function(a,s) {
      var xp = 10;
      if (s.pct >= 90) xp += 15;
      if (s.score === s.total) xp += 20;
      return a + xp;
    }, 0);

    var detailId = 'day-detail-' + idx;
    var chevId = 'day-chev-' + idx;

    html += '<tr style="cursor:'+(dayQuizzes.length>0?'pointer':'default')+'" '
      + (dayQuizzes.length>0 ? 'data-tog="'+detailId+','+chevId+'"' : '')+'>';
    
    // Date
    html += '<td><div class="day-date'+(d===todayStr?' today':'')+'">'+fmtDate(d)+(d===todayStr?' <span style="font-size:10px;color:#9ef5e2;font-weight:700">TODAY</span>':'')+'</div></td>';
    
    // Time
    html += '<td><span class="day-time">'+(timeSecs>0?fmtTimeLong(timeSecs):'—')+'</span></td>';
    
    // Quizzes
    if (dayQuizzes.length === 0) {
      html += '<td><span class="day-no-activity">—</span></td>';
    } else {
      html += '<td><div class="day-quizzes">';
      dayQuizzes.forEach(function(s) {
        var si = SI[s.sid] || {name:s.sid, icon:'📝'};
        var cls = s.pct>=80?'pill-good':s.pct>=60?'pill-ok':'pill-weak';
        html += '<span class="day-quiz-pill '+cls+'">'+si.icon+' '+si.name+' '+s.score+'/'+s.total+'</span>';
      });
      html += '</div></td>';
    }
    
    // XP
    html += '<td><span class="day-xp">'+(dayXP>0?'+'+dayXP+' XP':'—')+'</span></td>';
    
    // Chevron
    html += '<td>'+(dayQuizzes.length>0?'<span class="chevron" id="'+chevId+'">›</span>':'')+'</td>';
    html += '</tr>';

    // Detail row — topic breakdown for each quiz that day
    if (dayQuizzes.length > 0) {
      html += '<tr><td colspan="5" style="padding:0 .75rem">'
        +'<div class="day-detail" id="'+detailId+'">';
      
      dayQuizzes.forEach(function(s) {
        var si = SI[s.sid] || {name:s.sid, icon:'📝'};
        var c1 = si.g ? si.g[0] : '#9b59b6';
        var c2 = si.g ? si.g[1] : '#3498db';
        html += '<div style="margin:.5rem 0;padding:.5rem .75rem;background:rgba(255,255,255,.03);border-radius:8px;">'
          +'<div style="font-family:Nunito,sans-serif;font-size:13px;font-weight:800;margin-bottom:.4rem;">'
          +si.icon+' '+si.name+' — '+s.score+'/'+s.total+' ('+s.pct+'%)'
          +'<span style="font-size:11px;font-weight:600;color:var(--dim);margin-left:8px">'+s.date+'</span></div>';
        
        if (s.topicScores && Object.keys(s.topicScores).length > 0) {
          Object.entries(s.topicScores).forEach(function(e) {
            var t=e[0], v=e[1];
            if (!v.t) return;
            var p = Math.round((v.c/v.t)*100);
            var bc = barCol(p,c1,c2);
            html += '<div class="day-topic-row">'
              +'<div class="day-topic-name">'+t+'</div>'
              +'<div class="day-topic-bar-wrap"><div class="day-topic-bar" style="width:'+p+'%;background:'+bc+'"></div></div>'
              +'<div class="day-topic-pct '+pctCls(p)+'">'+p+'%</div>'
              +'<div style="font-size:10px;color:var(--dim);width:40px;text-align:right">'+v.c+'/'+v.t+'</div>'
              +'</div>';
          });
        }
        html += '</div>';
      });
      
      // Time breakdown for the day
      if (timeSecs > 0) {
        html += '<div style="font-size:11px;color:var(--dim);padding:.3rem .75rem .5rem;display:flex;gap:12px;">';
        if (tl.quiz) html += '<span>📝 Quiz: '+fmtTimeLong(tl.quiz)+'</span>';
        if (tl.lesson) html += '<span>📖 Lessons: '+fmtTimeLong(tl.lesson)+'</span>';
        if (tl.mindmap) html += '<span>🗺 Mind maps: '+fmtTimeLong(tl.mindmap)+'</span>';
        html += '</div>';
      }
      
      html += '</div></td></tr>';
    }
  });

  html += '</tbody></table>';
  return html;
}

function togDay(id, cid) {
  var el=document.getElementById(id), ch=document.getElementById(cid);
  if(!el)return;
  var open=el.classList.contains('open');
  el.classList.toggle('open',!open);
  ch.classList.toggle('open',!open);
}

/* ── MAIN RENDER ───────────────────────────────────────── */
function renderMain(data) {
  _allData = data;
  var summary  = data.summary  || {};
  var sessions = data.sessions || [];
  var timeLog  = data.timeLog  || {};
  var badges   = summary.badges || [];

  var xp = summary.xp || 0;
  // Compute streak from actual session dates (cross-device, authoritative)
  var streak = (function() {
    var today = new Date();
    var count = 0;
    var check = new Date(today);
    // Get unique session dates
    var sessionDates = {};
    sessions.forEach(function(s){ if (s.date) sessionDates[s.date] = true; });
    // Walk backwards from today counting consecutive days with sessions
    for (var i = 0; i < 365; i++) {
      var y = check.getFullYear();
      var m = String(check.getMonth()+1).padStart(2,'0');
      var d2 = String(check.getDate()).padStart(2,'0');
      var dateStr = y + '-' + m + '-' + d2;
      if (sessionDates[dateStr]) {
        count++;
        check.setDate(check.getDate() - 1);
      } else if (i === 0) {
        // No sessions today — check if yesterday keeps streak alive
        check.setDate(check.getDate() - 1);
        var y2 = check.getFullYear();
        var m2 = String(check.getMonth()+1).padStart(2,'0');
        var d3 = String(check.getDate()).padStart(2,'0');
        if (!sessionDates[y2+'-'+m2+'-'+d3]) break;
        count++;
        check.setDate(check.getDate() - 1);
      } else {
        break;
      }
    }
    return count;
  })();
  var lv = getLevel(xp);
  var totalCorrect = sessions.reduce(function(a,s){return a+(s.score||0);},0);
  var totalAns = sessions.reduce(function(a,s){return a+(s.total||0);},0);
  var ovPct = totalAns>0?Math.round((totalCorrect/totalAns)*100):0;
  var totalTimeSecs = Object.values(timeLog).reduce(function(a,v){return a+(v.total||0);},0);

  // _allData is set above — _getSummaryAsD() reads from it directly at call time

  // Filter sessions by selected period for all period-sensitive views
  // cutStr = first date to INCLUDE. period '1' = today only, '2' = today+yesterday, etc.
  var cutoff = new Date();
  var _pInt = _period === 'all' ? 3650 : parseInt(_period);
  cutoff.setDate(cutoff.getDate() - (_pInt - 1));
  var cutStr = cutoff.toISOString().slice(0, 10);
  var filteredSessions = _period === 'all' ? sessions
    : sessions.filter(function(s) { return (s.date || '') >= cutStr; });

  // Period label for section headings
  var periodLabel = _period === 'all' ? 'All time'
    : _period === '1' ? 'Today'
    : 'Last ' + _period + ' days';

  var html = '';

  // ── STATS ROW — always all-time so totals are meaningful ──
  var totalQuizzesDone = sessions.length;
  var totalLessonsRead = (summary.lessonsRead || []).length;
  html += '<div class="stats-row anim">'
    +'<div class="stat"><div class="stat-val" style="color:var(--accent)">'+xp+'</div><div class="stat-lbl">Total XP</div></div>'
    +'<div class="stat"><div class="stat-val">'+lv.emoji+'<span style="font-size:.9rem;color:#6d28d9"> '+lv.title+'</span></div><div class="stat-lbl">Level</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:'+(streak>0?'#d97706':'var(--dim)')+'">🔥 '+streak+'</div><div class="stat-lbl">Streak</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:var(--success)">'+ovPct+'%</div><div class="stat-lbl">Overall score</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:#0891b2">'+fmtTime(totalTimeSecs)+'</div><div class="stat-lbl">Total time</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:#7c3aed">'+totalQuizzesDone+'</div><div class="stat-lbl">Quizzes done</div></div>'
    +'<div class="stat"><div class="stat-val" style="color:#db2777">'+totalLessonsRead+'</div><div class="stat-lbl">Lessons read</div></div>'
    +'</div>';

  // ── LEVEL PROGRESS ──
  var _next = (function(){ for(var i=0;i<LEVELS.length;i++){ if(LEVELS[i].xp>xp) return LEVELS[i]; } return null; })();
  var _prog = _next ? Math.round(((xp - lv.xp) / (_next.xp - lv.xp)) * 100) : 100;
  var _maxXP = LEVELS[LEVELS.length-1].xp;
  var _overallPct = Math.min(100, Math.round((xp / _maxXP) * 100));
  html += '<div class="xp-level-bar-wrap anim">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">'
    + '<span style="font-weight:700;color:#fff;font-size:.95rem">'+lv.emoji+' Level '+lv.level+' — '+lv.title+'</span>'
    + '<span style="font-size:12px;color:var(--accent);font-weight:700">'+xp+' XP</span>'
    + '</div>'
    + '<div style="font-size:11px;color:var(--dim);margin-bottom:.4rem">'
    + (_next ? 'Next: '+_next.emoji+' '+_next.title+' in '+(_next.xp-xp)+' XP' : '🏆 Maximum level reached!')
    + '</div>'
    + '<div style="height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-bottom:.65rem">'
    + '<div id="parent-lv-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#9b59b6,#3498db);border-radius:4px;transition:width .8s ease"></div></div>'
    + '<div class="xp-overall-wrap">'
    + '<div class="xp-overall-label"><span>All 15 levels</span><span>Level '+lv.level+' / '+LEVELS.length+' · '+_overallPct+'% to max</span></div>'
    + '<div class="xp-overall-track">'
    + '<div id="parent-overall-bar" class="xp-overall-fill" style="width:0%"></div>'
    + '<div class="xp-overall-ticks">'+LEVELS.map(function(){return '<div class="xp-overall-tick"></div>';}).join('')+'</div>'
    + '</div>'
    + '<div class="xp-level-chips">'+LEVELS.map(function(l){var cls=l.level<lv.level?'earned':l.level===lv.level?'current':'';return '<div class="xp-level-chip '+cls+'">'+l.emoji+' '+l.title+'<br><span style="font-size:10px;opacity:.7">'+l.xp+' XP</span></div>';}).join('')+'</div>'
    + '</div>'
    + '</div>';

  // ── TIME SECTION ──
  html += buildTimeSection(timeLog, filteredSessions, cutStr);

  // ── HEATMAP ──
  html += '<div class="card anim">'
    +'<div class="sec-label" style="margin:0 0 .3rem">Activity — last 12 weeks</div>'
    +'<div style="font-size:11px;color:var(--dim)">Darker = more time · hover for exact minutes</div>'
    +'<div class="heatmap-grid">'+drawHeatmap(timeLog)+'</div>'
    +'<div class="hm-legend">Less '
    +'<div class="hm-legend-cell" style="background:rgba(255,255,255,.08)"></div>'
    +'<div class="hm-legend-cell" style="background:rgba(155,89,182,.3)"></div>'
    +'<div class="hm-legend-cell" style="background:rgba(155,89,182,.6)"></div>'
    +'<div class="hm-legend-cell" style="background:#9b59b6"></div> More</div>'
    +'</div>';

  // ── DAY BY DAY ──
  html += '<div class="card anim">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">'
    +'<div style="font-family:Nunito,sans-serif;font-size:16px;font-weight:800">📅 Day by Day</div>'
    +'<div style="font-size:11px;color:var(--dim)">Last 30 active days · click a row to expand</div>'
    +'</div>'
    + buildDayByDay(filteredSessions, timeLog, cutStr)
    +'</div>';

  // ── BADGES ──
  html += '<div class="sec-label">Badges — '+badges.length+'/'+BADGE_DEFS.length+'</div>'
    +'<div class="badge-list anim">';
  BADGE_DEFS.forEach(function(b){
    var earned=badges.indexOf(b.id)>-1;
    html+='<div class="bl-badge '+(earned?'':'bl-locked')+'" data-badge="'+b.id+'" style="cursor:pointer;" title="Click for details">'+b.emoji+' '+b.title+'</div>';
  });
  html+='</div>';

  // ── BY SUBJECT ──
  html += '<div class="sec-label">By Subject — '+periodLabel+'</div><div class="subject-grid anim">';
  var subjSessions={}, subjTopics={};
  filteredSessions.forEach(function(s){
    if(!subjSessions[s.sid])subjSessions[s.sid]=[];
    subjSessions[s.sid].push(s);
    if(!s.topicScores)return;
    if(!subjTopics[s.sid])subjTopics[s.sid]={};
    Object.entries(s.topicScores).forEach(function(e){
      var t=e[0],v=e[1];
      if(!subjTopics[s.sid][t])subjTopics[s.sid][t]={c:0,t:0};
      subjTopics[s.sid][t].c+=v.c||0;subjTopics[s.sid][t].t+=v.t||0;
    });
  });
  Object.keys(SI).forEach(function(sid){
    var ss=subjSessions[sid];if(!ss||ss.length===0)return;
    var si=SI[sid],c1=si.g[0],c2=si.g[1];
    var last=ss[ss.length-1];
    var avg=Math.round(ss.reduce(function(a,b){return a+b.pct;},0)/ss.length);
    var pctCol=last.pct>=80?'#b2f0bb':last.pct>=60?'#ffd580':'#ffaab3';
    html+='<div class="subj-card">'
      +'<div class="subj-bar" style="background:linear-gradient(90deg,'+c1+','+c2+')"></div>'
      +'<div class="subj-name">'+si.icon+' '+si.name+'</div>'
      +'<div class="subj-meta">'+ss.length+' quiz'+(ss.length!==1?'zes':'')+' · avg '+avg+'%</div>'
      +'<div class="subj-pct" style="color:'+pctCol+'">'+last.pct+'%</div>'
      +drawChart(ss,c1,c2)
      +'<div style="margin-top:.5rem;border-top:1px solid rgba(255,255,255,.05);padding-top:.5rem">';
    Object.entries(subjTopics[sid]||{}).forEach(function(e){
      var t=e[0],v=e[1];if(!v.t)return;
      var p=Math.round((v.c/v.t)*100),bc=barCol(p,c1,c2);
      html+='<div class="tl-row"><div class="tl-name">'+t+'</div>'
        +'<div class="tl-bar-wrap"><div class="tl-bar" style="width:'+p+'%;background:'+bc+'"></div></div>'
        +'<div class="tl-pct '+pctCls(p)+'">'+p+'%</div></div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // ── RECENT FEED ──
  html += '<div class="sec-label">Recent Activity — '+periodLabel+'</div><div class="card anim">';
  var recent=filteredSessions.slice().sort(function(a,b){return b.ts-a.ts;}).slice(0,20);
  if(recent.length===0){html+='<div class="empty">No sessions yet.</div>';}
  else{recent.forEach(function(s){
    var si=SI[s.sid]||{name:s.sid,icon:'📝'};
    html+='<div class="feed-item"><div class="feed-emoji">'+si.icon+'</div>'
      +'<div class="feed-text"><strong>'+si.name+'</strong><span class="feed-score '+scoreClass(s.pct)+'">'+s.score+'/'+s.total+' ('+s.pct+'%)</span></div>'
      +'<div class="feed-date">'+timeAgo(s.ts||Date.now())+'</div></div>';
  });}
  html+='</div>';



  document.getElementById('main').innerHTML = html;
  // Trigger level bar transitions after paint
  setTimeout(function() {
    var lb = document.getElementById('parent-lv-bar');
    var ob = document.getElementById('parent-overall-bar');
    if (lb) lb.style.width = _prog + '%';
    if (ob) ob.style.width = _overallPct + '%';
  }, 60);
}

/* ── LOAD DATA ─────────────────────────────────────────── */
function load() {
  if (!window.firebase || !firebase.apps || !firebase.apps.length) {
    document.getElementById('last-updated').textContent = 'Connecting…';
    setTimeout(load, 500);  // retry in 500ms
    return;
  }
  document.getElementById('last-updated').textContent = 'Loading…';
  var ref = firebase.database().ref('emily');
  Promise.all([
    ref.child('summary').once('value'),
    ref.child('sessions').once('value'),
    ref.child('timeLog').once('value'),
    ref.child('activity').once('value')
  ]).then(function(snaps) {
    var summary  = snaps[0].val() || {};
    var sessObj  = snaps[1].val() || {};
    var timeLog  = snaps[2].val() || {};
    var activity = snaps[3].val() || {};
    var sessions = Object.values(sessObj).sort(function(a,b){return (a.ts||0)-(b.ts||0);});
    // Merge old activity data into timeLog so heatmap shows full history
    // activity[date] = minutes; timeLog[date] = {total:secs, quiz:secs, ...}
    Object.keys(activity).forEach(function(date) {
      if (!timeLog[date]) {
        timeLog[date] = { total: (activity[date] || 0) * 60 };
      }
    });
    // Also build timeLog entries from sessions for any dates not yet in timeLog
    sessions.forEach(function(s) {
      if (s.date && !timeLog[s.date]) {
        timeLog[s.date] = { total: 600, quiz: 600 }; // estimate 10 min per session day
      }
    });
    renderMain({summary:summary, sessions:sessions, timeLog:timeLog});
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
  }).catch(function(e){
    document.getElementById('last-updated').textContent = 'Error: '+e.message;
    console.error(e);
  });
}

setInterval(function(){ if(window.firebase&&firebase.apps&&firebase.apps.length) load(); }, 60000);

// Load data immediately - Firebase is already initialised via <head> scripts
load();







// Expose all functions called from inline onclick handlers
window.setPeriod       = setPeriod;
window.togDay          = togDay;
window.load            = load;

// Event delegation for period tabs and day rows — avoids cross-script-block scope issues
document.addEventListener("click", function(e) {
  var tab = e.target.closest("[data-period]");
  if (tab) { setPeriod(tab.getAttribute("data-period")); return; }
  var dayRow = e.target.closest("[data-tog]");
  if (dayRow) { var ids = dayRow.getAttribute("data-tog").split(","); togDay(ids[0], ids[1]); return; }
  var act = e.target.closest("[data-action]");
  if (act) {
    var action = act.getAttribute("data-action");
    if (action === "load") { load(); return; }
  }
  var badge = e.target.closest("[data-badge]");
  if (badge) { showBadgeModal(badge.getAttribute("data-badge"), _getSummaryAsD()); }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--border:rgba(255,255,255,.08);--text:#f0eeff;--muted:rgba(240,238,255,.55);--dim:rgba(240,238,255,.3);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 8% 12%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(2px 2px at 62% 20%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 85% 55%,rgba(255,255,255,.2) 0%,transparent 100%);pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);}
  nav a{color:var(--muted);text-decoration:none;font-weight:600;}nav a:hover{color:var(--text);}
  nav span{opacity:.45;}
  .wrap{max-width:700px;margin:0 auto;padding:2rem 1.5rem 5rem;position:relative;z-index:1;}
  #setup-screen{animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .setup-title{font-family:'Nunito',sans-serif;font-size:clamp(1.7rem,5vw,2.4rem);font-weight:900;margin-bottom:.4rem;}
  .setup-sub{color:var(--muted);font-size:14px;margin-bottom:1.5rem;}
  .setup-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem;}
  .setup-label{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:.75rem;}
  .topic-selector{display:flex;flex-wrap:wrap;gap:7px;}
  .topic-chip{padding:.4rem .9rem;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid transparent;background:rgba(255,255,255,.05);color:var(--muted);transition:all .15s;font-family:'Nunito Sans',sans-serif;}
  .topic-chip.selected{color:var(--text);}
  .topic-chip:hover{background:rgba(255,255,255,.1);}
  .setup-row{display:flex;gap:8px;margin-top:.75rem;flex-wrap:wrap;}
  .link-btn{font-size:12px;padding:.35rem .8rem;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:background .12s;}
  .link-btn:hover{background:rgba(255,255,255,.1);color:var(--text);}
  .start-btn{width:100%;padding:1rem;border-radius:13px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;border:none;cursor:pointer;transition:opacity .15s,transform .1s;}
  .start-btn:hover{opacity:.9;transform:translateY(-1px);}
  .start-btn:disabled{opacity:.4;cursor:default;transform:none;}
  #progress-bar-wrap{display:none;margin-bottom:1.5rem;}
  .prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:.4rem;}
  .prog-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:3px;transition:width .35s ease;}
  #quiz-card{display:none;}
  .qcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.5rem 1.75rem;animation:slideIn .35s ease both;}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  .q-topic-tag{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 9px;border-radius:10px;margin-bottom:.85rem;}
  .q-text{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;line-height:1.4;margin-bottom:1.25rem;}
  .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  @media(max-width:480px){.opts-grid{grid-template-columns:1fr;}}
  .opt-btn{padding:.75rem 1rem;border-radius:11px;border:1.5px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-family:'Nunito Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:background .12s,border-color .12s,transform .1s;line-height:1.4;}
  .opt-btn:hover:not(:disabled){background:rgba(255,255,255,.09);transform:translateY(-1px);}
  .opt-btn.correct{background:rgba(91,191,106,.2);border-color:rgba(91,191,106,.6);color:#b2f0bb;}
  .opt-btn.wrong{background:rgba(224,92,106,.15);border-color:rgba(224,92,106,.5);color:#ffaab3;}
  .opt-btn:disabled{cursor:default;}
  .explanation{margin-top:1rem;padding:.75rem 1rem;background:rgba(255,255,255,.05);border-radius:10px;font-size:13.5px;line-height:1.6;display:none;}
  .explanation.show{display:block;}
  .next-btn{width:100%;margin-top:1rem;padding:.85rem;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;border:none;cursor:pointer;transition:opacity .15s,transform .1s;display:none;}
  .next-btn.show{display:block;}
  .next-btn:hover{opacity:.9;transform:translateY(-1px);}
  #results-screen{display:none;}
  .results-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:2rem;text-align:center;animation:fadeUp .5s ease both;margin-bottom:1rem;}
  .results-emoji{font-size:52px;margin-bottom:.75rem;display:block;}
  .results-score{font-family:'Nunito',sans-serif;font-size:clamp(2.5rem,10vw,4rem);font-weight:900;margin-bottom:.25rem;}
  .results-label{font-size:15px;color:var(--muted);margin-bottom:1.5rem;}
  .score-msg{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-bottom:1rem;}
  .breakdown-title{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:.75rem;}
  .breakdown-list{text-align:left;}
  .bd-row{display:flex;align-items:center;gap:10px;margin-bottom:.5rem;font-size:13px;}
  .bd-topic{flex:1;color:var(--muted);}
  .bd-bar-wrap{width:120px;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;}
  .bd-bar{height:100%;border-radius:4px;transition:width .6s ease;}
  .bd-frac{width:40px;text-align:right;font-weight:700;font-size:12px;}
  .results-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .ra-btn{flex:1;padding:.85rem 1rem;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;text-decoration:none;text-align:center;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;transition:background .15s;}
  .ra-btn:hover{background:rgba(255,255,255,.1);}
  .saved-banner{background:rgba(91,191,106,.12);border:1px solid rgba(91,191,106,.3);border-radius:10px;padding:.6rem 1rem;font-size:13px;color:#b2f0bb;text-align:center;margin-bottom:.75rem;display:none;}
</style>
</head>
<body>
<nav>
  <a href="index.html">🏠 Home</a><span>›</span>
  <a id="nav-subject" href="#">Subject</a><span>›</span>
  <span>Quiz</span>
</nav>
<div class="wrap">
  <div id="setup-screen">
    <div class="setup-title" id="setup-title">Quiz</div>
    <div class="setup-sub" id="setup-sub">Choose topics, then start.</div>
    <div class="setup-card">
      <div class="setup-label">Topics to include</div>
      <div class="topic-selector" id="topic-selector"></div>
      <div class="setup-row">
        <button class="link-btn" onclick="selectAll()">Select all</button>
        <button class="link-btn" onclick="clearAll()">Clear all</button>
      </div>
    </div>
    <div class="setup-card" style="display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;margin-bottom:1rem;" onclick="togglePractice()" id="practice-card">
      <div>
        <div style="font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text)">🎮 Practice Mode</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Results won't be saved — no XP, no impact on your progress</div>
      </div>
      <div id="practice-toggle" style="width:44px;height:26px;border-radius:13px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);position:relative;flex-shrink:0;transition:background .2s;">
        <div id="practice-knob" style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.35);transition:transform .2s,background .2s;"></div>
      </div>
    </div>
    <button class="start-btn" id="start-btn" onclick="startQuiz()" disabled>Start Quiz</button>
  </div>
  <div id="progress-bar-wrap">
    <div class="prog-meta">
      <span id="prog-label">Question 1 of 10</span>
      <span id="prog-score">Score: 0</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="quiz-card">
    <div class="qcard" id="qcard">
      <div class="q-topic-tag" id="q-tag"></div>
      <div class="q-text" id="q-text"></div>
      <div class="opts-grid" id="opts-grid"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
    </div>
  </div>
  <div id="results-screen">
    <div class="saved-banner" id="saved-banner">✅ Results saved to your progress tracker!</div>
    <div class="results-card">
      <span class="results-emoji" id="res-emoji"></span>
      <div class="results-score" id="res-score"></div>
      <div class="results-label" id="res-label"></div>
      <div class="score-msg" id="res-msg"></div>
      <div class="breakdown-title">Topic Breakdown</div>
      <div class="breakdown-list" id="breakdown"></div>
    </div>
    <div class="results-actions">
      <button class="ra-btn" onclick="retryQuiz()">🔁 Try Again</button>
      <a class="ra-btn" id="ra-mindmap" href="#">🗺 Mind Map</a>
      <a class="ra-btn" href="results.html">📊 My Progress</a>
      <a class="ra-btn" href="index.html">🏠 Home</a>
    </div>
  </div>
</div>
<script src="data.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG — paste your config values here
   Get these from: Firebase Console → Project Settings → Your Apps
   ═══════════════════════════════════════════════════════════ */

var FIREBASE_CFG = {
  apiKey:            "PASTE_YOUR_API_KEY_HERE",
  authDomain:        "PASTE_YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "https://PASTE_YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId:         "PASTE_YOUR_PROJECT_ID",
  storageBucket:     "PASTE_YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "PASTE_YOUR_SENDER_ID",
  appId:             "PASTE_YOUR_APP_ID"
};

// Initialise Firebase if config has been filled in
if (FIREBASE_CFG.apiKey !== "PASTE_YOUR_API_KEY_HERE") {
  var firebaseScript = document.createElement('script');
  firebaseScript.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  firebaseScript.onload = function() {
    var dbScript = document.createElement('script');
    dbScript.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    dbScript.onload = function() {
      firebase.initializeApp(FIREBASE_CFG);
      console.log('Firebase connected ✓');
    };
    document.head.appendChild(dbScript);
  };
  document.head.appendChild(firebaseScript);
} else {
  console.log('Firebase not configured — using localStorage only');
}

</script>
<script>
/* ═══════════════════════════════════════════════════════════════
   EMILY'S HUB — GAMIFICATION + TRACKING ENGINE
   Works with localStorage immediately.
   Drop in Firebase config to sync across devices.
   ═══════════════════════════════════════════════════════════════ */

var HUB_STORE    = 'emilys_hub_v1';
var STREAK_STORE = 'emilys_streak_v1';

/* ── MIGRATE OLD DATA ──────────────────────────────────── */
(function migrateLegacy() {
  try {
    // Remove old results key that conflicts with the XP engine
    localStorage.removeItem('emilys_results_v1');
  } catch(e) {}
})();
var FIREBASE_CFG = null; // set by firebase-config.js when available

/* ── XP VALUES ─────────────────────────────────────────── */
var XP = {
  QUIZ_COMPLETE:      10,
  QUIZ_PERFECT:       20,   // bonus on top of QUIZ_COMPLETE for 10/10
  QUIZ_90:            15,   // bonus for 90%+
  LESSON_READ:         5,
  MINDMAP_VISIT:       2,
  FIRST_QUIZ_TODAY:    5,
  STREAK_7:           50,
  STREAK_30:         150,
  WEAK_TOPIC_FIXED:   25,   // topic goes from <60% to >=70%
  IMPROVE_3_ROW:      20,   // same subject improves 3 sessions running
};

/* ── LEVELS ────────────────────────────────────────────── */
var LEVELS = [
  { level:1, title:'Starter',   xp:0,    emoji:'🌱' },
  { level:2, title:'Learner',   xp:100,  emoji:'📖' },
  { level:3, title:'Scholar',   xp:300,  emoji:'🎓' },
  { level:4, title:'Expert',    xp:600,  emoji:'🔬' },
  { level:5, title:'Champion',  xp:1000, emoji:'🏆' },
  { level:6, title:'Legend',    xp:1500, emoji:'⭐' },
];

/* ── BADGES ────────────────────────────────────────────── */
var BADGE_DEFS = [
  { id:'first_quiz',    emoji:'🎉', title:'First Steps',      desc:'Complete your first quiz' },
  { id:'perfect_ten',  emoji:'💯', title:'Perfect Ten',       desc:'Score 10/10 on any quiz' },
  { id:'streak_3',     emoji:'🔥', title:'On Fire',           desc:'3-day streak' },
  { id:'streak_7',     emoji:'🌟', title:'Week Warrior',      desc:'7-day streak' },
  { id:'streak_30',    emoji:'🚀', title:'Unstoppable',       desc:'30-day streak' },
  { id:'bookworm',     emoji:'📚', title:'Bookworm',          desc:'Read 20 lessons' },
  { id:'explorer',     emoji:'🌍', title:'Explorer',          desc:'Quiz in every subject' },
  { id:'sharp',        emoji:'🎯', title:'Sharp Shooter',     desc:'Answer 100 questions correctly' },
  { id:'comeback',     emoji:'💪', title:'Comeback Kid',      desc:'Improve a topic from below 60% to above 70%' },
  { id:'star_pupil',   emoji:'⭐', title:'Star Pupil',        desc:'Score 90%+ five times' },
  { id:'trending',     emoji:'📈', title:'Trending Up',       desc:'Improve score in the same subject 3 sessions in a row' },
  { id:'all_rounder',  emoji:'🎪', title:'All-Rounder',       desc:'Score 70%+ in every subject at least once' },
  { id:'century',      emoji:'💫', title:'Century',           desc:'Complete 100 quizzes' },
  { id:'night_owl',    emoji:'🦉', title:'Night Owl',         desc:'Complete a quiz after 9pm' },
  { id:'early_bird',   emoji:'🐦', title:'Early Bird',        desc:'Complete a quiz before 8am' },
  { id:'lesson_20',    emoji:'🧠', title:'Deep Diver',        desc:'Read 20 different lessons' },
];

/* ── LOCAL STORE HELPERS ───────────────────────────────── */
function _load() {
  try { return JSON.parse(localStorage.getItem(HUB_STORE)) || _blank(); }
  catch(e) { return _blank(); }
}
function _save(d) {
  try { localStorage.setItem(HUB_STORE, JSON.stringify(d)); } catch(e) {}
}
function _blank() {
  return {
    xp: 0,
    badges: [],
    lessonsRead: [],
    mindmapVisits: {},
    quizSessions: [],    // { sid, date, ts, score, total, pct, topicScores }
    topicHistory: {},    // sid -> topic -> [pct, pct, ...]
    subjectSessions: {}, // sid -> [pct, pct, ...]  for trend detection
    activity: {},        // date -> minutes (approx)
    newBadges: [],       // badges earned this session, shown as toast
    newXP: 0,            // XP earned this session, for animation
  };
}

/* ── STREAK ─────────────────────────────────────────────── */
function _loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_STORE)) || {count:0,lastDate:''}; }
  catch(e) { return {count:0,lastDate:''}; }
}
function _saveStreak(s) {
  try { localStorage.setItem(STREAK_STORE, JSON.stringify(s)); } catch(e) {}
}
function _touchStreak() {
  var today = _today();
  var s = _loadStreak();
  if (s.lastDate === today) return s.count;
  var yest = _yesterday();
  s.count = (s.lastDate === yest) ? s.count + 1 : 1;
  s.lastDate = today;
  _saveStreak(s);
  return s.count;
}
function _today() { return new Date().toISOString().slice(0,10); }
function _yesterday() { return new Date(Date.now()-86400000).toISOString().slice(0,10); }
function getStreak() {
  var s = _loadStreak();
  var today = _today(), yest = _yesterday();
  if (s.lastDate !== today && s.lastDate !== yest) return 0;
  return s.count;
}

/* ── XP / LEVEL HELPERS ─────────────────────────────────── */
function getLevel(xp) {
  var lv = LEVELS[0];
  for (var i = 0; i < LEVELS.length; i++) {
    if (xp >= LEVELS[i].xp) lv = LEVELS[i]; else break;
  }
  return lv;
}
function getNextLevel(xp) {
  for (var i = 0; i < LEVELS.length; i++) {
    if (LEVELS[i].xp > xp) return LEVELS[i];
  }
  return null;
}
function getLevelProgress(xp) {
  var cur = getLevel(xp), next = getNextLevel(xp);
  if (!next) return 100;
  return Math.round(((xp - cur.xp) / (next.xp - cur.xp)) * 100);
}

/* ── BADGE AWARDING ─────────────────────────────────────── */
function _awardBadge(d, id) {
  if (d.badges.indexOf(id) === -1) {
    d.badges.push(id);
    d.newBadges.push(id);
    var def = BADGE_DEFS.find(function(b){ return b.id === id; });
    if (def) console.log('🏅 Badge unlocked: ' + def.title);
  }
}

function _checkBadges(d, context) {
  var ctx = context || {};

  // First quiz
  if (d.quizSessions.length >= 1) _awardBadge(d, 'first_quiz');

  // Perfect ten
  if (ctx.score === 10 && ctx.total === 10) _awardBadge(d, 'perfect_ten');

  // Streaks
  var streak = getStreak();
  if (streak >= 3)  _awardBadge(d, 'streak_3');
  if (streak >= 7)  _awardBadge(d, 'streak_7');
  if (streak >= 30) _awardBadge(d, 'streak_30');

  // Lessons read
  if (d.lessonsRead.length >= 20) { _awardBadge(d, 'bookworm'); _awardBadge(d, 'lesson_20'); }

  // Explorer — quiz in every subject
  var subjectsQuizzed = Object.keys(d.subjectSessions || {});
  var allSubjects = Object.keys(SUBJECTS);
  if (allSubjects.every(function(s){ return subjectsQuizzed.indexOf(s) > -1; }))
    _awardBadge(d, 'explorer');

  // Sharp shooter — 100 correct answers total
  var totalCorrect = d.quizSessions.reduce(function(a,s){ return a + s.score; }, 0);
  if (totalCorrect >= 100) _awardBadge(d, 'sharp');

  // Star pupil — 90%+ five times
  var high = d.quizSessions.filter(function(s){ return s.pct >= 90; }).length;
  if (high >= 5) _awardBadge(d, 'star_pupil');

  // 100 quizzes
  if (d.quizSessions.length >= 100) _awardBadge(d, 'century');

  // Night owl / early bird
  var hour = new Date().getHours();
  if (hour >= 21) _awardBadge(d, 'night_owl');
  if (hour < 8)   _awardBadge(d, 'early_bird');

  // Comeback — topic fixed
  if (ctx.topicFixed) _awardBadge(d, 'comeback');

  // Trending up — same subject improved 3 in a row
  if (ctx.improved3) _awardBadge(d, 'trending');

  // All-rounder — 70%+ in every subject
  var allGood = allSubjects.every(function(sid) {
    var sessions = d.subjectSessions[sid] || [];
    return sessions.some(function(p){ return p >= 70; });
  });
  if (allGood) _awardBadge(d, 'all_rounder');
}

/* ── MAIN TRACKING FUNCTIONS ────────────────────────────── */

// Call when quiz finishes
function trackQuizComplete(sid, topicScores, score, total) {
  var d = _load();
  var pct = Math.round((score / total) * 100);
  var today = _today();
  d.newBadges = [];
  d.newXP = 0;

  // XP
  var earned = XP.QUIZ_COMPLETE;
  if (score === total) earned += XP.QUIZ_PERFECT;
  else if (pct >= 90)  earned += XP.QUIZ_90;

  // First quiz today bonus
  var todaySessions = d.quizSessions.filter(function(s){ return s.date === today; });
  if (todaySessions.length === 0) earned += XP.FIRST_QUIZ_TODAY;

  d.xp += earned;
  d.newXP = earned;

  // Record session
  d.quizSessions.push({ sid:sid, date:today, ts:Date.now(), score:score, total:total, pct:pct });
  if (d.quizSessions.length > 200) d.quizSessions = d.quizSessions.slice(-200);

  // Subject trend
  if (!d.subjectSessions) d.subjectSessions = {};
  if (!d.subjectSessions[sid]) d.subjectSessions[sid] = [];
  d.subjectSessions[sid].push(pct);

  // Check improved 3 in a row
  var subjHistory = d.subjectSessions[sid];
  var improved3 = subjHistory.length >= 3 &&
    subjHistory[subjHistory.length-1] > subjHistory[subjHistory.length-2] &&
    subjHistory[subjHistory.length-2] > subjHistory[subjHistory.length-3];
  if (improved3) { d.xp += XP.IMPROVE_3_ROW; d.newXP += XP.IMPROVE_3_ROW; }

  // Topic history + weak topic check
  if (!d.topicHistory) d.topicHistory = {};
  if (!d.topicHistory[sid]) d.topicHistory[sid] = {};
  var topicFixed = false;
  Object.entries(topicScores).forEach(function(entry) {
    var t = entry[0], v = entry[1];
    var tpct = Math.round((v.c / v.t) * 100);
    if (!d.topicHistory[sid][t]) d.topicHistory[sid][t] = { correct:0, attempted:0, sessions:[] };
    var th = d.topicHistory[sid][t];
    var prevPct = th.attempted > 0 ? Math.round((th.correct/th.attempted)*100) : null;
    th.correct   += v.c;
    th.attempted += v.t;
    th.sessions.push(tpct);
    if (prevPct !== null && prevPct < 60 && tpct >= 70) {
      topicFixed = true;
      d.xp += XP.WEAK_TOPIC_FIXED;
      d.newXP += XP.WEAK_TOPIC_FIXED;
    }
  });

  // Streak
  var streak = _touchStreak();
  if (streak === 7)  { d.xp += XP.STREAK_7;  d.newXP += XP.STREAK_7; }
  if (streak === 30) { d.xp += XP.STREAK_30; d.newXP += XP.STREAK_30; }

  // Activity time (rough — add 5 min per quiz)
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 5;

  _checkBadges(d, { score:score, total:total, topicFixed:topicFixed, improved3:improved3 });
  _save(d);
  _firebaseSync(d, sid, topicScores, score, total, pct);
  return { xp: earned, badges: d.newBadges, totalXP: d.xp };
}

// Call when lesson is opened
function trackLessonRead(sid, lessonKey) {
  var d = _load();
  var key = sid + '/' + lessonKey;
  if (d.lessonsRead.indexOf(key) === -1) {
    d.lessonsRead.push(key);
    d.xp += XP.LESSON_READ;
    d.newXP = XP.LESSON_READ;
    d.newBadges = [];
    _checkBadges(d, {});
    _save(d);
    if (d.newBadges.length > 0) showXPToast(XP.LESSON_READ, d.newBadges);
  }
  var today = _today();
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 2;
  _save(d);
}

// Call when mindmap is visited
function trackMindmapVisit(sid) {
  var d = _load();
  var today = _today();
  var key = sid + '_' + today;
  if (!d.mindmapVisits) d.mindmapVisits = {};
  if (!d.mindmapVisits[key]) {
    d.mindmapVisits[key] = true;
    d.xp += XP.MINDMAP_VISIT;
    _save(d);
  }
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 1;
  _save(d);
}

/* ── FIREBASE SYNC ──────────────────────────────────────── */
function _firebaseSync(d, sid, topicScores, score, total, pct) {
  // If Firebase not ready yet, retry after 3 seconds
  if (!window.firebase || !window.firebase.apps || !firebase.apps.length) {
    setTimeout(function(){ _firebaseSync(d, sid, topicScores, score, total, pct); }, 3000);
    return;
  }
  try {
    var db = firebase.database();
    var ref = db.ref('emily');
    // Push quiz session
    ref.child('sessions').push({
      sid:sid, date:_today(), ts:Date.now(),
      score:score, total:total, pct:pct,
      topicScores: Object.fromEntries
        ? Object.fromEntries(Object.entries(topicScores).map(function(e){ return [e[0],{c:e[1].c,t:e[1].t}]; }))
        : topicScores
    });
    // Update summary
    ref.child('summary').set({
      xp: d.xp,
      badges: d.badges,
      streak: getStreak(),
      lastActive: _today(),
      totalQuizzes: d.quizSessions.length,
      lastUpdated: Date.now()
    });
    // Activity heatmap
    ref.child('activity').child(_today()).transaction(function(cur){ return (cur||0) + 5; });
  } catch(e) { console.warn('Firebase sync failed:', e); }
}

/* ── XP TOAST (shown in quiz/lesson pages) ─────────────── */
function showXPToast(xp, newBadges) {
  var existing = document.getElementById('xp-toast');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.id = 'xp-toast';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;'
    + 'background:#1a1825;border:1px solid rgba(255,215,0,.4);border-radius:14px;'
    + 'padding:.75rem 1.1rem;font-family:Nunito,sans-serif;font-size:14px;font-weight:800;'
    + 'color:#ffd580;box-shadow:0 8px 32px rgba(0,0,0,.5);'
    + 'animation:toastIn .4s ease both;max-width:280px;';

  var content = '✨ +' + xp + ' XP';
  if (newBadges && newBadges.length > 0) {
    newBadges.forEach(function(id) {
      var def = BADGE_DEFS.find(function(b){ return b.id === id; });
      if (def) content += '<br><span style="font-size:12px;color:#c4bbff">' + def.emoji + ' Badge unlocked: ' + def.title + '</span>';
    });
  }
  toast.innerHTML = content;

  if (!document.getElementById('toast-style')) {
    var s = document.createElement('style');
    s.id = 'toast-style';
    s.textContent = '@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(toast);
  setTimeout(function(){ toast.style.opacity='0'; toast.style.transition='opacity .4s'; }, 3500);
  setTimeout(function(){ toast.remove(); }, 4000);
}

/* ── XP BAR (persistent, shown on all pages) ───────────── */
function renderXPBar() {
  var d = _load();
  var streak = getStreak();
  var lv = getLevel(d.xp);
  var next = getNextLevel(d.xp);
  var prog = getLevelProgress(d.xp);

  var bar = document.getElementById('xp-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'xp-bar';
    bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:200;'
      + 'background:rgba(15,14,23,.92);backdrop-filter:blur(12px);'
      + 'border-top:1px solid rgba(255,255,255,.08);'
      + 'padding:.5rem 1.25rem;display:flex;align-items:center;gap:12px;';
    document.body.appendChild(bar);
  }

  var streakHtml = streak > 0
    ? '<span style="font-size:13px;font-weight:700;color:#ffd580;white-space:nowrap">🔥 ' + streak + '</span>'
    : '';

  bar.innerHTML = '<a href="results.html" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;min-width:0">'
    + '<span style="font-size:18px;flex-shrink:0">' + lv.emoji + '</span>'
    + '<div style="flex:1;min-width:0">'
    +   '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
    +     '<span style="font-family:Nunito,sans-serif;font-size:12px;font-weight:800;color:#c4bbff;white-space:nowrap">'
    +       lv.title + ' · ' + d.xp + ' XP'
    +     '</span>'
    +     (next ? '<span style="font-size:11px;color:rgba(240,238,255,.35)">' + next.title + ' in ' + (next.xp - d.xp) + ' XP</span>' : '<span style="font-size:11px;color:#ffd580">MAX LEVEL</span>')
    +   '</div>'
    +   '<div style="height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden">'
    +     '<div style="height:100%;width:' + prog + '%;background:linear-gradient(90deg,#9b59b6,#3498db);border-radius:3px;transition:width .6s ease"></div>'
    +   '</div>'
    + '</div></a>'
    + streakHtml
    + '<a href="results.html" style="font-size:11px;font-weight:700;color:rgba(240,238,255,.4);text-decoration:none;white-space:nowrap;flex-shrink:0">My Stats ›</a>';
}

</script>

<script>
// ── QUIZ SETUP ───────────────────────────────────────────────────
var params = new URLSearchParams(location.search);
var sid = params.get('subject') || 'maths';
var preselect = params.get('topic');
var S = SUBJECTS[sid];
var c1 = S.gradient[0], c2 = S.gradient[1];
var allQuestions = QUIZ_QUESTIONS[sid] || [];

document.getElementById('nav-subject').textContent = S.name;
document.getElementById('nav-subject').href = 'mindmap.html?subject=' + sid;
document.getElementById('ra-mindmap').href = 'mindmap.html?subject=' + sid;
document.getElementById('setup-title').textContent = S.name + ' Quiz';
document.getElementById('setup-sub').textContent = allQuestions.length + ' questions · Choose topics to include';
document.getElementById('start-btn').style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
document.getElementById('start-btn').style.color = '#fff';
document.title = S.name + ' Quiz';

var topics = [...new Set(allQuestions.map(function(q){return q.topic;}))];
var selected = new Set(preselect ? [preselect] : topics);
var selector = document.getElementById('topic-selector');

function renderChips() {
  selector.innerHTML = topics.map(function(t) {
    var meta = (S.topicMeta && S.topicMeta[t]) || {};
    var isSel = selected.has(t);
    return '<div class="topic-chip ' + (isSel ? 'selected' : '') + '" '
      + 'style="' + (isSel ? 'background:rgba(124,111,205,.18);border-color:' + c1 + ';color:var(--text)' : 'background:rgba(255,255,255,.05);border-color:transparent') + '" '
      + 'onclick="toggleTopic(\'' + t.replace(/'/g,"\\'") + '\')">'
      + (meta.icon || '') + ' ' + t + '</div>';
  }).join('');
  document.getElementById('start-btn').disabled = selected.size === 0;
}
renderChips();
renderXPBar();

function toggleTopic(t) { selected.has(t) ? selected.delete(t) : selected.add(t); renderChips(); }
function selectAll() { topics.forEach(function(t){selected.add(t);}); renderChips(); }
function clearAll() { selected.clear(); renderChips(); }

// ── QUIZ STATE ───────────────────────────────────────────────────
var questions=[], qi=0, score=0, topicScores={}, shuffledOpts=[], correctShuffled=0;
var practiceMode = false;

function togglePractice() {
  practiceMode = !practiceMode;
  var toggle = document.getElementById('practice-toggle');
  var knob = document.getElementById('practice-knob');
  var btn = document.getElementById('start-btn');
  if (practiceMode) {
    toggle.style.background = '#f5a623';
    toggle.style.borderColor = '#f5a623';
    knob.style.transform = 'translateX(18px)';
    knob.style.background = '#fff';
    btn.textContent = 'Start Practice';
    btn.style.background = 'linear-gradient(135deg,#f5a623,#e05c6a)';
  } else {
    toggle.style.background = 'rgba(255,255,255,.1)';
    toggle.style.borderColor = 'rgba(255,255,255,.15)';
    knob.style.transform = 'translateX(0)';
    knob.style.background = 'rgba(255,255,255,.35)';
    btn.textContent = 'Start Quiz';
    btn.style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
  }
}

function startQuiz() {
  var pool = allQuestions.filter(function(q){return selected.has(q.topic);});
  questions = pool.slice().sort(function(){return Math.random()-.5;}).slice(0, Math.min(pool.length, 10));
  qi = 0; score = 0; topicScores = {};
  questions.forEach(function(q) {
    if (!topicScores[q.topic]) topicScores[q.topic] = {c:0, t:0};
    topicScores[q.topic].t++;
  });
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('prog-fill').style.background = 'linear-gradient(90deg,' + c1 + ',' + c2 + ')';
  showQuestion();
}

function showQuestion() {
  if (qi >= questions.length) { showResults(); return; }
  var q = questions[qi];
  var meta = (S.topicMeta && S.topicMeta[q.topic]) || {};

  document.getElementById('prog-label').textContent = 'Question ' + (qi+1) + ' of ' + questions.length;
  document.getElementById('prog-score').textContent = 'Score: ' + score;
  document.getElementById('prog-fill').style.width = ((qi / questions.length) * 100) + '%';

  shuffledOpts = q.opts.map(function(o,i){return {o:o,orig:i};}).sort(function(){return Math.random()-.5;});
  correctShuffled = shuffledOpts.findIndex(function(x){return x.orig === q.ans;});

  document.getElementById('q-tag').textContent = (meta.icon || '') + ' ' + q.topic;
  document.getElementById('q-tag').style.background = 'rgba(124,111,205,.18)';
  document.getElementById('q-tag').style.color = c1;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('next-btn').className = 'next-btn';

  var card = document.getElementById('qcard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'slideIn .35s ease both';

  var grid = document.getElementById('opts-grid');
  grid.innerHTML = shuffledOpts.map(function(x,si) {
    return '<button class="opt-btn" onclick="answer(' + si + ')">' + x.o + '</button>';
  }).join('');
}

function answer(chosen) {
  var q = questions[qi];
  var btns = document.getElementById('opts-grid').querySelectorAll('.opt-btn');
  btns.forEach(function(b,i) {
    b.disabled = true;
    if (i === correctShuffled) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  var correct = chosen === correctShuffled;
  if (correct) { score++; topicScores[q.topic].c++; }
  var exp = document.getElementById('explanation');
  exp.innerHTML = (correct ? '✅' : '❌') + ' ' + q.exp;
  exp.className = 'explanation show';
  var nb = document.getElementById('next-btn');
  nb.textContent = qi < questions.length - 1 ? 'Next Question →' : 'See Results →';
  nb.style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
  nb.style.color = '#fff';
  nb.className = 'next-btn show';
}

function nextQuestion() { qi++; showQuestion(); }

function showResults() {
  document.getElementById('progress-bar-wrap').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';

  var pct = Math.round((score / questions.length) * 100);
  var emoji = pct >= 90 ? '🏆' : pct >= 70 ? '⭐' : pct >= 50 ? '📚' : '💪';
  var msg = pct >= 90 ? 'Outstanding! 🎉' : pct >= 70 ? 'Really good — keep going!' : pct >= 50 ? 'Getting there — review the mind map.' : "Keep practising — you've got this!";

  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-score').textContent = score + '/' + questions.length;
  document.getElementById('res-score').style.background = 'linear-gradient(135deg,' + c1 + ',' + c2 + ')';
  document.getElementById('res-score').style.webkitBackgroundClip = 'text';
  document.getElementById('res-score').style.webkitTextFillColor = 'transparent';
  document.getElementById('res-score').style.backgroundClip = 'text';
  document.getElementById('res-label').textContent = pct + '% correct';
  document.getElementById('res-msg').textContent = msg;

  var bd = document.getElementById('breakdown');
  bd.innerHTML = Object.entries(topicScores).map(function(entry) {
    var t = entry[0], v = entry[1];
    var tpct = Math.round((v.c / v.t) * 100);
    var meta = (S.topicMeta && S.topicMeta[t]) || {};
    return '<div class="bd-row">'
      + '<div class="bd-topic">' + (meta.icon||'') + ' ' + t + '</div>'
      + '<div class="bd-bar-wrap"><div class="bd-bar" style="width:' + tpct + '%;background:linear-gradient(90deg,' + c1 + ',' + c2 + ')"></div></div>'
      + '<div class="bd-frac">' + v.c + '/' + v.t + '</div>'
      + '</div>';
  }).join('');

  // Save results + award XP (unless practice mode)
  var banner = document.getElementById('saved-banner');
  if (practiceMode) {
    banner.innerHTML = '🎮 Practice mode — results not saved';
    banner.style.background = 'rgba(245,166,35,.1)';
    banner.style.borderColor = 'rgba(245,166,35,.3)';
    banner.style.color = '#ffd580';
    banner.style.display = 'block';
  } else {
    var reward = trackQuizComplete(sid, topicScores, score, questions.length);
    showXPToast(reward.xp, reward.badges);
    renderXPBar();
    banner.innerHTML = '✅ Results saved to your progress tracker!';
    banner.style.background = 'rgba(91,191,106,.12)';
    banner.style.borderColor = 'rgba(91,191,106,.3)';
    banner.style.color = '#b2f0bb';
    banner.style.display = 'block';
  }
}

function retryQuiz() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}

/* ── TIME TRACKING ─────────────────────────────────────── */
var _pageStart = Date.now();
var _pageType = (function() {
  var p = location.pathname.split('/').pop() || 'index.html';
  if (p.includes('quiz'))    return 'quiz';
  if (p.includes('lesson'))  return 'lesson';
  if (p.includes('mindmap')) return 'mindmap';
  if (p.includes('results')) return 'results';
  if (p.includes('index') || p === '' || p === '/') return 'home';
  return 'other';
})();

function _recordTime() {
  var secs = Math.round((Date.now() - _pageStart) / 1000);
  if (secs < 3 || secs > 7200) return; // ignore < 3s and > 2hr (tab left open)
  var today = new Date().toISOString().slice(0,10);

  // Save to localStorage
  try {
    var d = JSON.parse(localStorage.getItem('emilys_hub_v1')) || {};
    if (!d.timeLog) d.timeLog = {};
    if (!d.timeLog[today]) d.timeLog[today] = { total:0, quiz:0, lesson:0, mindmap:0, home:0, other:0 };
    d.timeLog[today].total = (d.timeLog[today].total||0) + secs;
    d.timeLog[today][_pageType] = (d.timeLog[today][_pageType]||0) + secs;
    // Keep last 90 days only
    var keys = Object.keys(d.timeLog).sort();
    if (keys.length > 90) { delete d.timeLog[keys[0]]; }
    // Update activity heatmap too (in minutes)
    if (!d.activity) d.activity = {};
    d.activity[today] = (d.activity[today]||0) + Math.round(secs/60);
    localStorage.setItem('emilys_hub_v1', JSON.stringify(d));
  } catch(e) {}

  // Sync to Firebase
  try {
    if (window.firebase && firebase.apps && firebase.apps.length) {
      var db = firebase.database();
      db.ref('emily/timeLog/' + today + '/total').transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/timeLog/' + today + '/' + _pageType).transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/activity/' + today).transaction(function(v){ return (v||0)+Math.round(secs/60); });
    }
  } catch(e) {}
}

// Record time when leaving the page
window.addEventListener('beforeunload', _recordTime);
window.addEventListener('pagehide', _recordTime);
// Also record periodically every 60s (in case tab is kept open)
setInterval(function() {
  _recordTime();
  _pageStart = Date.now(); // reset so we don't double-count
}, 60000);

</script>

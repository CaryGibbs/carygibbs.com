<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--border:rgba(255,255,255,.08);--text:#f0eeff;--muted:rgba(240,238,255,.55);--dim:rgba(240,238,255,.3);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 8% 12%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(2px 2px at 62% 20%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 85% 55%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 90%,rgba(255,255,255,.25) 0%,transparent 100%);pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);}
  nav a{color:var(--muted);text-decoration:none;font-weight:600;}nav a:hover{color:var(--text);}
  nav span{opacity:.45;}
  .wrap{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 5rem;position:relative;z-index:1;}

  /* HERO */
  .lesson-hero{margin-bottom:2rem;}
  .topic-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:.75rem;}
  .lesson-hero h1{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;line-height:1.1;margin-bottom:.4rem;}
  .lesson-hero p{color:var(--muted);font-size:15px;line-height:1.6;}

  /* SECTIONS */
  .section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .section-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.9rem;display:flex;align-items:center;gap:7px;}

  /* KEY IDEA */
  .key-idea-rule{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;margin-bottom:.5rem;line-height:1.3;}
  .key-idea-detail{font-size:14px;color:var(--muted);line-height:1.6;}

  /* FORMULAE */
  .formula-list{display:flex;flex-direction:column;gap:.6rem;}
  .formula-row{display:flex;align-items:center;gap:12px;padding:.7rem 1rem;border-radius:10px;}
  .formula-main{font-family:monospace;font-size:16px;font-weight:700;flex:1;}
  .formula-note{font-size:12px;color:var(--muted);text-align:right;}

  /* STEPS */
  .steps-list{counter-reset:step;}
  .step-item{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .step-item:last-child{border-bottom:none;}
  .step-num{counter-increment:step;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step-title{font-weight:700;font-size:14px;margin-bottom:2px;}
  .step-detail{font-size:13px;color:var(--muted);line-height:1.5;}
  .step-formula{font-family:monospace;font-size:13px;margin-top:4px;padding:3px 8px;border-radius:6px;display:inline-block;}

  /* COMPARE (good/bad examples) */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:540px){.compare-grid{grid-template-columns:1fr;}}
  .compare-box{padding:.9rem 1rem;border-radius:10px;font-size:13px;line-height:1.6;}
  .compare-label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:5px;}

  /* WORKED EXAMPLES */
  .worked-q{font-size:14px;font-weight:700;margin-bottom:.75rem;padding:.6rem .9rem;border-radius:9px;border-left:3px solid;}
  .worked-table{width:100%;border-collapse:collapse;font-size:13px;}
  .worked-table tr{border-bottom:1px solid rgba(255,255,255,.05);}
  .worked-table tr:last-child{border-bottom:none;}
  .worked-table td{padding:.45rem .5rem;vertical-align:top;}
  .worked-table td:first-child{color:var(--dim);width:85px;font-size:12px;}
  .worked-table td:nth-child(2){font-family:monospace;font-weight:700;font-size:14px;padding-right:10px;}
  .worked-table td:last-child{color:var(--muted);font-style:italic;font-size:12px;}
  .answer-row td{padding-top:.6rem!important;}

  /* TIPS & MISTAKES */
  .tip-list{display:flex;flex-direction:column;gap:.6rem;}
  .tip-row{display:flex;gap:10px;font-size:13.5px;line-height:1.6;}
  .tip-icon{font-size:16px;flex-shrink:0;margin-top:2px;}
  .mistake-list{display:flex;flex-direction:column;gap:.5rem;}
  .mistake-row{font-size:13.5px;line-height:1.6;padding:.6rem .9rem;border-radius:9px;background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.2);}

  /* PRACTICE */
  .practice-intro{font-size:13px;color:var(--muted);margin-bottom:.9rem;}
  .pq{margin-bottom:.9rem;padding:.9rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  .pq-q{font-size:14px;font-weight:700;margin-bottom:.6rem;line-height:1.4;}
  .pq-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  @media(max-width:480px){.pq-opts{grid-template-columns:1fr;}}
  .pq-opt{padding:.45rem .75rem;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);text-align:left;font-family:'Nunito Sans',sans-serif;transition:background .12s,border-color .12s;}
  .pq-opt:hover:not(:disabled){background:rgba(255,255,255,.09);}
  .pq-opt.correct{background:rgba(91,191,106,.2);border-color:rgba(91,191,106,.5);color:#b2f0bb;}
  .pq-opt.wrong{background:rgba(224,92,106,.15);border-color:rgba(224,92,106,.4);color:#ffaab3;}
  .pq-opt:disabled{cursor:default;}
  .pq-exp{margin-top:.6rem;font-size:12.5px;line-height:1.5;padding:.5rem .75rem;border-radius:7px;background:rgba(255,255,255,.05);display:none;}
  .pq-exp.show{display:block;}

  /* POEM BLOCK */
  .poem-block{font-style:italic;padding:.75rem 1rem;border-radius:10px;font-size:14px;line-height:1.9;margin-bottom:.9rem;border-left:3px solid;}

  /* PREV/NEXT NAV */
  .lesson-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2rem;}
  .nav-btn{padding:.9rem 1.1rem;border-radius:13px;border:1px solid var(--border);background:var(--surface);text-decoration:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:background .15s,transform .1s;display:block;}
  .nav-btn:hover{background:rgba(255,255,255,.07);transform:translateY(-1px);}
  .nav-btn.prev{text-align:left;}
  .nav-btn.next{text-align:right;}
  .nav-btn .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:2px;}
  .quiz-cta{display:block;text-align:center;margin-top:1rem;padding:1rem;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;text-decoration:none;transition:opacity .15s,transform .1s;}
  .quiz-cta:hover{opacity:.88;transform:translateY(-2px);}
</style>
</head>
<body>
<nav id="nav-bar">
  <a href="index.html">🏠 Home</a>
  <span>›</span>
  <a id="nav-subject" href="#">Subject</a>
  <span>›</span>
  <span id="nav-topic">Lesson</span>
</nav>
<div class="wrap" id="lesson-wrap">
  <p style="color:var(--muted);margin-top:2rem;">Loading lesson…</p>
</div>
<script src="data.js"></script>
<script>
const params = new URLSearchParams(location.search);
const key = params.get('lesson');
const L = key ? LESSONS[key] : null;

const wrap = document.getElementById('lesson-wrap');

if (!L) {
  wrap.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted)">
    <div style="font-size:48px;margin-bottom:1rem">🔍</div>
    <h2 style="font-family:Nunito;font-weight:900;margin-bottom:.5rem">Lesson not found</h2>
    <p>Check the URL or <a href="index.html" style="color:#c4bbff">go home</a>.</p>
  </div>`;
} else {
  // Find which subject this belongs to
  const sid = Object.keys(SUBJECTS).find(id => {
    const meta = SUBJECTS[id].topicMeta || {};
    return Object.keys(meta).includes(L.topic);
  }) || 'maths';
  const S = SUBJECTS[sid];
  const pal = PALETTE[L.theme] || PALETTE.purple;

  // Update nav
  document.getElementById('nav-subject').textContent = S.name;
  document.getElementById('nav-subject').href = `mindmap.html?subject=${sid}`;
  document.getElementById('nav-topic').textContent = L.title;
  document.title = L.title;

  // ── Build sections ──

  const heroHTML = `
    <div class="lesson-hero">
      <div class="topic-tag" style="background:${pal.bg};color:${pal.light}">${L.icon} ${L.topic}</div>
      <h1 style="background:linear-gradient(135deg,${pal.light},${pal.color});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${L.title}</h1>
      <p>${L.subtitle}</p>
    </div>`;

  const keyIdeaHTML = `
    <div class="section" style="animation-delay:.05s;border-color:${pal.bg}">
      <div class="section-title">💡 Key Idea</div>
      <div class="key-idea-rule" style="color:${pal.light}">${L.keyIdea.rule}</div>
      ${L.keyIdea.detail ? `<div class="key-idea-detail">${L.keyIdea.detail}</div>` : ''}
    </div>`;

  const formulaeHTML = (L.formulae && L.formulae.length) ? `
    <div class="section" style="animation-delay:.1s">
      <div class="section-title">📐 Formulae</div>
      <div class="formula-list">
        ${L.formulae.map(f => `
          <div class="formula-row" style="background:${pal.bg}">
            <div class="formula-main" style="color:${pal.light}">${f.main}</div>
            ${f.note ? `<div class="formula-note">${f.note}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>` : '';

  const stepsHTML = (L.steps && L.steps.length) ? `
    <div class="section" style="animation-delay:.15s">
      <div class="section-title">📋 Method</div>
      <div class="steps-list">
        ${L.steps.map(s => `
          <div class="step-item">
            <div class="step-num" style="background:${pal.bg};color:${pal.light}">•</div>
            <div>
              <div class="step-title">${s.title}</div>
              ${s.detail ? `<div class="step-detail">${s.detail}</div>` : ''}
              ${s.formula ? `<div class="step-formula" style="background:${pal.bg};color:${pal.light}">${s.formula}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const compareHTML = (L.compare && L.compare.length) ? `
    <div class="section" style="animation-delay:.17s">
      <div class="section-title">⚖️ Good vs. Weak Example</div>
      ${L.compare.map(c => `
        <div class="compare-grid" style="margin-bottom:.75rem">
          <div class="compare-box" style="background:rgba(91,191,106,.1);border:1px solid rgba(91,191,106,.25)">
            <div class="compare-label" style="color:#b2f0bb">✅ Strong</div>
            ${c.good}
          </div>
          <div class="compare-box" style="background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.25)">
            <div class="compare-label" style="color:#ffaab3">❌ Weak</div>
            ${c.bad}
          </div>
        </div>`).join('')}
    </div>` : '';

  const workedHTML = (L.worked && L.worked.length) ? `
    <div class="section" style="animation-delay:.2s">
      <div class="section-title">✏️ Worked Example${L.worked.length>1?'s':''}</div>
      ${L.worked.map(w => `
        <div class="worked-q" style="background:${pal.bg};color:${pal.light};border-color:${pal.color}">${w.q}</div>
        <table class="worked-table">
          ${w.lines.map(line => `
            <tr class="${line.answer?'answer-row':''}">
              <td>${line.step}</td>
              <td>${line.expr}</td>
              <td>${line.why||''}</td>
            </tr>`).join('')}
        </table>`).join('<br>')}
    </div>` : '';

  const tipsHTML = (L.tips && L.tips.length) ? `
    <div class="section" style="animation-delay:.25s">
      <div class="section-title">⭐ Tips & Reminders</div>
      <div class="tip-list">
        ${L.tips.map(t => `
          <div class="tip-row">
            <span class="tip-icon">${t.icon}</span>
            <span>${t.text}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  const mistakesHTML = (L.mistakes && L.mistakes.length) ? `
    <div class="section" style="animation-delay:.28s">
      <div class="section-title">⚠️ Common Mistakes</div>
      <div class="mistake-list">
        ${L.mistakes.map(m => `<div class="mistake-row">${m.text}</div>`).join('')}
      </div>
    </div>` : '';

  // Practice questions
  const practiceHTML = (L.practice && L.practice.length) ? (() => {
    const items = [...L.practice].sort(() => Math.random()-.5);
    return `
      <div class="section" style="animation-delay:.32s">
        <div class="section-title">🎯 Practice Questions</div>
        <div class="practice-intro">Choose the correct answer. Feedback shown after each attempt.</div>
        ${items.map((p, i) => {
          const shuffled = p.opts.map((o,oi)=>({o,orig:oi})).sort(()=>Math.random()-.5);
          const correctShuffled = shuffled.findIndex(x=>x.orig===p.ans);
          const poemBlock = p.poem ? `<div class="poem-block" style="background:${pal.bg};border-color:${pal.color}">${p.poem}</div>` : '';
          return `
            <div class="pq" id="pq${i}">
              ${poemBlock}
              <div class="pq-q">${p.q}</div>
              <div class="pq-opts">
                ${shuffled.map((x,si)=>`
                  <button class="pq-opt" onclick="checkAns(${i},${si},${correctShuffled},'pq${i}','exp${i}')">${x.o}</button>
                `).join('')}
              </div>
              <div class="pq-exp" id="exp${i}">${p.exp}</div>
            </div>`;
        }).join('')}
      </div>`;
  })() : '';

  // Prev/Next nav
  const topicKey = L.topicKey || L.topic;
  // Map topicKey to subject id
  const subjectId = Object.keys(SUBJECTS).find(id => Object.keys(SUBJECTS[id].topicMeta || {}).includes(topicKey)) || sid;

  const prevBtn = L.prevLesson
    ? `<a class="nav-btn prev" href="lesson.html?lesson=${L.prevLesson.key}">
        <div class="nav-label">← Previous</div>
        ${L.prevLesson.label}
      </a>`
    : `<a class="nav-btn prev" href="mindmap.html?subject=${subjectId}" style="opacity:.5">
        <div class="nav-label">← Back to</div>
        Mind Map
      </a>`;

  const nextBtn = L.nextLesson
    ? `<a class="nav-btn next" href="lesson.html?lesson=${L.nextLesson.key}">
        <div class="nav-label">Next →</div>
        ${L.nextLesson.label}
      </a>`
    : `<a class="nav-btn next" href="quiz.html?subject=${subjectId}&topic=${encodeURIComponent(topicKey)}">
        <div class="nav-label">Finished! →</div>
        Quiz this topic
      </a>`;

  const quizCTA = `
    <a class="quiz-cta" href="quiz.html?subject=${subjectId}&topic=${encodeURIComponent(topicKey)}"
       style="background:${pal.bg};border:1px solid ${pal.color};color:${pal.light}">
      ✏️ Quiz me on ${topicKey}
    </a>`;

  wrap.innerHTML = heroHTML + keyIdeaHTML + formulaeHTML + stepsHTML + compareHTML + workedHTML + tipsHTML + mistakesHTML + practiceHTML + quizCTA + `<div class="lesson-nav">${prevBtn}${nextBtn}</div>`;
}

function checkAns(qi, chosen, correct, cardId, expId) {
  const card = document.getElementById(cardId);
  const exp = document.getElementById(expId);
  const btns = card.querySelectorAll('.pq-opt');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  exp.classList.add('show');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--border:rgba(255,255,255,.08);--text:#f0eeff;--muted:rgba(240,238,255,.55);--dim:rgba(240,238,255,.3);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 8% 12%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(2px 2px at 62% 20%,rgba(255,255,255,.3) 0%,transparent 100%),radial-gradient(1px 1px at 85% 55%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 90%,rgba(255,255,255,.25) 0%,transparent 100%);pointer-events:none;z-index:0;}
  nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);}
  nav a{color:var(--muted);text-decoration:none;font-weight:600;}nav a:hover{color:var(--text);}
  nav span{opacity:.45;}
  .wrap{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 5rem;position:relative;z-index:1;}

  /* HERO */
  .lesson-hero{margin-bottom:2rem;}
  .topic-tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:.75rem;}
  .lesson-hero h1{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;line-height:1.1;margin-bottom:.4rem;}
  .lesson-hero p{color:var(--muted);font-size:15px;line-height:1.6;}

  /* SECTIONS */
  .section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1rem;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .section-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:.9rem;display:flex;align-items:center;gap:7px;}

  /* KEY IDEA */
  .key-idea-rule{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;margin-bottom:.5rem;line-height:1.3;}
  .key-idea-detail{font-size:14px;color:var(--muted);line-height:1.6;}

  /* FORMULAE */
  .formula-list{display:flex;flex-direction:column;gap:.6rem;}
  .formula-row{display:flex;align-items:center;gap:12px;padding:.7rem 1rem;border-radius:10px;}
  .formula-main{font-family:monospace;font-size:16px;font-weight:700;flex:1;}
  .formula-note{font-size:12px;color:var(--muted);text-align:right;}

  /* STEPS */
  .steps-list{counter-reset:step;}
  .step-item{display:grid;grid-template-columns:32px 1fr;gap:10px;padding:.6rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
  .step-item:last-child{border-bottom:none;}
  .step-num{counter-increment:step;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .step-title{font-weight:700;font-size:14px;margin-bottom:2px;}
  .step-detail{font-size:13px;color:var(--muted);line-height:1.5;}
  .step-formula{font-family:monospace;font-size:13px;margin-top:4px;padding:3px 8px;border-radius:6px;display:inline-block;}

  /* COMPARE (good/bad examples) */
  .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:540px){.compare-grid{grid-template-columns:1fr;}}
  .compare-box{padding:.9rem 1rem;border-radius:10px;font-size:13px;line-height:1.6;}
  .compare-label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:5px;}

  /* WORKED EXAMPLES */
  .worked-q{font-size:14px;font-weight:700;margin-bottom:.75rem;padding:.6rem .9rem;border-radius:9px;border-left:3px solid;}
  .worked-table{width:100%;border-collapse:collapse;font-size:13px;}
  .worked-table tr{border-bottom:1px solid rgba(255,255,255,.05);}
  .worked-table tr:last-child{border-bottom:none;}
  .worked-table td{padding:.45rem .5rem;vertical-align:top;}
  .worked-table td:first-child{color:var(--dim);width:85px;font-size:12px;}
  .worked-table td:nth-child(2){font-family:monospace;font-weight:700;font-size:14px;padding-right:10px;}
  .worked-table td:last-child{color:var(--muted);font-style:italic;font-size:12px;}
  .answer-row td{padding-top:.6rem!important;}

  /* TIPS & MISTAKES */
  .tip-list{display:flex;flex-direction:column;gap:.6rem;}
  .tip-row{display:flex;gap:10px;font-size:13.5px;line-height:1.6;}
  .tip-icon{font-size:16px;flex-shrink:0;margin-top:2px;}
  .mistake-list{display:flex;flex-direction:column;gap:.5rem;}
  .mistake-row{font-size:13.5px;line-height:1.6;padding:.6rem .9rem;border-radius:9px;background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.2);}

  /* PRACTICE */
  .practice-intro{font-size:13px;color:var(--muted);margin-bottom:.9rem;}
  .pq{margin-bottom:.9rem;padding:.9rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  .pq-q{font-size:14px;font-weight:700;margin-bottom:.6rem;line-height:1.4;}
  .pq-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  @media(max-width:480px){.pq-opts{grid-template-columns:1fr;}}
  .pq-opt{padding:.45rem .75rem;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);text-align:left;font-family:'Nunito Sans',sans-serif;transition:background .12s,border-color .12s;}
  .pq-opt:hover:not(:disabled){background:rgba(255,255,255,.09);}
  .pq-opt.correct{background:rgba(91,191,106,.2);border-color:rgba(91,191,106,.5);color:#b2f0bb;}
  .pq-opt.wrong{background:rgba(224,92,106,.15);border-color:rgba(224,92,106,.4);color:#ffaab3;}
  .pq-opt:disabled{cursor:default;}
  .pq-exp{margin-top:.6rem;font-size:12.5px;line-height:1.5;padding:.5rem .75rem;border-radius:7px;background:rgba(255,255,255,.05);display:none;}
  .pq-exp.show{display:block;}

  /* POEM BLOCK */
  .poem-block{font-style:italic;padding:.75rem 1rem;border-radius:10px;font-size:14px;line-height:1.9;margin-bottom:.9rem;border-left:3px solid;}

  /* PREV/NEXT NAV */
  .lesson-nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:2rem;}
  .nav-btn{padding:.9rem 1.1rem;border-radius:13px;border:1px solid var(--border);background:var(--surface);text-decoration:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:background .15s,transform .1s;display:block;}
  .nav-btn:hover{background:rgba(255,255,255,.07);transform:translateY(-1px);}
  .nav-btn.prev{text-align:left;}
  .nav-btn.next{text-align:right;}
  .nav-btn .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:2px;}
  .quiz-cta{display:block;text-align:center;margin-top:1rem;padding:1rem;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;text-decoration:none;transition:opacity .15s,transform .1s;}
  .quiz-cta:hover{opacity:.88;transform:translateY(-2px);}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════
   FIREBASE CONFIG — paste your config values here
   Get these from: Firebase Console → Project Settings → Your Apps
   ═══════════════════════════════════════════════════════════ */

var FIREBASE_CFG = {
  apiKey:            "PASTE_YOUR_API_KEY_HERE",
  authDomain:        "PASTE_YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL:       "https://PASTE_YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId:         "PASTE_YOUR_PROJECT_ID",
  storageBucket:     "PASTE_YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "PASTE_YOUR_SENDER_ID",
  appId:             "PASTE_YOUR_APP_ID"
};

// Initialise Firebase if config has been filled in
if (FIREBASE_CFG.apiKey !== "PASTE_YOUR_API_KEY_HERE") {
  var firebaseScript = document.createElement('script');
  firebaseScript.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  firebaseScript.onload = function() {
    var dbScript = document.createElement('script');
    dbScript.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    dbScript.onload = function() {
      firebase.initializeApp(FIREBASE_CFG);
      console.log('Firebase connected ✓');
    };
    document.head.appendChild(dbScript);
  };
  document.head.appendChild(firebaseScript);
} else {
  console.log('Firebase not configured — using localStorage only');
}

</script>
<script>
/* ═══════════════════════════════════════════════════════════════
   EMILY'S HUB — GAMIFICATION + TRACKING ENGINE
   Works with localStorage immediately.
   Drop in Firebase config to sync across devices.
   ═══════════════════════════════════════════════════════════════ */

var HUB_STORE    = 'emilys_hub_v1';
var STREAK_STORE = 'emilys_streak_v1';
var FIREBASE_CFG = null; // set by firebase-config.js when available

/* ── XP VALUES ─────────────────────────────────────────── */
var XP = {
  QUIZ_COMPLETE:      10,
  QUIZ_PERFECT:       20,   // bonus on top of QUIZ_COMPLETE for 10/10
  QUIZ_90:            15,   // bonus for 90%+
  LESSON_READ:         5,
  MINDMAP_VISIT:       2,
  FIRST_QUIZ_TODAY:    5,
  STREAK_7:           50,
  STREAK_30:         150,
  WEAK_TOPIC_FIXED:   25,   // topic goes from <60% to >=70%
  IMPROVE_3_ROW:      20,   // same subject improves 3 sessions running
};

/* ── LEVELS ────────────────────────────────────────────── */
var LEVELS = [
  { level:1, title:'Starter',   xp:0,    emoji:'🌱' },
  { level:2, title:'Learner',   xp:100,  emoji:'📖' },
  { level:3, title:'Scholar',   xp:300,  emoji:'🎓' },
  { level:4, title:'Expert',    xp:600,  emoji:'🔬' },
  { level:5, title:'Champion',  xp:1000, emoji:'🏆' },
  { level:6, title:'Legend',    xp:1500, emoji:'⭐' },
];

/* ── BADGES ────────────────────────────────────────────── */
var BADGE_DEFS = [
  { id:'first_quiz',    emoji:'🎉', title:'First Steps',      desc:'Complete your first quiz' },
  { id:'perfect_ten',  emoji:'💯', title:'Perfect Ten',       desc:'Score 10/10 on any quiz' },
  { id:'streak_3',     emoji:'🔥', title:'On Fire',           desc:'3-day streak' },
  { id:'streak_7',     emoji:'🌟', title:'Week Warrior',      desc:'7-day streak' },
  { id:'streak_30',    emoji:'🚀', title:'Unstoppable',       desc:'30-day streak' },
  { id:'bookworm',     emoji:'📚', title:'Bookworm',          desc:'Read 20 lessons' },
  { id:'explorer',     emoji:'🌍', title:'Explorer',          desc:'Quiz in every subject' },
  { id:'sharp',        emoji:'🎯', title:'Sharp Shooter',     desc:'Answer 100 questions correctly' },
  { id:'comeback',     emoji:'💪', title:'Comeback Kid',      desc:'Improve a topic from below 60% to above 70%' },
  { id:'star_pupil',   emoji:'⭐', title:'Star Pupil',        desc:'Score 90%+ five times' },
  { id:'trending',     emoji:'📈', title:'Trending Up',       desc:'Improve score in the same subject 3 sessions in a row' },
  { id:'all_rounder',  emoji:'🎪', title:'All-Rounder',       desc:'Score 70%+ in every subject at least once' },
  { id:'century',      emoji:'💫', title:'Century',           desc:'Complete 100 quizzes' },
  { id:'night_owl',    emoji:'🦉', title:'Night Owl',         desc:'Complete a quiz after 9pm' },
  { id:'early_bird',   emoji:'🐦', title:'Early Bird',        desc:'Complete a quiz before 8am' },
  { id:'lesson_20',    emoji:'🧠', title:'Deep Diver',        desc:'Read 20 different lessons' },
];

/* ── LOCAL STORE HELPERS ───────────────────────────────── */
function _load() {
  try { return JSON.parse(localStorage.getItem(HUB_STORE)) || _blank(); }
  catch(e) { return _blank(); }
}
function _save(d) {
  try { localStorage.setItem(HUB_STORE, JSON.stringify(d)); } catch(e) {}
}
function _blank() {
  return {
    xp: 0,
    badges: [],
    lessonsRead: [],
    mindmapVisits: {},
    quizSessions: [],    // { sid, date, ts, score, total, pct, topicScores }
    topicHistory: {},    // sid -> topic -> [pct, pct, ...]
    subjectSessions: {}, // sid -> [pct, pct, ...]  for trend detection
    activity: {},        // date -> minutes (approx)
    newBadges: [],       // badges earned this session, shown as toast
    newXP: 0,            // XP earned this session, for animation
  };
}

/* ── STREAK ─────────────────────────────────────────────── */
function _loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_STORE)) || {count:0,lastDate:''}; }
  catch(e) { return {count:0,lastDate:''}; }
}
function _saveStreak(s) {
  try { localStorage.setItem(STREAK_STORE, JSON.stringify(s)); } catch(e) {}
}
function _touchStreak() {
  var today = _today();
  var s = _loadStreak();
  if (s.lastDate === today) return s.count;
  var yest = _yesterday();
  s.count = (s.lastDate === yest) ? s.count + 1 : 1;
  s.lastDate = today;
  _saveStreak(s);
  return s.count;
}
function _today() { return new Date().toISOString().slice(0,10); }
function _yesterday() { return new Date(Date.now()-86400000).toISOString().slice(0,10); }
function getStreak() {
  var s = _loadStreak();
  var today = _today(), yest = _yesterday();
  if (s.lastDate !== today && s.lastDate !== yest) return 0;
  return s.count;
}

/* ── XP / LEVEL HELPERS ─────────────────────────────────── */
function getLevel(xp) {
  var lv = LEVELS[0];
  for (var i = 0; i < LEVELS.length; i++) {
    if (xp >= LEVELS[i].xp) lv = LEVELS[i]; else break;
  }
  return lv;
}
function getNextLevel(xp) {
  for (var i = 0; i < LEVELS.length; i++) {
    if (LEVELS[i].xp > xp) return LEVELS[i];
  }
  return null;
}
function getLevelProgress(xp) {
  var cur = getLevel(xp), next = getNextLevel(xp);
  if (!next) return 100;
  return Math.round(((xp - cur.xp) / (next.xp - cur.xp)) * 100);
}

/* ── BADGE AWARDING ─────────────────────────────────────── */
function _awardBadge(d, id) {
  if (d.badges.indexOf(id) === -1) {
    d.badges.push(id);
    d.newBadges.push(id);
    var def = BADGE_DEFS.find(function(b){ return b.id === id; });
    if (def) console.log('🏅 Badge unlocked: ' + def.title);
  }
}

function _checkBadges(d, context) {
  var ctx = context || {};

  // First quiz
  if (d.quizSessions.length >= 1) _awardBadge(d, 'first_quiz');

  // Perfect ten
  if (ctx.score === 10 && ctx.total === 10) _awardBadge(d, 'perfect_ten');

  // Streaks
  var streak = getStreak();
  if (streak >= 3)  _awardBadge(d, 'streak_3');
  if (streak >= 7)  _awardBadge(d, 'streak_7');
  if (streak >= 30) _awardBadge(d, 'streak_30');

  // Lessons read
  if (d.lessonsRead.length >= 20) { _awardBadge(d, 'bookworm'); _awardBadge(d, 'lesson_20'); }

  // Explorer — quiz in every subject
  var subjectsQuizzed = Object.keys(d.subjectSessions || {});
  var allSubjects = Object.keys(SUBJECTS);
  if (allSubjects.every(function(s){ return subjectsQuizzed.indexOf(s) > -1; }))
    _awardBadge(d, 'explorer');

  // Sharp shooter — 100 correct answers total
  var totalCorrect = d.quizSessions.reduce(function(a,s){ return a + s.score; }, 0);
  if (totalCorrect >= 100) _awardBadge(d, 'sharp');

  // Star pupil — 90%+ five times
  var high = d.quizSessions.filter(function(s){ return s.pct >= 90; }).length;
  if (high >= 5) _awardBadge(d, 'star_pupil');

  // 100 quizzes
  if (d.quizSessions.length >= 100) _awardBadge(d, 'century');

  // Night owl / early bird
  var hour = new Date().getHours();
  if (hour >= 21) _awardBadge(d, 'night_owl');
  if (hour < 8)   _awardBadge(d, 'early_bird');

  // Comeback — topic fixed
  if (ctx.topicFixed) _awardBadge(d, 'comeback');

  // Trending up — same subject improved 3 in a row
  if (ctx.improved3) _awardBadge(d, 'trending');

  // All-rounder — 70%+ in every subject
  var allGood = allSubjects.every(function(sid) {
    var sessions = d.subjectSessions[sid] || [];
    return sessions.some(function(p){ return p >= 70; });
  });
  if (allGood) _awardBadge(d, 'all_rounder');
}

/* ── MAIN TRACKING FUNCTIONS ────────────────────────────── */

// Call when quiz finishes
function trackQuizComplete(sid, topicScores, score, total) {
  var d = _load();
  var pct = Math.round((score / total) * 100);
  var today = _today();
  d.newBadges = [];
  d.newXP = 0;

  // XP
  var earned = XP.QUIZ_COMPLETE;
  if (score === total) earned += XP.QUIZ_PERFECT;
  else if (pct >= 90)  earned += XP.QUIZ_90;

  // First quiz today bonus
  var todaySessions = d.quizSessions.filter(function(s){ return s.date === today; });
  if (todaySessions.length === 0) earned += XP.FIRST_QUIZ_TODAY;

  d.xp += earned;
  d.newXP = earned;

  // Record session
  d.quizSessions.push({ sid:sid, date:today, ts:Date.now(), score:score, total:total, pct:pct });
  if (d.quizSessions.length > 200) d.quizSessions = d.quizSessions.slice(-200);

  // Subject trend
  if (!d.subjectSessions) d.subjectSessions = {};
  if (!d.subjectSessions[sid]) d.subjectSessions[sid] = [];
  d.subjectSessions[sid].push(pct);

  // Check improved 3 in a row
  var subjHistory = d.subjectSessions[sid];
  var improved3 = subjHistory.length >= 3 &&
    subjHistory[subjHistory.length-1] > subjHistory[subjHistory.length-2] &&
    subjHistory[subjHistory.length-2] > subjHistory[subjHistory.length-3];
  if (improved3) { d.xp += XP.IMPROVE_3_ROW; d.newXP += XP.IMPROVE_3_ROW; }

  // Topic history + weak topic check
  if (!d.topicHistory) d.topicHistory = {};
  if (!d.topicHistory[sid]) d.topicHistory[sid] = {};
  var topicFixed = false;
  Object.entries(topicScores).forEach(function(entry) {
    var t = entry[0], v = entry[1];
    var tpct = Math.round((v.c / v.t) * 100);
    if (!d.topicHistory[sid][t]) d.topicHistory[sid][t] = { correct:0, attempted:0, sessions:[] };
    var th = d.topicHistory[sid][t];
    var prevPct = th.attempted > 0 ? Math.round((th.correct/th.attempted)*100) : null;
    th.correct   += v.c;
    th.attempted += v.t;
    th.sessions.push(tpct);
    if (prevPct !== null && prevPct < 60 && tpct >= 70) {
      topicFixed = true;
      d.xp += XP.WEAK_TOPIC_FIXED;
      d.newXP += XP.WEAK_TOPIC_FIXED;
    }
  });

  // Streak
  var streak = _touchStreak();
  if (streak === 7)  { d.xp += XP.STREAK_7;  d.newXP += XP.STREAK_7; }
  if (streak === 30) { d.xp += XP.STREAK_30; d.newXP += XP.STREAK_30; }

  // Activity time (rough — add 5 min per quiz)
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 5;

  _checkBadges(d, { score:score, total:total, topicFixed:topicFixed, improved3:improved3 });
  _save(d);
  _firebaseSync(d, sid, topicScores, score, total, pct);
  return { xp: earned, badges: d.newBadges, totalXP: d.xp };
}

// Call when lesson is opened
function trackLessonRead(sid, lessonKey) {
  var d = _load();
  var key = sid + '/' + lessonKey;
  if (d.lessonsRead.indexOf(key) === -1) {
    d.lessonsRead.push(key);
    d.xp += XP.LESSON_READ;
    d.newXP = XP.LESSON_READ;
    d.newBadges = [];
    _checkBadges(d, {});
    _save(d);
    if (d.newBadges.length > 0) showXPToast(XP.LESSON_READ, d.newBadges);
  }
  var today = _today();
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 2;
  _save(d);
}

// Call when mindmap is visited
function trackMindmapVisit(sid) {
  var d = _load();
  var today = _today();
  var key = sid + '_' + today;
  if (!d.mindmapVisits) d.mindmapVisits = {};
  if (!d.mindmapVisits[key]) {
    d.mindmapVisits[key] = true;
    d.xp += XP.MINDMAP_VISIT;
    _save(d);
  }
  if (!d.activity) d.activity = {};
  d.activity[today] = (d.activity[today] || 0) + 1;
  _save(d);
}

/* ── FIREBASE SYNC ──────────────────────────────────────── */
function _firebaseSync(d, sid, topicScores, score, total, pct) {
  if (!window.firebase || !window.firebase.apps || !firebase.apps.length) return;
  try {
    var db = firebase.database();
    var ref = db.ref('emily');
    // Push quiz session
    ref.child('sessions').push({
      sid:sid, date:_today(), ts:Date.now(),
      score:score, total:total, pct:pct,
      topicScores: Object.fromEntries
        ? Object.fromEntries(Object.entries(topicScores).map(function(e){ return [e[0],{c:e[1].c,t:e[1].t}]; }))
        : topicScores
    });
    // Update summary
    ref.child('summary').set({
      xp: d.xp,
      badges: d.badges,
      streak: getStreak(),
      lastActive: _today(),
      totalQuizzes: d.quizSessions.length,
      lastUpdated: Date.now()
    });
    // Activity heatmap
    ref.child('activity').child(_today()).transaction(function(cur){ return (cur||0) + 5; });
  } catch(e) { console.warn('Firebase sync failed:', e); }
}

/* ── XP TOAST (shown in quiz/lesson pages) ─────────────── */
function showXPToast(xp, newBadges) {
  var existing = document.getElementById('xp-toast');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.id = 'xp-toast';
  toast.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;'
    + 'background:#1a1825;border:1px solid rgba(255,215,0,.4);border-radius:14px;'
    + 'padding:.75rem 1.1rem;font-family:Nunito,sans-serif;font-size:14px;font-weight:800;'
    + 'color:#ffd580;box-shadow:0 8px 32px rgba(0,0,0,.5);'
    + 'animation:toastIn .4s ease both;max-width:280px;';

  var content = '✨ +' + xp + ' XP';
  if (newBadges && newBadges.length > 0) {
    newBadges.forEach(function(id) {
      var def = BADGE_DEFS.find(function(b){ return b.id === id; });
      if (def) content += '<br><span style="font-size:12px;color:#c4bbff">' + def.emoji + ' Badge unlocked: ' + def.title + '</span>';
    });
  }
  toast.innerHTML = content;

  if (!document.getElementById('toast-style')) {
    var s = document.createElement('style');
    s.id = 'toast-style';
    s.textContent = '@keyframes toastIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(toast);
  setTimeout(function(){ toast.style.opacity='0'; toast.style.transition='opacity .4s'; }, 3500);
  setTimeout(function(){ toast.remove(); }, 4000);
}

/* ── XP BAR (persistent, shown on all pages) ───────────── */
function renderXPBar() {
  var d = _load();
  var streak = getStreak();
  var lv = getLevel(d.xp);
  var next = getNextLevel(d.xp);
  var prog = getLevelProgress(d.xp);

  var bar = document.getElementById('xp-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'xp-bar';
    bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:200;'
      + 'background:rgba(15,14,23,.92);backdrop-filter:blur(12px);'
      + 'border-top:1px solid rgba(255,255,255,.08);'
      + 'padding:.5rem 1.25rem;display:flex;align-items:center;gap:12px;';
    document.body.appendChild(bar);
  }

  var streakHtml = streak > 0
    ? '<span style="font-size:13px;font-weight:700;color:#ffd580;white-space:nowrap">🔥 ' + streak + '</span>'
    : '';

  bar.innerHTML = '<a href="results.html" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;min-width:0">'
    + '<span style="font-size:18px;flex-shrink:0">' + lv.emoji + '</span>'
    + '<div style="flex:1;min-width:0">'
    +   '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
    +     '<span style="font-family:Nunito,sans-serif;font-size:12px;font-weight:800;color:#c4bbff;white-space:nowrap">'
    +       lv.title + ' · ' + d.xp + ' XP'
    +     '</span>'
    +     (next ? '<span style="font-size:11px;color:rgba(240,238,255,.35)">' + next.title + ' in ' + (next.xp - d.xp) + ' XP</span>' : '<span style="font-size:11px;color:#ffd580">MAX LEVEL</span>')
    +   '</div>'
    +   '<div style="height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden">'
    +     '<div style="height:100%;width:' + prog + '%;background:linear-gradient(90deg,#9b59b6,#3498db);border-radius:3px;transition:width .6s ease"></div>'
    +   '</div>'
    + '</div></a>'
    + streakHtml
    + '<a href="results.html" style="font-size:11px;font-weight:700;color:rgba(240,238,255,.4);text-decoration:none;white-space:nowrap;flex-shrink:0">My Stats ›</a>';
}

</script>

<script>
const params = new URLSearchParams(location.search);
const key = params.get('lesson');
const L = key ? LESSONS[key] : null;

const wrap = document.getElementById('lesson-wrap');

if (!L) {
  wrap.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--muted)">
    <div style="font-size:48px;margin-bottom:1rem">🔍</div>
    <h2 style="font-family:Nunito;font-weight:900;margin-bottom:.5rem">Lesson not found</h2>
    <p>Check the URL or <a href="index.html" style="color:#c4bbff">go home</a>.</p>
  </div>`;
} else {
  // Find which subject this belongs to
  const sid = Object.keys(SUBJECTS).find(id => {
    const meta = SUBJECTS[id].topicMeta || {};
    return Object.keys(meta).includes(L.topic);
  }) || 'maths';
  const S = SUBJECTS[sid];
  const pal = PALETTE[L.theme] || PALETTE.purple;

  // Update nav
  document.getElementById('nav-subject').textContent = S.name;
  document.getElementById('nav-subject').href = `mindmap.html?subject=${sid}`;
  document.getElementById('nav-topic').textContent = L.title;
  document.title = L.title;

  // ── Build sections ──

  const heroHTML = `
    <div class="lesson-hero">
      <div class="topic-tag" style="background:${pal.bg};color:${pal.light}">${L.icon} ${L.topic}</div>
      <h1 style="background:linear-gradient(135deg,${pal.light},${pal.color});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${L.title}</h1>
      <p>${L.subtitle}</p>
    </div>`;

  const keyIdeaHTML = `
    <div class="section" style="animation-delay:.05s;border-color:${pal.bg}">
      <div class="section-title">💡 Key Idea</div>
      <div class="key-idea-rule" style="color:${pal.light}">${L.keyIdea.rule}</div>
      ${L.keyIdea.detail ? `<div class="key-idea-detail">${L.keyIdea.detail}</div>` : ''}
    </div>`;

  const formulaeHTML = (L.formulae && L.formulae.length) ? `
    <div class="section" style="animation-delay:.1s">
      <div class="section-title">📐 Formulae</div>
      <div class="formula-list">
        ${L.formulae.map(f => `
          <div class="formula-row" style="background:${pal.bg}">
            <div class="formula-main" style="color:${pal.light}">${f.main}</div>
            ${f.note ? `<div class="formula-note">${f.note}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>` : '';

  const stepsHTML = (L.steps && L.steps.length) ? `
    <div class="section" style="animation-delay:.15s">
      <div class="section-title">📋 Method</div>
      <div class="steps-list">
        ${L.steps.map(s => `
          <div class="step-item">
            <div class="step-num" style="background:${pal.bg};color:${pal.light}">•</div>
            <div>
              <div class="step-title">${s.title}</div>
              ${s.detail ? `<div class="step-detail">${s.detail}</div>` : ''}
              ${s.formula ? `<div class="step-formula" style="background:${pal.bg};color:${pal.light}">${s.formula}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const compareHTML = (L.compare && L.compare.length) ? `
    <div class="section" style="animation-delay:.17s">
      <div class="section-title">⚖️ Good vs. Weak Example</div>
      ${L.compare.map(c => `
        <div class="compare-grid" style="margin-bottom:.75rem">
          <div class="compare-box" style="background:rgba(91,191,106,.1);border:1px solid rgba(91,191,106,.25)">
            <div class="compare-label" style="color:#b2f0bb">✅ Strong</div>
            ${c.good}
          </div>
          <div class="compare-box" style="background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.25)">
            <div class="compare-label" style="color:#ffaab3">❌ Weak</div>
            ${c.bad}
          </div>
        </div>`).join('')}
    </div>` : '';

  const workedHTML = (L.worked && L.worked.length) ? `
    <div class="section" style="animation-delay:.2s">
      <div class="section-title">✏️ Worked Example${L.worked.length>1?'s':''}</div>
      ${L.worked.map(w => `
        <div class="worked-q" style="background:${pal.bg};color:${pal.light};border-color:${pal.color}">${w.q}</div>
        <table class="worked-table">
          ${w.lines.map(line => `
            <tr class="${line.answer?'answer-row':''}">
              <td>${line.step}</td>
              <td>${line.expr}</td>
              <td>${line.why||''}</td>
            </tr>`).join('')}
        </table>`).join('<br>')}
    </div>` : '';

  const tipsHTML = (L.tips && L.tips.length) ? `
    <div class="section" style="animation-delay:.25s">
      <div class="section-title">⭐ Tips & Reminders</div>
      <div class="tip-list">
        ${L.tips.map(t => `
          <div class="tip-row">
            <span class="tip-icon">${t.icon}</span>
            <span>${t.text}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  const mistakesHTML = (L.mistakes && L.mistakes.length) ? `
    <div class="section" style="animation-delay:.28s">
      <div class="section-title">⚠️ Common Mistakes</div>
      <div class="mistake-list">
        ${L.mistakes.map(m => `<div class="mistake-row">${m.text}</div>`).join('')}
      </div>
    </div>` : '';

  // Practice questions
  const practiceHTML = (L.practice && L.practice.length) ? (() => {
    const items = [...L.practice].sort(() => Math.random()-.5);
    return `
      <div class="section" style="animation-delay:.32s">
        <div class="section-title">🎯 Practice Questions</div>
        <div class="practice-intro">Choose the correct answer. Feedback shown after each attempt.</div>
        ${items.map((p, i) => {
          const shuffled = p.opts.map((o,oi)=>({o,orig:oi})).sort(()=>Math.random()-.5);
          const correctShuffled = shuffled.findIndex(x=>x.orig===p.ans);
          const poemBlock = p.poem ? `<div class="poem-block" style="background:${pal.bg};border-color:${pal.color}">${p.poem}</div>` : '';
          return `
            <div class="pq" id="pq${i}">
              ${poemBlock}
              <div class="pq-q">${p.q}</div>
              <div class="pq-opts">
                ${shuffled.map((x,si)=>`
                  <button class="pq-opt" onclick="checkAns(${i},${si},${correctShuffled},'pq${i}','exp${i}')">${x.o}</button>
                `).join('')}
              </div>
              <div class="pq-exp" id="exp${i}">${p.exp}</div>
            </div>`;
        }).join('')}
      </div>`;
  })() : '';

  // Prev/Next nav
  const topicKey = L.topicKey || L.topic;
  // Map topicKey to subject id
  const subjectId = Object.keys(SUBJECTS).find(id => Object.keys(SUBJECTS[id].topicMeta || {}).includes(topicKey)) || sid;

  const prevBtn = L.prevLesson
    ? `<a class="nav-btn prev" href="lesson.html?lesson=${L.prevLesson.key}">
        <div class="nav-label">← Previous</div>
        ${L.prevLesson.label}
      </a>`
    : `<a class="nav-btn prev" href="mindmap.html?subject=${subjectId}" style="opacity:.5">
        <div class="nav-label">← Back to</div>
        Mind Map
      </a>`;

  const nextBtn = L.nextLesson
    ? `<a class="nav-btn next" href="lesson.html?lesson=${L.nextLesson.key}">
        <div class="nav-label">Next →</div>
        ${L.nextLesson.label}
      </a>`
    : `<a class="nav-btn next" href="quiz.html?subject=${subjectId}&topic=${encodeURIComponent(topicKey)}">
        <div class="nav-label">Finished! →</div>
        Quiz this topic
      </a>`;

  const quizCTA = `
    <a class="quiz-cta" href="quiz.html?subject=${subjectId}&topic=${encodeURIComponent(topicKey)}"
       style="background:${pal.bg};border:1px solid ${pal.color};color:${pal.light}">
      ✏️ Quiz me on ${topicKey}
    </a>`;

  wrap.innerHTML = heroHTML + keyIdeaHTML + formulaeHTML + stepsHTML + compareHTML + workedHTML + tipsHTML + mistakesHTML + practiceHTML + quizCTA + `<div class="lesson-nav">${prevBtn}${nextBtn}</div>`;
}

function checkAns(qi, chosen, correct, cardId, expId) {
  const card = document.getElementById(cardId);
  const exp = document.getElementById(expId);
  const btns = card.querySelectorAll('.pq-opt');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  exp.classList.add('show');
}

/* ── TIME TRACKING ─────────────────────────────────────── */
var _pageStart = Date.now();
var _pageType = (function() {
  var p = location.pathname.split('/').pop() || 'index.html';
  if (p.includes('quiz'))    return 'quiz';
  if (p.includes('lesson'))  return 'lesson';
  if (p.includes('mindmap')) return 'mindmap';
  if (p.includes('results')) return 'results';
  if (p.includes('index') || p === '' || p === '/') return 'home';
  return 'other';
})();

function _recordTime() {
  var secs = Math.round((Date.now() - _pageStart) / 1000);
  if (secs < 3 || secs > 7200) return; // ignore < 3s and > 2hr (tab left open)
  var today = new Date().toISOString().slice(0,10);

  // Save to localStorage
  try {
    var d = JSON.parse(localStorage.getItem('emilys_hub_v1')) || {};
    if (!d.timeLog) d.timeLog = {};
    if (!d.timeLog[today]) d.timeLog[today] = { total:0, quiz:0, lesson:0, mindmap:0, home:0, other:0 };
    d.timeLog[today].total = (d.timeLog[today].total||0) + secs;
    d.timeLog[today][_pageType] = (d.timeLog[today][_pageType]||0) + secs;
    // Keep last 90 days only
    var keys = Object.keys(d.timeLog).sort();
    if (keys.length > 90) { delete d.timeLog[keys[0]]; }
    // Update activity heatmap too (in minutes)
    if (!d.activity) d.activity = {};
    d.activity[today] = (d.activity[today]||0) + Math.round(secs/60);
    localStorage.setItem('emilys_hub_v1', JSON.stringify(d));
  } catch(e) {}

  // Sync to Firebase
  try {
    if (window.firebase && firebase.apps && firebase.apps.length) {
      var db = firebase.database();
      db.ref('emily/timeLog/' + today + '/total').transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/timeLog/' + today + '/' + _pageType).transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/activity/' + today).transaction(function(v){ return (v||0)+Math.round(secs/60); });
    }
  } catch(e) {}
}

// Record time when leaving the page
window.addEventListener('beforeunload', _recordTime);
window.addEventListener('pagehide', _recordTime);
// Also record periodically every 60s (in case tab is kept open)
setInterval(function() {
  _recordTime();
  _pageStart = Date.now(); // reset so we don't double-count
}, 60000);

</script>

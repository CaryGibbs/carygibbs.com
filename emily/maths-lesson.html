<style>
  :root{
    --bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--card2:#231f32;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
    --text:#f0eeff;--muted:rgba(240,238,255,0.55);--dim:rgba(240,238,255,0.3);
    --purple:#7c6fcd;--purple-light:#c4bbff;--purple-bg:rgba(124,111,205,0.18);
    --teal:#3ecfac;--teal-light:#9ef5e2;--teal-bg:rgba(62,207,172,0.15);
    --amber:#f5a623;--amber-light:#ffd580;--amber-bg:rgba(245,166,35,0.15);
    --red:#e05c6a;--red-light:#ffaab3;--red-bg:rgba(224,92,106,0.15);
    --coral:#f07050;--coral-light:#ffbfad;--coral-bg:rgba(240,112,80,0.15);
    --pink:#d066a8;--pink-light:#f5b8e4;--pink-bg:rgba(208,102,168,0.15);
    --blue:#4a90d9;--blue-light:#a8d0ff;--blue-bg:rgba(74,144,217,0.15);
    --green:#5bbf6a;--green-light:#b2f0bb;--green-bg:rgba(91,191,106,0.15);
    --tc-color:#7c6fcd;--tc-light:#c4bbff;--tc-bg:rgba(124,111,205,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,0.35) 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 62% 22%,rgba(255,255,255,0.28) 0%,transparent 100%),radial-gradient(1px 1px at 81% 70%,rgba(255,255,255,0.18) 0%,transparent 100%),radial-gradient(1px 1px at 93% 38%,rgba(255,255,255,0.22) 0%,transparent 100%);pointer-events:none;z-index:0;}

  /* ── NAV ── */
  nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,0.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0.6rem 1.25rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .nav-home{display:flex;align-items:center;gap:5px;text-decoration:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);padding:5px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);transition:all .15s;white-space:nowrap;}
  .nav-home:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
  .nav-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
  .nav-crumb{font-size:13px;color:var(--muted);white-space:nowrap;}
  .nav-crumb a{color:var(--muted);text-decoration:none;}
  .nav-crumb a:hover{color:var(--text);}
  .nav-crumb-sep{margin:0 5px;opacity:.4;}
  .nav-spacer{flex:1;}
  .nav-btn{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 14px;border-radius:10px;border:1px solid;transition:all .15s;white-space:nowrap;cursor:pointer;background:transparent;}
  .nav-btn:hover{opacity:.85;transform:translateY(-1px);}

  /* ── PAGE ── */
  .wrap{max-width:720px;margin:0 auto;padding:2rem 1.25rem 5rem;position:relative;z-index:1;}

  /* Hero */
  .lesson-hero{margin-bottom:2rem;}
  .breadcrumb-tag{display:inline-flex;align-items:center;gap:6px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 14px;border-radius:20px;border:1px solid;margin-bottom:.875rem;}
  .lesson-title{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;line-height:1.15;margin-bottom:.5rem;}
  .lesson-subtitle{font-size:15px;color:var(--muted);line-height:1.6;}

  /* Sections */
  .section{margin-bottom:2rem;}
  .section-label{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:1rem;display:inline-block;}

  /* Key idea box */
  .key-box{border-radius:16px;border:1px solid;padding:1.25rem 1.5rem;margin-bottom:1rem;}
  .key-box-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem;opacity:.8;}
  .key-rule{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;line-height:1.5;margin-bottom:.4rem;}
  .key-detail{font-size:14px;color:var(--muted);line-height:1.6;}

  /* Formula display */
  .formula-display{border-radius:14px;border:1px solid;padding:1rem 1.5rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
  .formula-main{font-family:'Courier New',monospace;font-size:20px;font-weight:700;letter-spacing:.04em;}
  .formula-note{font-size:13px;color:var(--muted);line-height:1.5;}

  /* Steps */
  .steps{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem;}
  .step{display:flex;gap:1rem;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;animation:fadeUp .4s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;flex-shrink:0;margin-top:1px;}
  .step-body{}
  .step-title{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;margin-bottom:3px;}
  .step-detail{font-size:14px;color:var(--muted);line-height:1.6;}
  .step-formula{display:inline-block;font-family:'Courier New',monospace;font-size:13px;font-weight:700;padding:3px 10px;border-radius:8px;margin-top:6px;}

  /* Worked example */
  .worked{background:var(--card);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem;}
  .worked-header{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.75rem;}
  .worked-icon{font-size:18px;}
  .worked-q{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;}
  .worked-body{padding:1.25rem;}
  .worked-line{display:flex;align-items:flex-start;gap:.875rem;margin-bottom:.875rem;}
  .worked-line:last-child{margin-bottom:0;}
  .worked-step{font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;letter-spacing:.04em;text-transform:uppercase;min-width:64px;padding-top:2px;opacity:.7;}
  .worked-expr{font-family:'Courier New',monospace;font-size:15px;font-weight:700;flex:1;line-height:1.5;}
  .worked-why{font-size:13px;color:var(--muted);flex:1;line-height:1.5;padding-top:2px;}
  .worked-answer{display:inline-block;font-family:'Courier New',monospace;font-size:15px;font-weight:700;padding:6px 16px;border-radius:10px;margin-top:.25rem;}

  /* Memory tip */
  .tip-box{border-radius:14px;padding:1rem 1.25rem;border:1px solid;display:flex;gap:.875rem;align-items:flex-start;margin-bottom:1rem;}
  .tip-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
  .tip-text{font-size:14px;line-height:1.6;}
  .tip-text strong{font-weight:700;}

  /* Common mistakes */
  .mistake{background:var(--red-bg);border:1px solid rgba(224,92,106,.3);border-radius:12px;padding:.875rem 1.1rem;margin-bottom:.625rem;display:flex;gap:.75rem;align-items:flex-start;}
  .mistake-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
  .mistake-text{font-size:14px;color:var(--red-light);line-height:1.5;}
  .mistake-text strong{font-weight:700;}

  /* Practice questions */
  .practice-q{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:.875rem;}
  .practice-q-text{font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;margin-bottom:1rem;}
  .practice-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .p-opt{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:.75rem 1rem;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:all .15s;font-family:'Nunito Sans',sans-serif;}
  .p-opt:hover:not(:disabled){background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.25);transform:translateY(-1px);}
  .p-opt.correct{background:rgba(91,191,106,.12);border-color:rgba(91,191,106,.5);color:#b2f0bb;}
  .p-opt.wrong{background:rgba(224,92,106,.12);border-color:rgba(224,92,106,.5);color:#ffaab3;}
  .p-opt.reveal{background:rgba(91,191,106,.12);border-color:rgba(91,191,106,.5);color:#b2f0bb;}
  .p-opt:disabled{cursor:default;}
  .p-feedback{margin-top:.875rem;padding:.75rem 1rem;border-radius:10px;font-size:14px;line-height:1.6;display:none;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .p-feedback.correct{background:rgba(91,191,106,.1);border:1px solid rgba(91,191,106,.4);color:#b2f0bb;display:block;}
  .p-feedback.wrong{background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.4);color:#ffaab3;display:block;}
  .p-score{text-align:center;font-family:'Nunito',sans-serif;font-size:14px;color:var(--muted);margin-top:.5rem;}

  /* CTA */
  .cta-box{border-radius:16px;border:1px solid;padding:1.5rem;text-align:center;margin-top:2.5rem;}
  .cta-emoji{font-size:36px;margin-bottom:.5rem;display:block;}
  .cta-title{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;margin-bottom:.4rem;}
  .cta-sub{font-size:14px;color:var(--muted);margin-bottom:1.25rem;}
  .cta-btn{display:inline-block;text-decoration:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;padding:.875rem 2rem;border-radius:12px;background:linear-gradient(135deg,var(--tc-color),#5b8de8);color:#fff;transition:opacity .15s,transform .15s;}
  .cta-btn:hover{opacity:.9;transform:translateY(-2px);}

  /* nav-prev/next */
  .lesson-nav{display:flex;justify-content:space-between;gap:10px;margin-top:2rem;}
  .lesson-nav-btn{flex:1;padding:.75rem 1rem;border-radius:12px;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .15s;}
  .lesson-nav-btn:hover{border-color:rgba(255,255,255,.25);background:var(--card);}
  .lesson-nav-btn.right{justify-content:flex-end;}
  .lesson-nav-btn.disabled{opacity:.3;pointer-events:none;}

  /* Not found */
  #not-found{display:none;text-align:center;padding:4rem 1rem;}
  #not-found h2{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;margin-bottom:.5rem;color:var(--muted);}
</style>
</head>

const LESSONS = {

    tips:[

    theme:{color:"#7c6fcd",light:"#c4bbff",bg:"rgba(124,111,205,0.18)"},
    icon:"🔢", title:"Laws of Indices",
    subtitle:"Three powerful rules that let you simplify expressions with powers — without working out huge numbers.",

/* ── RENDER ENGINE ── */
function render(){
  const params = new URLSearchParams(window.location.search);
  const key = params.get('lesson');
  const lesson = LESSONS[key];
  if(!lesson){ document.getElementById('not-found').style.display='block'; return; }

  const tc = lesson.theme;
  document.title = lesson.title + ' – Emily\'s Maths Revision';

  // Update CSS vars
  document.documentElement.style.setProperty('--tc-color', tc.color);
  document.documentElement.style.setProperty('--tc-light', tc.light);
  document.documentElement.style.setProperty('--tc-bg', tc.bg);

  // Update nav
  document.getElementById('nav-topic-name').textContent = lesson.topic;
  document.getElementById('nav-lesson-name').textContent = lesson.title;
  const qBtn = document.getElementById('nav-quiz-btn');
  qBtn.href = 'maths-quiz.html?topic=' + encodeURIComponent(lesson.topicKey);
  qBtn.style.borderColor = tc.color;
  qBtn.style.color = tc.light;
  qBtn.style.background = tc.bg;

  let html = '';

  // Hero
  html += `<div class="lesson-hero">
    <div class="breadcrumb-tag" style="background:${tc.bg};border-color:${tc.color};color:${tc.light}">
      ${lesson.icon} ${lesson.topic}
    </div>
    <div class="lesson-title" style="color:${tc.light}">${lesson.title}</div>
    <div class="lesson-subtitle">${lesson.subtitle}</div>
  </div>`;

  // Key idea
  html += `<div class="section">
    <div class="section-label" style="background:${tc.bg};color:${tc.light}">📌 Key idea</div>
    <div class="key-box" style="background:${tc.bg};border-color:${tc.color}">
      <div class="key-box-title" style="color:${tc.light}">The rule</div>
      <div class="key-rule" style="color:${tc.light}">${lesson.keyIdea.rule}</div>
      ${lesson.keyIdea.detail ? `<div class="key-detail">${lesson.keyIdea.detail}</div>`:''}
    </div>`;

  // Formulae
  if(lesson.formulae && lesson.formulae.length){
    lesson.formulae.forEach(f=>{
      html += `<div class="formula-display" style="background:${tc.bg};border-color:${tc.color}">
        <div class="formula-main" style="color:${tc.light}">${f.main}</div>
        ${f.note?`<div class="formula-note">${f.note}</div>`:''}
      </div>`;
    });
  }
  html += `</div>`;

  // Steps
  if(lesson.steps && lesson.steps.length){
    html += `<div class="section">
      <div class="section-label" style="background:${tc.bg};color:${tc.light}">🪜 How to do it</div>
      <div class="steps">`;
    lesson.steps.forEach((s,i)=>{
      html += `<div class="step" style="animation-delay:${i*0.07}s">
        <div class="step-num" style="background:${tc.bg};color:${tc.light}">${i+1}</div>
        <div class="step-body">
          <div class="step-title" style="color:${tc.light}">${s.title}</div>
          <div class="step-detail">${s.detail}</div>
          ${s.formula?`<div class="step-formula" style="background:${tc.bg};color:${tc.light}">${s.formula}</div>`:''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Worked examples
  if(lesson.worked && lesson.worked.length){
    html += `<div class="section">
      <div class="section-label" style="background:${tc.bg};color:${tc.light}">✏️ Worked examples</div>`;
    lesson.worked.forEach(w=>{
      html += `<div class="worked">
        <div class="worked-header">
          <div class="worked-icon">${lesson.icon}</div>
          <div class="worked-q">${w.q}</div>
        </div>
        <div class="worked-body">`;
      w.lines.forEach(l=>{
        html += `<div class="worked-line">
          <div class="worked-step">${l.step}</div>
          ${l.answer
            ? `<div><div class="worked-answer" style="background:${tc.bg};color:${tc.light}">${l.expr}</div></div>`
            : `<div class="worked-expr">${l.expr}</div><div class="worked-why">${l.why}</div>`}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  }

  // Tips
  if(lesson.tips && lesson.tips.length){
    html += `<div class="section">
      <div class="section-label" style="background:${tc.bg};color:${tc.light}">💡 Tips to remember</div>`;
    lesson.tips.forEach(t=>{
      html += `<div class="tip-box" style="background:${tc.bg};border-color:${tc.color}">
        <div class="tip-icon">${t.icon}</div>
        <div class="tip-text" style="color:${tc.light}">${t.text}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Common mistakes
  if(lesson.mistakes && lesson.mistakes.length){
    html += `<div class="section">
      <div class="section-label" style="background:var(--red-bg);color:var(--red-light)">⚠️ Common mistakes</div>`;
    lesson.mistakes.forEach(m=>{
      html += `<div class="mistake">
        <div class="mistake-icon">✗</div>
        <div class="mistake-text">${m.text}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Practice questions
  if(lesson.practice && lesson.practice.length){
    html += `<div class="section">
      <div class="section-label" style="background:${tc.bg};color:${tc.light}">🧪 Try it yourself</div>
      <div id="practice-wrap"></div>
      <div class="p-score" id="p-score-bar"></div>
    </div>`;
  }

  // CTA
  html += `<div class="cta-box" style="background:${tc.bg};border-color:${tc.color}">
    <span class="cta-emoji">🎯</span>
    <div class="cta-title" style="color:${tc.light}">Ready to test yourself?</div>
    <div class="cta-sub">Try the full ${lesson.topic} quiz to see how much you've learned.</div>
    <a class="cta-btn" href="maths-quiz.html?topic=${encodeURIComponent(lesson.topicKey)}">Take the ${lesson.topic} quiz →</a>
  </div>`;

  // Prev/Next lesson nav
  html += `<div class="lesson-nav">`;
  if(lesson.prevLesson){
    html += `<a class="lesson-nav-btn" href="maths-lesson.html?lesson=${lesson.prevLesson.key}">← ${lesson.prevLesson.label}</a>`;
  } else {
    html += `<span class="lesson-nav-btn disabled">← First lesson</span>`;
  }
  if(lesson.nextLesson){
    html += `<a class="lesson-nav-btn right" href="maths-lesson.html?lesson=${lesson.nextLesson.key}">${lesson.nextLesson.label} →</a>`;
  } else {
    html += `<span class="lesson-nav-btn right disabled">Last lesson →</span>`;
  }
  html += `</div>`;

  document.getElementById('lesson-content').innerHTML = html;

  // Build interactive practice questions
  if(lesson.practice && lesson.practice.length){
    const wrap = document.getElementById('practice-wrap');
    let practiceScore = 0;
    let practiceAnswered = 0;

    lesson.practice.forEach((p,qi)=>{
      const div = document.createElement('div');
      div.className = 'practice-q';
      div.innerHTML = `<div class="practice-q-text">${qi+1}. ${p.q}</div>
        <div class="practice-opts" id="popts-${qi}"></div>
        <div class="p-feedback" id="pfb-${qi}"></div>`;
      wrap.appendChild(div);

      const optsEl = div.querySelector(`#popts-${qi}`);
      // Shuffle option order
      const order = shuffle([0,1,2,3]);
      order.forEach(i=>{
        const btn = document.createElement('button');
        btn.className = 'p-opt';
        btn.textContent = p.opts[i];
        btn.dataset.realIdx = i;
        btn.onclick = ()=>{
          if(btn.disabled) return;
          optsEl.querySelectorAll('.p-opt').forEach(b=>{
            b.disabled = true;
            if(parseInt(b.dataset.realIdx)===p.ans) b.classList.add('reveal');
          });
          const fb = div.querySelector(`#pfb-${qi}`);
          if(parseInt(btn.dataset.realIdx)===p.ans){
            practiceScore++;
            btn.classList.remove('reveal'); btn.classList.add('correct');
            fb.className='p-feedback correct';
            fb.innerHTML='✓ <strong>Correct!</strong> '+p.exp;
          } else {
            btn.classList.remove('reveal'); btn.classList.add('wrong');
            fb.className='p-feedback wrong';
            fb.innerHTML='✗ <strong>Not quite.</strong> '+p.exp;
          }
          practiceAnswered++;
          if(practiceAnswered===lesson.practice.length){
            const pct = Math.round((practiceScore/lesson.practice.length)*100);
            const medal = pct===100?'🥇':pct>=75?'🥈':pct>=50?'🥉':'📚';
            document.getElementById('p-score-bar').innerHTML =
              `${medal} You got <strong>${practiceScore}/${lesson.practice.length}</strong> (${pct}%). ${pct===100?'Perfect!':pct>=75?'Great job!':'Keep practising!'}`;
          }
        };
        optsEl.appendChild(btn);
      });
    });
  }
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

render();
</script>

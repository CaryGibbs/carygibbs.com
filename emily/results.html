<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emily's Progress</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e17;--surface:#1a1825;--card:#201e2e;--border:rgba(255,255,255,.08);--text:#f0eeff;--muted:rgba(240,238,255,.55);--dim:rgba(240,238,255,.3);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Nunito Sans',sans-serif;color:var(--text);min-height:100vh;padding-bottom:80px;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1.5px 1.5px at 8% 12%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 35% 65%,rgba(255,255,255,.25) 0%,transparent 100%),radial-gradient(2px 2px at 62% 20%,rgba(255,255,255,.3) 0%,transparent 100%);pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;background:rgba(15,14,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim);}
nav a{color:var(--muted);text-decoration:none;font-weight:600;}nav a:hover{color:var(--text);}nav span{opacity:.45;}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1.5rem 2rem;position:relative;z-index:1;}
.page-title{font-family:'Nunito',sans-serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;background:linear-gradient(135deg,#c4bbff,#9ef5e2,#ffd580);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem;}
.page-sub{color:var(--muted);font-size:14px;margin-bottom:2rem;}

/* LEVEL HERO */
.level-hero{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.25rem;}
.level-emoji{font-size:52px;flex-shrink:0;}
.level-info{flex:1;min-width:0;}
.level-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--text);}
.level-xp{font-size:13px;color:var(--muted);margin:.2rem 0 .6rem;}
.xp-track{height:10px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden;}
.xp-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#9b59b6,#3498db);transition:width .8s ease;}
.xp-next{font-size:11px;color:var(--dim);margin-top:.3rem;}

/* SUMMARY STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.25rem;}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;text-align:center;}
.stat-val{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:.25rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

/* SECTION LABEL */
.sec-label{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:.1rem 0 .75rem;}

/* BADGES */
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.7rem;margin-bottom:1.5rem;}
.badge-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.85rem .75rem;text-align:center;transition:border-color .2s;}
.badge-card.earned{border-color:rgba(196,187,255,.35);background:rgba(155,89,182,.1);}
.badge-card.locked{opacity:.38;filter:grayscale(1);}
.badge-emoji{font-size:26px;display:block;margin-bottom:.4rem;}
.badge-title{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--text);margin-bottom:.2rem;}
.badge-desc{font-size:11px;color:var(--muted);line-height:1.4;}

/* WEAK TOPICS ALERT */
.weak-alert{background:rgba(224,92,106,.08);border:1px solid rgba(224,92,106,.25);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.25rem;}
.weak-alert-title{font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#ffaab3;margin-bottom:.5rem;}
.weak-item{font-size:13px;color:var(--muted);padding:2px 0;}

/* SUBJECT BLOCKS */
.subject-block{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:1rem;overflow:hidden;}
.subject-header{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;cursor:pointer;user-select:none;transition:background .15s;}
.subject-header:hover{background:rgba(255,255,255,.03);}
.subj-bar{width:5px;height:38px;border-radius:3px;flex-shrink:0;}
.subj-info{flex:1;}
.subj-name{font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;}
.subj-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.subj-right{text-align:right;flex-shrink:0;}
.subj-score{font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;}
.subj-score-lbl{font-size:10px;color:var(--muted);}
.chevron{color:var(--dim);font-size:15px;transition:transform .2s;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.subject-detail{display:none;padding:0 1.25rem 1.25rem;border-top:1px solid rgba(255,255,255,.05);}
.subject-detail.open{display:block;}

/* TOPIC TABLE */
.topic-row{display:flex;align-items:center;gap:8px;padding:.45rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.topic-row:last-child{border-bottom:none;}
.topic-icon{width:16px;font-size:13px;flex-shrink:0;}
.topic-name{flex:1;font-size:13px;color:var(--muted);}
.topic-name.weak{color:#ffaab3;font-weight:700;}
.topic-name.weak::after{content:' ⚠️';font-size:10px;}
.topic-bar-wrap{width:100px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.topic-bar{height:100%;border-radius:3px;}
.topic-pct{width:34px;text-align:right;font-size:12px;font-weight:700;}
.topic-pct.weak{color:#ffaab3;}
.topic-pct.ok{color:#ffd580;}
.topic-pct.good{color:#b2f0bb;}
.topic-attempts{font-size:11px;color:var(--dim);width:50px;text-align:right;}

/* CHART */
.chart-wrap{position:relative;height:90px;margin-top:.75rem;}
.chart-svg{width:100%;height:100%;display:block;}
.chart-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:3px;padding:0 4px;}

/* HEATMAP */
.heatmap-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1.25rem;}
.heatmap-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:.75rem;}
.hm-cell{width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.06);transition:background .2s;}
.hm-cell.active-1{background:rgba(155,89,182,.4);}
.hm-cell.active-2{background:rgba(155,89,182,.65);}
.hm-cell.active-3{background:rgba(155,89,182,.9);}
.hm-cell.active-4{background:#9b59b6;}
.hm-months{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.hm-day-lbl{font-size:10px;color:var(--dim);width:16px;text-align:center;}

/* EMPTY + RESET */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-emoji{font-size:48px;display:block;margin-bottom:.75rem;}
.empty-title{font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:.4rem;}
.empty-sub{font-size:14px;line-height:1.6;max-width:340px;margin:0 auto 1.5rem;}
.go-btn{display:inline-block;padding:.75rem 1.75rem;border-radius:12px;background:linear-gradient(135deg,#9b59b6,#3498db);color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;text-decoration:none;}
.reset-area{text-align:center;margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.06);}
.reset-btn{background:rgba(224,92,106,.1);border:1px solid rgba(224,92,106,.3);color:#ffaab3;padding:.5rem 1.25rem;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;}
.reset-btn:hover{background:rgba(224,92,106,.2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease both;}
</style>
</head>
<body>
<nav>
  <a href="index.html">🏠 Home</a><span>›</span><span>My Progress</span>
</nav>
<div class="wrap" id="wrap"></div>

<script src="data.js"></script>
<script src="firebase-config.js"></script>
<script>
/* ─── inline gamification engine ─────────────────────── */
var HUB_STORE='emilys_hub_v1',STREAK_STORE='emilys_streak_v1';
(function(){try{localStorage.removeItem('emilys_results_v1');}catch(e){}})();

var LEVELS=[{level:1,title:'Starter',xp:0,emoji:'🌱'},{level:2,title:'Learner',xp:100,emoji:'📖'},{level:3,title:'Scholar',xp:300,emoji:'🎓'},{level:4,title:'Expert',xp:600,emoji:'🔬'},{level:5,title:'Champion',xp:1000,emoji:'🏆'},{level:6,title:'Legend',xp:1500,emoji:'⭐'}];
var BADGE_DEFS=[{id:'first_quiz',emoji:'🎉',title:'First Steps',desc:'Complete your first quiz'},{id:'perfect_ten',emoji:'💯',title:'Perfect Ten',desc:'Score 10/10 on any quiz'},{id:'streak_3',emoji:'🔥',title:'On Fire',desc:'3-day streak'},{id:'streak_7',emoji:'🌟',title:'Week Warrior',desc:'7-day streak'},{id:'streak_30',emoji:'🚀',title:'Unstoppable',desc:'30-day streak'},{id:'bookworm',emoji:'📚',title:'Bookworm',desc:'Read 20 lessons'},{id:'explorer',emoji:'🌍',title:'Explorer',desc:'Quiz in every subject'},{id:'sharp',emoji:'🎯',title:'Sharp Shooter',desc:'Answer 100 questions correctly'},{id:'comeback',emoji:'💪',title:'Comeback Kid',desc:'Improve a topic from below 60% to above 70%'},{id:'star_pupil',emoji:'⭐',title:'Star Pupil',desc:'Score 90%+ five times'},{id:'trending',emoji:'📈',title:'Trending Up',desc:'Improve score in same subject 3 sessions running'},{id:'all_rounder',emoji:'🎪',title:'All-Rounder',desc:'Score 70%+ in every subject at least once'},{id:'century',emoji:'💫',title:'Century',desc:'Complete 100 quizzes'},{id:'night_owl',emoji:'🦉',title:'Night Owl',desc:'Complete a quiz after 9pm'},{id:'early_bird',emoji:'🐦',title:'Early Bird',desc:'Complete a quiz before 8am'},{id:'lesson_20',emoji:'🧠',title:'Deep Diver',desc:'Read 20 different lessons'}];
function _load(){try{var d=JSON.parse(localStorage.getItem(HUB_STORE))||_blank();if(!d.xp||isNaN(d.xp))d.xp=0;if(!d.badges)d.badges=[];if(!d.quizSessions)d.quizSessions=[];if(!d.topicHistory)d.topicHistory={};if(!d.subjectSessions)d.subjectSessions={};if(!d.activity)d.activity={};return d;}catch(e){return _blank();}}
function _blank(){return{xp:0,badges:[],lessonsRead:[],quizSessions:[],topicHistory:{},subjectSessions:{},activity:{},timeLog:{}};}
function getLevel(xp){xp=xp||0;var lv=LEVELS[0];for(var i=0;i<LEVELS.length;i++){if(xp>=LEVELS[i].xp)lv=LEVELS[i];else break;}return lv;}
function getNextLevel(xp){xp=xp||0;for(var i=0;i<LEVELS.length;i++){if(LEVELS[i].xp>xp)return LEVELS[i];}return null;}
function getLevelProgress(xp){xp=xp||0;var cur=getLevel(xp),next=getNextLevel(xp);if(!next)return 100;return Math.round(((xp-cur.xp)/(next.xp-cur.xp))*100);}
function getStreak(){try{var s=JSON.parse(localStorage.getItem(STREAK_STORE))||{count:0,lastDate:''};var today=new Date().toISOString().slice(0,10);var yest=new Date(Date.now()-86400000).toISOString().slice(0,10);if(s.lastDate!==today&&s.lastDate!==yest)return 0;return s.count;}catch(e){return 0;}}
function pctClass(p){return p<60?'weak':p<75?'ok':'good';}
function barColor(p,c1,c2){if(p<60)return '#e05c6a';if(p<75)return '#f5a623';return 'linear-gradient(90deg,'+c1+','+c2+')';}

function drawChart(sessions, c1, c2) {
  if (!sessions || sessions.length < 2) return '<div style="font-size:12px;color:var(--dim);padding:.75rem 0;text-align:center">Complete at least 2 quizzes to see your trend.</div>';
  var pts = sessions.slice(-20);
  var n = pts.length, W = 500, H = 90, pad = 8;
  var xs = pts.map(function(_,i){return pad+(i/(n-1))*(W-2*pad);});
  var ys = pts.map(function(s){return H-pad-((s.pct/100)*(H-2*pad));});
  var area='M '+xs[0]+' '+H;
  pts.forEach(function(_,i){area+=' L '+xs[i]+' '+ys[i];});
  area+=' L '+xs[n-1]+' '+H+' Z';
  var line='M '+xs[0]+' '+ys[0];
  pts.forEach(function(_,i){if(i>0)line+=' L '+xs[i]+' '+ys[i];});
  var y60=H-pad-(0.6*(H-2*pad)), y90=H-pad-(0.9*(H-2*pad));
  var gid='g'+Math.random().toString(36).slice(2,6), agid='ag'+Math.random().toString(36).slice(2,6);
  var dots=pts.map(function(s,i){
    var dc=s.pct>=90?'#5bbf6a':s.pct>=60?c1:'#e05c6a';
    return '<circle cx="'+xs[i]+'" cy="'+ys[i]+'" r="3.5" fill="'+dc+'"/>';
  }).join('');
  return '<div class="chart-wrap">'
    +'<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="'+c1+'"/><stop offset="100%" stop-color="'+c2+'"/></linearGradient>'
    +'<linearGradient id="'+agid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+c1+'" stop-opacity=".3"/><stop offset="100%" stop-color="'+c1+'" stop-opacity=".02"/></linearGradient></defs>'
    +'<line x1="'+pad+'" y1="'+y60+'" x2="'+(W-pad)+'" y2="'+y60+'" stroke="rgba(224,92,106,.35)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<line x1="'+pad+'" y1="'+y90+'" x2="'+(W-pad)+'" y2="'+y90+'" stroke="rgba(91,191,106,.35)" stroke-width="1" stroke-dasharray="4,3"/>'
    +'<path d="'+area+'" fill="url(#'+agid+')"/>'
    +'<path d="'+line+'" fill="none" stroke="url(#'+gid+')" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +dots+'</svg></div>'
    +'<div class="chart-labels"><span>'+pts[0].date+'</span><span style="color:rgba(224,92,106,.7)">─ 60%</span><span style="color:rgba(91,191,106,.7)">─ 90%</span><span>'+pts[n-1].date+'</span></div>';
}

function drawHeatmap(activity) {
  var today = new Date();
  var cells = '';
  var days = 84; // 12 weeks
  for (var i = days-1; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate()-i);
    var key = d.toISOString().slice(0,10);
    var mins = activity[key] || 0;
    var lvl = mins === 0 ? '' : mins < 5 ? 'active-1' : mins < 15 ? 'active-2' : mins < 30 ? 'active-3' : 'active-4';
    cells += '<div class="hm-cell '+lvl+'" title="'+key+(mins>0?' · ~'+mins+'min':'')+'"></div>';
  }
  return cells;
}

function render() {
  var d = _load();
  var streak = getStreak();
  var lv = getLevel(d.xp);
  var next = getNextLevel(d.xp);
  var prog = getLevelProgress(d.xp);
  var wrap = document.getElementById('wrap');

  var hasData = d.quizSessions && d.quizSessions.length > 0;

  // ── LEVEL HERO ──────────────────────────────────────────
  var html = '<div class="page-title anim">📊 My Progress</div>'
    + '<div class="page-sub anim">Track scores, earn XP and unlock badges.</div>'
    + '<div class="level-hero anim">'
    + '<div class="level-emoji">'+lv.emoji+'</div>'
    + '<div class="level-info">'
    + '<div class="level-title">Level '+lv.level+' — '+lv.title+'</div>'
    + '<div class="level-xp">'+(d.xp||0)+' XP total'+(streak>0?' · 🔥 '+streak+' day streak':' · No active streak')+'</div>'
    + '<div class="xp-track"><div class="xp-fill" style="width:'+((d.xp||0)>0?prog:0)+'%"></div></div>'
    + (next || d.xp < 1 ? (next ? '<div class="xp-next">'+next.emoji+' '+next.title+' in '+(next.xp-(d.xp||0))+' XP</div>' : '<div class="xp-next">Keep going!</div>') : '<div class="xp-next" style="color:#ffd580">🏆 Maximum level reached!</div>')
    + '</div></div>';

  // ── SUMMARY STATS ────────────────────────────────────────
  var totalCorrect = (d.quizSessions||[]).reduce(function(a,s){return a+s.score;},0);
  var totalQ = (d.quizSessions||[]).reduce(function(a,s){return a+s.total;},0);
  var overallPct = totalQ > 0 ? Math.round((totalCorrect/totalQ)*100) : 0;
  var lessonsRead = (d.lessonsRead||[]).length;

  html += '<div class="stats-row anim">'
    + '<div class="stat-card"><div class="stat-val" style="color:#ffd580">'+(d.xp||0)+'</div><div class="stat-lbl">Total XP</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:#b2f0bb">'+(hasData?overallPct+'%':'—')+'</div><div class="stat-lbl">Overall Score</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:#c4bbff">'+(d.quizSessions||[]).length+'</div><div class="stat-lbl">Quizzes Done</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:#9ef5e2">'+lessonsRead+'</div><div class="stat-lbl">Lessons Read</div></div>'
    + '</div>';

  // ── BADGES ───────────────────────────────────────────────
  var earned = d.badges || [];
  html += '<div class="sec-label">Badges — '+earned.length+' / '+BADGE_DEFS.length+' unlocked</div>'
    + '<div class="badges-grid anim">';
  BADGE_DEFS.forEach(function(b) {
    var isEarned = earned.indexOf(b.id) > -1;
    html += '<div class="badge-card '+(isEarned?'earned':'locked')+'">'
      + '<span class="badge-emoji">'+b.emoji+'</span>'
      + '<div class="badge-title">'+b.title+'</div>'
      + '<div class="badge-desc">'+b.desc+'</div>'
      + '</div>';
  });
  html += '</div>';

  if (!hasData) {
    html += '<div class="empty-state">'
      + '<span class="empty-emoji">📝</span>'
      + '<div class="empty-title">No quiz results yet!</div>'
      + '<div class="empty-sub">Complete a quiz to start seeing your subject and topic progress here.</div>'
      + '<a class="go-btn" href="index.html">Choose a Subject →</a>'
      + '</div>';
    wrap.innerHTML = html;
    return;
  }

  // ── WEAK TOPICS ALERT ────────────────────────────────────
  var weakTopics = [];
  Object.keys(SUBJECTS).forEach(function(sid) {
    var th = (d.topicHistory||{})[sid] || {};
    var s = SUBJECTS[sid];
    Object.entries(th).forEach(function(e) {
      var t=e[0], v=e[1];
      if (v.attempted >= 5) {
        var p = Math.round((v.correct/v.attempted)*100);
        if (p < 60) weakTopics.push(s.name+' › '+t+' ('+p+'%)');
      }
    });
  });
  if (weakTopics.length > 0) {
    html += '<div class="weak-alert anim">'
      + '<div class="weak-alert-title">⚠️ Topics to work on (below 60% after 5+ questions)</div>'
      + weakTopics.map(function(t){return '<div class="weak-item">• '+t+'</div>';}).join('')
      + '</div>';
  }

  // ── ACTIVITY HEATMAP ─────────────────────────────────────
  html += '<div class="heatmap-wrap anim">'
    + '<div class="sec-label" style="margin:0 0 .5rem">Activity — last 12 weeks</div>'
    + '<div style="font-size:11px;color:var(--dim);margin-bottom:.5rem">Each square = one day · Darker = more time spent</div>'
    + '<div class="heatmap-grid">' + drawHeatmap(d.activity||{}) + '</div>'
    + '</div>';

  // ── SUBJECT BLOCKS ───────────────────────────────────────
  html += '<div class="sec-label">Results by Subject</div>';

  Object.keys(SUBJECTS).forEach(function(sid) {
    var sessions = (d.quizSessions||[]).filter(function(s){return s.sid===sid;});
    if (sessions.length === 0) return;
    var s = SUBJECTS[sid];
    var c1=s.gradient[0], c2=s.gradient[1];
    var lastSess = sessions[sessions.length-1];
    var avgPct = Math.round(sessions.reduce(function(a,b){return a+b.pct;},0)/sessions.length);
    var topicHistory = ((d.topicHistory||{})[sid]) || {};
    var detailId = 'det-'+sid, chevId = 'chev-'+sid;

    html += '<div class="subject-block anim">'
      + '<div class="subject-header" onclick="tog(\''+detailId+'\',\''+chevId+'\')">'
      + '<div class="subj-bar" style="background:linear-gradient(180deg,'+c1+','+c2+')"></div>'
      + '<div class="subj-info">'
      + '<div class="subj-name">'+s.icon+' '+s.name+'</div>'
      + '<div class="subj-meta">'+sessions.length+' quiz'+(sessions.length!==1?'zes':'')+' · avg '+avgPct+'% · last: '+lastSess.date+'</div>'
      + '</div>'
      + '<div class="subj-right">'
      + '<div class="subj-score" style="background:linear-gradient(135deg,'+c1+','+c2+');-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+lastSess.pct+'%</div>'
      + '<div class="subj-score-lbl">last quiz</div>'
      + '</div>'
      + '<div class="chevron" id="'+chevId+'">›</div>'
      + '</div>'
      + '<div class="subject-detail" id="'+detailId+'">'
      + '<div style="margin:1rem 0 .5rem">';

    // Topic rows
    Object.entries(topicHistory).forEach(function(e) {
      var t=e[0], v=e[1];
      if (!v.attempted) return;
      var p = Math.round((v.correct/v.attempted)*100);
      var cls = pctClass(p);
      var bc = barColor(p,c1,c2);
      var meta = (s.topicMeta&&s.topicMeta[t])||{};
      html += '<div class="topic-row">'
        + '<div class="topic-icon">'+(meta.icon||'')+'</div>'
        + '<div class="topic-name '+(cls==='weak'?'weak':'')+'">'+t+'</div>'
        + '<div class="topic-bar-wrap"><div class="topic-bar" style="width:'+p+'%;background:'+bc+'"></div></div>'
        + '<div class="topic-pct '+cls+'">'+p+'%</div>'
        + '<div class="topic-attempts">'+v.correct+'/'+v.attempted+'</div>'
        + '</div>';
    });

    html += '</div>';
    // Chart
    html += '<div style="margin-top:.5rem"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:.4rem">Score over time</div>'
      + drawChart(sessions, c1, c2) + '</div>';
    html += '</div></div>';
  });

  // ── RESET ────────────────────────────────────────────────
  html += '<div class="reset-area">'
    + '<button class="reset-btn" onclick="resetAll()">🗑 Clear all results and XP</button>'
    + '</div>';

  wrap.innerHTML = html;
  renderXPBar();
}

function tog(id, cid) {
  var el=document.getElementById(id), ch=document.getElementById(cid);
  if (!el) return;
  var open = el.classList.contains('open');
  el.classList.toggle('open',!open);
  ch.classList.toggle('open',!open);
}

function resetAll() {
  if (confirm('Clear ALL results, XP and badges? This cannot be undone.')) {
    localStorage.removeItem(HUB_STORE);
    localStorage.removeItem(STREAK_STORE);
    render();
  }
}

/* ── XP BAR (bottom) ──────────────────────────────────── */
function renderXPBar() {
  var d=_load(), streak=getStreak();
  var lv=getLevel(d.xp), next=getNextLevel(d.xp), prog=getLevelProgress(d.xp);
  var bar=document.getElementById('xp-bar');
  if(!bar){bar=document.createElement('div');bar.id='xp-bar';
    bar.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(15,14,23,.94);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.08);padding:.45rem 1.25rem;display:flex;align-items:center;gap:12px;';
    document.body.appendChild(bar);}
  bar.innerHTML='<a href="results.html" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;min-width:0">'
    +'<span style="font-size:18px;flex-shrink:0">'+lv.emoji+'</span>'
    +'<div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;margin-bottom:3px">'
    +'<span style="font-family:Nunito,sans-serif;font-size:12px;font-weight:800;color:#c4bbff">'+lv.title+' · '+(d.xp||0)+' XP</span>'
    +(next?'<span style="font-size:11px;color:var(--dim)">'+next.title+' in '+(next.xp-(d.xp||0))+' XP</span>':(d.xp||0)>0?'<span style="font-size:11px;color:#ffd580">MAX</span>':'')
    +'</div><div style="height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+((d.xp||0)>0?prog:0)+'%;background:linear-gradient(90deg,#9b59b6,#3498db);border-radius:3px;transition:width .6s"></div></div></div></a>'
    +(streak>0?'<span style="font-size:13px;font-weight:700;color:#ffd580;white-space:nowrap">🔥 '+streak+'</span>':'')
    +'<span style="font-size:11px;font-weight:700;color:rgba(240,238,255,.35);white-space:nowrap;flex-shrink:0">My Stats ›</span>';
}

render();
renderXPBar();

/* ── TIME TRACKING ─────────────────────────────────────── */
var _pageStart = Date.now();
var _pageType = (function() {
  var p = location.pathname.split('/').pop() || 'index.html';
  if (p.includes('quiz'))    return 'quiz';
  if (p.includes('lesson'))  return 'lesson';
  if (p.includes('mindmap')) return 'mindmap';
  if (p.includes('results')) return 'results';
  if (p.includes('index') || p === '' || p === '/') return 'home';
  return 'other';
})();

function _recordTime() {
  var secs = Math.round((Date.now() - _pageStart) / 1000);
  if (secs < 3 || secs > 7200) return; // ignore < 3s and > 2hr (tab left open)
  var today = new Date().toISOString().slice(0,10);

  // Save to localStorage
  try {
    var d = JSON.parse(localStorage.getItem('emilys_hub_v1')) || {};
    if (!d.timeLog) d.timeLog = {};
    if (!d.timeLog[today]) d.timeLog[today] = { total:0, quiz:0, lesson:0, mindmap:0, home:0, other:0 };
    d.timeLog[today].total = (d.timeLog[today].total||0) + secs;
    d.timeLog[today][_pageType] = (d.timeLog[today][_pageType]||0) + secs;
    // Keep last 90 days only
    var keys = Object.keys(d.timeLog).sort();
    if (keys.length > 90) { delete d.timeLog[keys[0]]; }
    // Update activity heatmap too (in minutes)
    if (!d.activity) d.activity = {};
    d.activity[today] = (d.activity[today]||0) + Math.round(secs/60);
    localStorage.setItem('emilys_hub_v1', JSON.stringify(d));
  } catch(e) {}

  // Sync to Firebase
  try {
    if (window.firebase && firebase.apps && firebase.apps.length) {
      var db = firebase.database();
      db.ref('emily/timeLog/' + today + '/total').transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/timeLog/' + today + '/' + _pageType).transaction(function(v){ return (v||0)+secs; });
      db.ref('emily/activity/' + today).transaction(function(v){ return (v||0)+Math.round(secs/60); });
    }
  } catch(e) {}
}

// Record time when leaving the page
window.addEventListener('beforeunload', _recordTime);
window.addEventListener('pagehide', _recordTime);
// Also record periodically every 60s (in case tab is kept open)
setInterval(function() {
  _recordTime();
  _pageStart = Date.now(); // reset so we don't double-count
}, 60000);

</script>
